<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Robot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; width: 100%;
    background: #030912;
    color: #cce8f4;
    font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  #app {
    width: 100%; max-width: 480px; height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    padding: 20px 16px 36px; gap: 20px;
  }

  /* ── キャンバス ── */
  #robot-canvas {
    flex-shrink: 0;
    touch-action: none;
    cursor: pointer;
    border-radius: 50%;
    transition: box-shadow .3s;
  }
  #robot-canvas.listening-once {
    box-shadow: 0 0 0 2px rgba(255,68,136,.55);
  }
  @keyframes canvas-ring {
    0%   { box-shadow: 0 0 0 0   rgba(255,68,136,.50); }
    70%  { box-shadow: 0 0 0 18px rgba(255,68,136,0); }
    100% { box-shadow: 0 0 0 0   rgba(255,68,136,0); }
  }
  #robot-canvas.continuous { animation: canvas-ring 2s infinite; }
  #robot-canvas.continuous.listening-once { animation: canvas-ring .8s infinite; }

  /* ── ステータス ── */
  #status-bar {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: #6a8fa8; flex-shrink: 0;
    user-select: none;
  }
  #status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #1a3a55; transition: background .4s; flex-shrink: 0;
  }
  @keyframes blink-dot {
    0%,100%{ opacity:.4; transform:scale(1); }
    50%    { opacity:1;  transform:scale(1.4); }
  }
  #status-dot.listening { background:#ff4488; animation:blink-dot .8s infinite; }
  #status-dot.thinking  { background:#aaaaff; animation:blink-dot 1.2s infinite; }
  #status-dot.speaking  { background:#88ccee; animation:blink-dot .6s infinite; }
  #status-dot.ready     { background:#3a6a88; }
  #status-dot.sleeping  { background:#1a3a55; }

  /* 極小リセット */
  #reset-hint {
    margin-left: 6px; font-size: 15px;
    opacity: 0.15; cursor: pointer;
    transition: opacity .2s; line-height: 1;
  }
  #reset-hint:hover  { opacity: 0.55; }
  #reset-hint:active { opacity: 0.90; }
</style>
</head>
<body>

<div id="app">
  <canvas id="robot-canvas"></canvas>
  <div id="status-bar">
    <div id="status-dot" class="sleeping"></div>
    <span id="reset-hint" title="リセット">⟳</span>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// EYE RENDERER
// ════════════════════════════════════════════════════
class EyeRenderer {
  constructor(canvas) {
    this.canvas       = canvas;
    this.ctx          = canvas.getContext('2d');
    this.emotion      = 'sleep';
    this.action       = 'none';
    this.blinkAmt     = 0;
    this.blinking     = false;
    this.blinkTimer   = 0;
    this.blinkNext    = this._rndBlink();
    this.bobPhase     = 0;
    this.bobY         = 0;
    this.headTilt     = 0;
    this.headTiltTgt  = 0;
    this.actionTimer  = 0;
    this.lastTS       = 0;
    this.talking      = false;
    this.talkPhase    = 0;
    this.excitedPhase = 0;
    this.excitedY     = 0;
    this.resize();
    requestAnimationFrame(this._loop.bind(this));
  }

  resize() {
    const s = Math.min(window.innerWidth * 0.86, 360);
    this.canvas.width = this.canvas.height = s;
    this.W = s; this.CX = s / 2; this.CY = s / 2;
  }

  setEmotion(e) { this.emotion = e; }
  setTalking(v) { this.talking = v; }
  setAction(a)  { if (a === 'none') return; this.action = a; this.actionTimer = 0; }
  blink()       { if (!this.blinking) { this.blinking = true; this.blinkAmt = 0; } }

  _rndBlink() { return 2800 + Math.random() * 5000; }

  _loop(ts) {
    const dt = Math.min(0.05, (ts - this.lastTS) / 1000);
    this.lastTS = ts;
    this._update(dt);
    this._render();
    requestAnimationFrame(this._loop.bind(this));
  }

  _update(dt) {
    const isSleep = this.emotion === 'sleep';
    const lerp = 1 - Math.exp(-8 * dt);

    // ボブ（スリープ中は超スロー・低振幅）
    const bobSpeed = isSleep ? 0.35 : this.talking ? 4.0 : 1.0;
    const bobAmp   = isSleep ? 0.004 : 0.010;
    this.bobPhase += dt * bobSpeed;
    this.bobY = Math.sin(this.bobPhase) * (this.W * bobAmp);

    // excited バウンス
    if (this.emotion === 'excited') {
      this.excitedPhase += dt * 7.5;
      this.excitedY = -Math.abs(Math.sin(this.excitedPhase)) * (this.W * 0.034);
    } else {
      this.excitedPhase = 0;
      this.excitedY += (0 - this.excitedY) * Math.min(1, dt * 10);
    }

    // 瞬き（スリープ中は無効）
    if (!isSleep) {
      this.blinkTimer += dt * 1000;
      if (!this.blinking && this.blinkTimer > this.blinkNext) {
        this.blinking = true; this.blinkAmt = 0;
        this.blinkTimer = 0; this.blinkNext = this._rndBlink();
      }
      if (this.blinking) {
        this.blinkAmt += dt * 12;
        if (this.blinkAmt >= 1) { this.blinkAmt = 1; this.blinking = false; }
      } else {
        this.blinkAmt = Math.max(0, this.blinkAmt - dt * 12);
      }
    } else {
      this.blinkAmt = 0;
    }

    // Nod / Shake
    if (this.action !== 'none') {
      this.actionTimer += dt;
      if (this.action === 'nod') {
        this.headTiltTgt = Math.sin(this.actionTimer * Math.PI / 0.3) * 0.10;
        if (this.actionTimer > 0.7) { this.action = 'none'; this.headTiltTgt = 0; }
      } else if (this.action === 'shake') {
        this.headTiltTgt = Math.sin(this.actionTimer * Math.PI * 3) * 0.09;
        if (this.actionTimer > 0.9) { this.action = 'none'; this.headTiltTgt = 0; }
      }
    }
    this.headTilt += (this.headTiltTgt - this.headTilt) * lerp;

    if (this.talking) this.talkPhase += dt * 10;
  }

  _render() {
    const { ctx, W, CX, CY } = this;
    ctx.clearRect(0, 0, W, W);
    ctx.save();
    ctx.translate(CX, CY + this.bobY);
    ctx.rotate(this.headTilt);
    ctx.translate(-CX, -(CY + this.bobY));
    this._drawEyes(ctx, CX, CY + this.bobY);
    ctx.restore();
  }

  _drawEyes(ctx, cx, cy) {
    const W   = this.W;
    const em  = this.emotion;
    const sp  = W * 0.200;
    const hw  = W * 0.100;
    const bSY = 1 - this.blinkAmt * 0.97;

    const yOff = {
      sleep:0, idle:0, happy:0, excited:0,
      thinking: -W * 0.006,
      sad:       W * 0.018,
      surprised:-W * 0.010,
      angry:0,
    };
    const ey = cy - W * 0.010 + (yOff[em] ?? 0) + this.excitedY;
    const talkScale = this.talking ? 1 + Math.sin(this.talkPhase) * 0.04 : 1;

    this._drawOneEye(ctx, cx - sp, ey, hw, bSY * talkScale, em, false);
    this._drawOneEye(ctx, cx + sp, ey, hw, bSY * talkScale, em, true);
  }

  _drawOneEye(ctx, x, y, hw, blinkSY, em, isRight) {
    const W   = this.W;
    const col = this._color();

    const P = {
      sleep:     { hRatio: 0.07,                  tilt: 0,                       shape: 'ellipse' }, // 閉じた目
      idle:      { hRatio: 1.00,                  tilt: 0,                       shape: 'ellipse' }, // ● 正円
      happy:     { hRatio: 0,                     tilt: 0,                       shape: 'arc'     }, // ◠ 笑い目
      excited:   { hRatio: 1.15,                  tilt: 0,                       shape: 'ellipse' }, // 縦に少し大きい
      thinking:  { hRatio: isRight?0.65:0.50,     tilt: isRight?-0.20:0.20,      shape: 'ellipse' }, // 丸いまま細める
      sad:       { hRatio: 0.70,                  tilt: isRight?-0.26:0.26,      shape: 'ellipse' }, // 丸いまま傾く
      surprised: { hRatio: 1.30,                  tilt: 0,                       shape: 'ellipse' }, // 縦長の大きな円
      angry:     { hRatio: 0.16,                  tilt: isRight?0.40:-0.40,      shape: 'rect'   },  // 細い横線
    };
    const p = P[em] ?? P.idle;

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(1, blinkSY);
    ctx.rotate(p.tilt);

    // スリープ中は薄く描画
    ctx.globalAlpha = (em === 'sleep') ? 0.30 : 1.0;

    if (p.shape === 'arc') {
      const r = hw * 0.80;
      ctx.beginPath();
      ctx.arc(0, r * 0.15, r, Math.PI + 0.18, -0.18, false);
      ctx.strokeStyle = col.fill;
      ctx.lineWidth   = W * 0.048;
      ctx.lineCap     = 'round';
      ctx.stroke();
      ctx.restore();
      return;
    }

    if (p.shape === 'rect') {
      const rw = hw * 0.95, rh = hw * p.hRatio;
      ctx.beginPath();
      ctx.roundRect(-rw, -rh, rw * 2, rh * 2, rh * 0.5);
      ctx.fillStyle = col.fill;
      ctx.fill();
      ctx.restore();
      return;
    }

    ctx.beginPath();
    ctx.ellipse(0, 0, hw, hw * p.hRatio, 0, 0, Math.PI * 2);
    ctx.fillStyle = col.fill;
    ctx.fill();
    ctx.restore();
  }

  _color() { return { fill: '#dce9f5' }; }
}

// ════════════════════════════════════════════════════
// APP CONTROLLER
// ════════════════════════════════════════════════════
const canvas    = document.getElementById('robot-canvas');
const statusDt  = document.getElementById('status-dot');
const resetHint = document.getElementById('reset-hint');

const robot = new EyeRenderer(canvas);
window.addEventListener('resize', () => robot.resize());

let isBusy    = false;
let recognition    = null;   // 会話用
let sleepRecRef    = null;   // 起動ワード用
let sleeping       = true;
let continuousMode = false;
let listeningActive= false;
let sleepTimer     = null;
let currentAudio   = null;

const SLEEP_MS   = 60_000;
const WAKE_WORDS = /起きて|おきて|おはよ|ルーイ|ねえ|スタート/;
const SLEEP_WORDS= /おやすみ|寝て|ねて|バイバイ|またね|終わり|おわり/;

function setStatus(state) { statusDt.className = state; }

// ── 記憶（localStorage） ─────────────────────────────
const MEMORY_KEY = 'looi_memory';
function getMemory()        { return JSON.parse(localStorage.getItem(MEMORY_KEY) || '[]'); }
function addMemory(fact)    {
  if (!fact || fact.length < 3) return;
  const mem = getMemory();
  if (!mem.includes(fact)) {
    mem.push(fact);
    if (mem.length > 30) mem.shift();   // 最大30件
    localStorage.setItem(MEMORY_KEY, JSON.stringify(mem));
    console.log('[memory] 覚えた:', fact);
  }
}
function clearMemory()      { localStorage.removeItem(MEMORY_KEY); }

// ── TTS ──────────────────────────────────────────────
function speak(text, onEnd) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  fetch('/api/tts', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  })
  .then(r => { if (!r.ok) throw new Error(); return r.blob(); })
  .then(blob => {
    const url   = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onplay  = () => robot.setTalking(true);
    audio.onended = () => {
      robot.setTalking(false);
      URL.revokeObjectURL(url); currentAudio = null;
      onEnd?.();
    };
    audio.onerror = () => {
      robot.setTalking(false);
      URL.revokeObjectURL(url); currentAudio = null;
      onEnd?.();
    };
    audio.play().catch(() => { robot.setTalking(false); onEnd?.(); });
  })
  .catch(() => { robot.setTalking(false); onEnd?.(); });
}

// ── スリープ管理 ──────────────────────────────────────
function resetSleepTimer() {
  clearTimeout(sleepTimer);
  sleepTimer = setTimeout(goToSleep, SLEEP_MS);
}

function goToSleep() {
  sleeping = true;
  clearTimeout(sleepTimer);
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  try { recognition?.abort(); } catch(e) {}
  continuousMode = false;
  canvas.classList.remove('continuous', 'listening-once');
  isBusy = false;
  robot.setEmotion('sleep');
  setStatus('sleeping');
  startWakeWordListening();
}

function wakeUp() {
  if (!sleeping) return;
  sleeping = false;
  stopWakeWordListening();
  robot.setEmotion('excited');
  robot.setAction('nod');
  setStatus('speaking');
  speak('おはよう！何でも話しかけてね！', () => {
    robot.setEmotion('idle');
    resetSleepTimer();
    // 挨拶後すぐ聞き始める
    setTimeout(() => startListening(), 500);
  });
}

// ── 起動ワード検出（バックグラウンド常時聴取） ─────────
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;

function stopWakeWordListening() {
  if (sleepRecRef) {
    try { sleepRecRef.abort(); } catch(e) {}
    sleepRecRef = null;
  }
}

function startWakeWordListening() {
  if (!SpeechRec || !sleeping) return;
  const sr = new SpeechRec();
  sleepRecRef = sr;
  sr.lang = 'ja-JP';
  sr.continuous = false;
  sr.interimResults = false;

  sr.onresult = e => {
    const text = e.results[0][0].transcript;
    if (WAKE_WORDS.test(text)) wakeUp();
  };
  sr.onend = () => {
    if (sleeping && sleepRecRef === sr)
      setTimeout(startWakeWordListening, 400);
  };
  sr.onerror = () => {
    if (sleeping && sleepRecRef === sr)
      setTimeout(startWakeWordListening, 700);
  };
  try { sr.start(); } catch(e) {}
}

// ── 会話 ────────────────────────────────────────────
async function sendMessage(text) {
  if (sleeping || isBusy || !text.trim()) return;
  resetSleepTimer();

  // 寝かしつけワード
  if (SLEEP_WORDS.test(text)) {
    robot.setEmotion('sad');
    setStatus('speaking');
    speak('おやすみ〜！またね！', goToSleep);
    return;
  }

  isBusy = true;
  setStatus('thinking');
  robot.setEmotion('thinking');
  try {
    const res  = await fetch('/api/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, memory: getMemory() }),
    });
    const data = await res.json();

    // 新しく覚えたことがあれば記憶に追加
    if (data.remember) addMemory(data.remember);

    robot.setEmotion(data.emotion || 'idle');
    if (data.action && data.action !== 'none') robot.setAction(data.action);
    setStatus('speaking');
    speak(data.message || '', () => {
      isBusy = false;
      resetSleepTimer();
      setTimeout(() => startListening(), 600);
    });
  } catch {
    robot.setEmotion('sad');
    isBusy = false;
    resetSleepTimer();
    setTimeout(() => startListening(), 800);
  }
}

// ── リセット ─────────────────────────────────────────
async function doReset() {
  await fetch('/api/reset', { method: 'POST' });
  clearMemory();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  stopWakeWordListening();
  clearTimeout(sleepTimer);
  try { recognition?.abort(); } catch(e) {}
  continuousMode = false;
  canvas.classList.remove('continuous', 'listening-once');
  isBusy = false;
  sleeping = false;
  robot.setEmotion('excited');
  setStatus('speaking');
  speak('リセットしたよ！また話しかけてね！', () => {
    robot.setEmotion('idle');
    resetSleepTimer();
    setTimeout(() => startListening(), 500);
  });
}
resetHint.addEventListener('click', doReset);

// ── 会話用音声認識 ────────────────────────────────────
function startListening() {
  if (!recognition || listeningActive || isBusy || sleeping) return;
  try { recognition.start(); } catch(e) {}
}

function updateContMode() {
  if (continuousMode) {
    canvas.classList.add('continuous');
  } else {
    canvas.classList.remove('continuous', 'listening-once');
    if (!isBusy) setStatus('ready');
  }
}

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    listeningActive = true;
    canvas.classList.add('listening-once');
    setStatus('listening');
    robot.setEmotion('happy');
  };
  recognition.onresult = e => {
    listeningActive = false;
    canvas.classList.remove('listening-once');
    const text = e.results[0][0].transcript;
    resetSleepTimer();
    setTimeout(() => sendMessage(text), 200);
  };
  recognition.onend = () => {
    listeningActive = false;
    canvas.classList.remove('listening-once');
    // 起きている＆処理中でなければ自動で聞き直す
    if (!isBusy && !sleeping) setTimeout(() => startListening(), 400);
  };
  recognition.onerror = e => {
    listeningActive = false;
    canvas.classList.remove('listening-once');
    if (e.error === 'no-speech') {
      if (!isBusy && !sleeping) setTimeout(() => startListening(), 400);
      return;
    }
    // 重大エラーは少し間を置いてリトライ
    if (!isBusy && !sleeping) setTimeout(() => startListening(), 1000);
  };

  // ── キャンバス操作 ──────────────────────────────────
  //  スリープ中  : タップ/長押し → 起動
  //  起動中 タップ: 割り込み（話し中・聞き中を止めて聞き直し）
  //  起動中 長押し: 寝かせる
  let pressTimer = null;
  canvas.addEventListener('pointerdown', () => {
    pressTimer = setTimeout(() => {
      pressTimer = null;
      if (sleeping) { wakeUp(); return; }
      // 長押し → スリープ
      goToSleep();
    }, 600);
  });
  canvas.addEventListener('pointerup', () => {
    if (pressTimer) {
      clearTimeout(pressTimer); pressTimer = null;
      if (sleeping) { wakeUp(); return; }
      // タップ → 今の動作を割り込んで聞き直し
      if (currentAudio) { currentAudio.pause(); currentAudio = null; robot.setTalking(false); }
      try { recognition.abort(); } catch(e) {}
      isBusy = false;
      listeningActive = false;
      canvas.classList.remove('listening-once');
      resetSleepTimer();
      setTimeout(() => startListening(), 300);
    }
  });
  canvas.addEventListener('pointercancel', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  });

} else {
  setStatus('ready');
}

// ── 初期化（スリープ状態でスタート） ─────────────────
window.addEventListener('load', () => {
  robot.setEmotion('sleep');
  setStatus('sleeping');
  setTimeout(startWakeWordListening, 800);
});
</script>
</body>
</html>
