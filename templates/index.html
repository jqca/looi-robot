<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Robot</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; width: 100%;
    background: #87CEEB;
    color: #2a3a4a;
    font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
    overflow: hidden;
  }

  #app {
    width: 100%; height: 100vh;
    position: relative;
  }

  #robot-3d {
    position: absolute; inset: 0;
    touch-action: none;
    cursor: grab;
  }
  #robot-3d:active { cursor: grabbing; }

  /* ── ステータスバー ── */
  #status-bar {
    position: absolute; bottom: 68px;
    left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: #4a6a7a;
    user-select: none; height: 20px; z-index: 10;
  }
  #mic-label {
    font-size: 11px; color: #dd3366;
    opacity: 0; transition: opacity .3s;
    letter-spacing: .03em;
  }
  #mic-label.visible { opacity: 1; }
  #reset-hint {
    margin-left: 4px; font-size: 14px;
    opacity: 0.12; cursor: pointer;
    transition: opacity .2s; line-height: 1;
  }
  #reset-hint:hover  { opacity: 0.50; }
  #reset-hint:active { opacity: 0.90; }

  /* ── テキスト入力 ── */
  #text-input-bar {
    position: absolute; bottom: 16px;
    left: 12px; right: 12px;
    display: flex; align-items: center; gap: 8px;
    max-width: 440px; margin: 0 auto; z-index: 10;
  }
  #text-input {
    flex: 1; height: 40px;
    background: rgba(255,255,255,.75);
    border: 1px solid rgba(100,160,200,.4);
    border-radius: 20px;
    padding: 0 16px;
    color: #2a3a4a;
    font-size: 14px;
    outline: none;
    transition: border-color .3s;
  }
  #text-input::placeholder { color: rgba(60,80,100,.4); }
  #text-input:focus { border-color: rgba(80,140,200,.6); }
  #text-send {
    width: 40px; height: 40px; flex-shrink: 0;
    background: rgba(80,140,200,.25);
    border: 1px solid rgba(80,140,200,.4);
    border-radius: 50%;
    color: #3a6a8a;
    font-size: 18px;
    cursor: pointer;
    transition: background .2s, transform .1s;
    display: flex; align-items: center; justify-content: center;
  }
  #text-send:hover { background: rgba(80,140,200,.35); }
  #text-send:active { transform: scale(.9); }

  /* ── ジョイスティック ── */
  #joystick-area {
    position: absolute; bottom: 80px; left: 16px;
    width: 90px; height: 90px;
    border-radius: 50%;
    background: rgba(0,0,0,.08);
    border: 1px solid rgba(0,0,0,.12);
    touch-action: none; z-index: 10;
    display: none;
  }
  #joystick-knob {
    position: absolute; width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(60,120,180,.25);
    border: 1px solid rgba(60,120,180,.4);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  @media (hover: none) and (pointer: coarse) {
    #joystick-area { display: block; }
  }

  /* ── 操作ヒント ── */
  #controls-hint {
    position: absolute; top: 12px; right: 12px;
    font-size: 11px; color: rgba(106,143,168,.5);
    z-index: 10; text-align: right; line-height: 1.6;
    pointer-events: none; user-select: none;
  }
  @media (hover: none) { #controls-hint { display: none; } }

  #start-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(180deg, #87CEEB 0%, #B0E0F0 60%, #d4f0d4 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; cursor: pointer;
    transition: opacity .4s;
  }
  #start-overlay.hidden { opacity: 0; pointer-events: none; }
  #start-overlay .circle {
    width: 120px; height: 120px; border-radius: 50%;
    border: 2px solid rgba(80,140,200,.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    animation: pulse-ring 2s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 0 0 rgba(80,140,200,.3); }
    50% { box-shadow: 0 0 0 16px rgba(80,140,200,0); }
  }
  #start-overlay .label {
    font-size: 15px; color: rgba(40,70,100,.6);
    letter-spacing: 1px;
  }

  /* ── タスク管理パネル ── */
  #task-btn {
    width: 40px; height: 40px; flex-shrink: 0;
    background: rgba(255,255,255,.35);
    border: 1px solid rgba(80,140,200,.3);
    border-radius: 50%;
    color: #4a6a7a;
    font-size: 18px;
    cursor: pointer;
    transition: background .2s, transform .1s;
    display: flex; align-items: center; justify-content: center;
  }
  #task-btn:hover { background: rgba(255,255,255,.50); }
  #task-btn:active { transform: scale(.9); }

  #task-panel {
    position: fixed; inset: 0; z-index: 8000;
    background: rgba(230,240,250,.97);
    display: none; flex-direction: column;
    padding: 20px 16px; overflow-y: auto;
  }
  #task-panel.open { display: flex; }

  #task-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-shrink: 0;
  }
  #task-panel-header h2 {
    font-size: 18px; font-weight: 600; color: #3a6a8a; margin: 0;
  }
  #task-close {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,.05);
    border: 1px solid rgba(0,0,0,.1);
    color: #4a6a7a; font-size: 20px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }
  #task-add-bar {
    display: flex; gap: 8px; margin-bottom: 12px; flex-shrink: 0;
  }
  #task-title-input {
    flex: 1; height: 38px;
    background: rgba(255,255,255,.8);
    border: 1px solid rgba(80,140,200,.3);
    border-radius: 8px; padding: 0 12px;
    color: #2a3a4a; font-size: 14px; outline: none;
  }
  #task-title-input::placeholder { color: rgba(60,80,100,.4); }
  #task-due-input {
    width: 130px; height: 38px;
    background: rgba(255,255,255,.8);
    border: 1px solid rgba(80,140,200,.3);
    border-radius: 8px; padding: 0 8px;
    color: #2a3a4a; font-size: 13px; outline: none;
    color-scheme: light;
  }
  #task-add-btn {
    height: 38px; padding: 0 16px;
    background: rgba(80,140,200,.2);
    border: 1px solid rgba(80,140,200,.3);
    border-radius: 8px; color: #3a6a8a;
    font-size: 14px; cursor: pointer; white-space: nowrap;
  }
  #task-add-btn:hover { background: rgba(80,140,200,.3); }
  #task-filter {
    display: flex; gap: 8px; margin-bottom: 12px; flex-shrink: 0;
  }
  .task-filter-btn {
    padding: 4px 12px; border-radius: 14px;
    background: rgba(255,255,255,.5);
    border: 1px solid rgba(0,0,0,.08);
    color: #4a6a7a; font-size: 12px; cursor: pointer;
  }
  .task-filter-btn.active {
    background: rgba(80,140,200,.2);
    border-color: rgba(80,140,200,.4);
    color: #2a5a7a;
  }
  .task-list { list-style: none; flex: 1; overflow-y: auto; }
  .task-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; margin-bottom: 6px;
    background: rgba(255,255,255,.6);
    border: 1px solid rgba(0,0,0,.06);
    border-radius: 8px; transition: opacity .3s;
  }
  .task-item.done { opacity: .4; }
  .task-item.done .task-item-title { text-decoration: line-through; }
  .task-item.overdue { border-color: rgba(255,100,100,.35); }
  .task-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid rgba(80,140,200,.4);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 12px; color: transparent;
  }
  .task-check.checked {
    background: rgba(80,140,200,.2);
    border-color: rgba(80,140,200,.6);
    color: #3a6a8a;
  }
  .task-item-body { flex: 1; min-width: 0; }
  .task-item-title { font-size: 14px; color: #2a3a4a; }
  .task-item-due { font-size: 11px; color: #5a7a8a; margin-top: 2px; }
  .task-item-due.overdue-text { color: #dd4444; }
  .task-delete {
    width: 28px; height: 28px; border-radius: 50%;
    background: transparent; border: none;
    color: #7a8a9a; font-size: 16px;
    cursor: pointer; flex-shrink: 0;
  }
  .task-delete:hover { color: #dd4444; }
  .task-empty { text-align: center; padding: 32px 0; color: #5a7a8a; font-size: 14px; }

  /* ── ニュースパネル ── */
  #news-panel {
    position: fixed; inset: 0; z-index: 8500;
    background: rgba(15, 25, 40, .96);
    display: none; flex-direction: column;
    padding: 0; overflow: hidden;
  }
  #news-panel.open { display: flex; }

  #news-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 14px;
    background: linear-gradient(135deg, rgba(60,140,200,.15), rgba(100,200,160,.10));
    border-bottom: 1px solid rgba(100,180,220,.15);
    flex-shrink: 0;
  }
  #news-panel-header h2 {
    font-size: 17px; font-weight: 600;
    color: #8cc8e8; margin: 0;
    display: flex; align-items: center; gap: 8px;
  }
  #news-panel-header h2::before {
    content: '📡'; font-size: 20px;
  }
  #news-close {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12);
    color: #8aa8c0; font-size: 20px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: background .2s;
  }
  #news-close:hover { background: rgba(255,255,255,.15); }

  #news-list {
    flex: 1; overflow-y: auto;
    padding: 12px 16px 80px;
  }
  .news-item {
    display: block; text-decoration: none;
    padding: 14px 16px;
    margin-bottom: 8px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(100,180,220,.10);
    border-radius: 12px;
    transition: background .2s, border-color .2s;
  }
  .news-item:hover {
    background: rgba(100,180,220,.10);
    border-color: rgba(100,180,220,.25);
  }
  .news-item-title {
    font-size: 14px; color: #d0e8f4;
    line-height: 1.5; font-weight: 500;
    margin-bottom: 6px;
  }
  .news-item-meta {
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; color: #6a8a9a;
  }
  .news-item-source {
    background: rgba(100,180,220,.12);
    padding: 2px 8px; border-radius: 4px;
    color: #7ab8d8;
  }
  .news-loading {
    text-align: center; padding: 40px 0;
    color: #6a8a9a; font-size: 14px;
  }
  .news-loading::after {
    content: ''; display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(100,180,220,.2);
    border-top-color: #6ab0d8;
    border-radius: 50%;
    animation: news-spin .8s linear infinite;
    margin-left: 8px; vertical-align: middle;
  }
  @keyframes news-spin { to { transform: rotate(360deg); } }
  .news-empty {
    text-align: center; padding: 40px 0;
    color: #6a8a9a; font-size: 14px;
  }
</style>
</head>
<body>

<div id="start-overlay">
  <div class="circle">👋</div>
  <div class="label">タップして開始</div>
</div>

<div id="app">
  <div id="robot-3d"></div>

  <div id="controls-hint">矢印キー: 移動 / ドラッグ: 視点回転</div>

  <div id="status-bar">
    <span id="mic-label"></span>
    <span id="reset-hint" title="リセット">⟳</span>
  </div>

  <div id="text-input-bar">
    <button id="task-btn" title="タスク管理">☰</button>
    <input id="text-input" type="text" placeholder="テキストで指示..." autocomplete="off">
    <button id="text-send" title="送信">▶</button>
  </div>

  <div id="joystick-area">
    <div id="joystick-knob"></div>
  </div>
</div>

<div id="news-panel">
  <div id="news-panel-header">
    <h2>AIニュース</h2>
    <button id="news-close">✕</button>
  </div>
  <div id="news-list"></div>
</div>

<div id="task-panel">
  <div id="task-panel-header">
    <h2>タスク管理</h2>
    <button id="task-close">✕</button>
  </div>
  <div id="task-add-bar">
    <input id="task-title-input" type="text" placeholder="新しいタスク..." autocomplete="off">
    <input id="task-due-input" type="date">
    <button id="task-add-btn">追加</button>
  </div>
  <div id="task-filter">
    <button class="task-filter-btn active" data-filter="pending">未完了</button>
    <button class="task-filter-btn" data-filter="all">すべて</button>
    <button class="task-filter-btn" data-filter="today">今日</button>
  </div>
  <ul class="task-list" id="task-list"></ul>
</div>

<script>
// ════════════════════════════════════════════════════
// 3D ROBOT RENDERER (Three.js)
// ════════════════════════════════════════════════════
const EMOTION_COLORS = {
  idle:      { primary: 0x8EBBA8, lens: 0x3399DD, body: 0x8EBBA8, cheek: 0xFFB0C0 },
  happy:     { primary: 0x9ECCA0, lens: 0x44BBEE, body: 0x96C4A8, cheek: 0xFF8FA0 },
  sleep:     { primary: 0x7AA090, lens: 0x6688AA, body: 0x80A898, cheek: 0xCC9AAA },
  excited:   { primary: 0x80D8B8, lens: 0x55CCFF, body: 0x90CCA8, cheek: 0xFF7788 },
  thinking:  { primary: 0x88AAC0, lens: 0x7799EE, body: 0x88B0A8, cheek: 0xBBAACC },
  sad:       { primary: 0x7A9A90, lens: 0x6688AA, body: 0x80A09A, cheek: 0xAA99AA },
  surprised: { primary: 0x80CCB8, lens: 0xEE88CC, body: 0x90C0A8, cheek: 0xFF88AA },
  angry:     { primary: 0xCC8878, lens: 0xFF4444, body: 0xA09888, cheek: 0xFF5555 },
};

class RobotRenderer3D {
  constructor(container) {
    this.container = container;
    this.emotion = 'sleep';
    this.talking = false;
    this.action = 'none';
    this.actionTimer = 0;
    this.blinkAmt = 0;
    this.blinking = false;
    this.blinkTimer = 0;
    this.blinkNext = 3000 + Math.random() * 5000;
    this.bobPhase = 0;
    this.talkPhase = 0;
    this.excitedPhase = 0;
    this.excitedY = 0;
    this.headTiltX = 0;
    this.headTiltXTgt = 0;
    this.headTiltY = 0;
    this.headTiltYTgt = 0;
    this.listening = false;
    this.listenPhase = 0;

    // Idle curiosity (eye wander + head tilt)
    this.idleTimer = 0;
    this.idleWanderX = 0;
    this.idleWanderY = 0;
    this.idleWanderTgtX = 0;
    this.idleWanderTgtY = 0;
    this.nextIdleWander = 2000 + Math.random() * 4000;
    this.idleTiltZ = 0;
    this.idleTiltZTgt = 0;

    this.camAngle = Math.PI;
    this.camPitch = 0.35;
    this.camDist = 9;
    this._lastDrag = null;

    this.moveInput = { x: 0, z: 0 };
    this.velocity = { x: 0, z: 0 };
    this.targetRotY = Math.PI;

    this._initScene();
    this._buildRobot();
    this.lastTS = performance.now();
    this._animate = this._animate.bind(this);
    requestAnimationFrame(this._animate);
  }

  setEmotion(e) { this.emotion = e; }
  setTalking(v) { this.talking = v; }
  setAction(a) {
    if (a === 'none') return;
    this.action = a;
    this.actionTimer = 0;
    this.dancePhase = 0;
  }
  blink() { if (!this.blinking) { this.blinking = true; this.blinkAmt = 0; } }
  setListening(v) { this.listening = v; }
  setMoveDirection(x, z) { this.moveInput.x = x; this.moveInput.z = z; }

  resize() {
    const w = this.container.clientWidth;
    const h = this.container.clientHeight;
    this.camera.aspect = w / h;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(w, h);
  }

  _camDragStart(x, y) { this._lastDrag = { x, y }; }
  _camDragMove(x, y) {
    if (!this._lastDrag) return;
    this.camAngle -= (x - this._lastDrag.x) * 0.006;
    this.camPitch = Math.max(0.1, Math.min(1.1, this.camPitch + (y - this._lastDrag.y) * 0.006));
    this._lastDrag = { x, y };
  }
  _camDragEnd() { this._lastDrag = null; }

  _initScene() {
    const w = this.container.clientWidth;
    const h = this.container.clientHeight;

    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x87CEEB);
    this.scene.fog = new THREE.FogExp2(0x87CEEB, 0.018);

    this.camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 120);

    this.renderer = new THREE.WebGLRenderer({ antialias: true });
    this.renderer.setSize(w, h);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.container.appendChild(this.renderer.domElement);

    this.ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    this.scene.add(this.ambientLight);

    this.headLight = new THREE.PointLight(0xffeecc, 1.0, 18);
    this.headLight.castShadow = true;
    this.scene.add(this.headLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 15, 8);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 40;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    this.scene.add(dirLight);

    const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x999999, 0.5);
    this.scene.add(hemiLight);

    const grid = new THREE.GridHelper(60, 60, 0x999999, 0xc0c0c0);
    grid.material.transparent = true;
    grid.material.opacity = 0.3;
    this.scene.add(grid);

    const groundGeo = new THREE.PlaneGeometry(80, 80);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0xB0B0B0, roughness: 0.85, metalness: 0.05
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.01;
    ground.receiveShadow = true;
    this.scene.add(ground);
  }

  _buildRobot() {
    this.robotGroup = new THREE.Group();
    this.bodyPivot = new THREE.Group();
    this.robotGroup.add(this.bodyPivot);

    // ── BODY (industrial trapezoidal chassis) ──
    const bwB = 0.82, bwT = 0.58, bh = 0.52, bDepth = 1.30;
    const bodyShape = new THREE.Shape();
    const bcr = 0.06;
    bodyShape.moveTo(-bwB + bcr, -bh);
    bodyShape.lineTo(bwB - bcr, -bh);
    bodyShape.quadraticCurveTo(bwB, -bh, bwB - 0.02, -bh + bcr);
    bodyShape.lineTo(bwT + 0.02, bh - bcr);
    bodyShape.quadraticCurveTo(bwT, bh, bwT - bcr, bh);
    bodyShape.lineTo(-bwT + bcr, bh);
    bodyShape.quadraticCurveTo(-bwT, bh, -bwT - 0.02, bh - bcr);
    bodyShape.lineTo(-bwB + 0.02, -bh + bcr);
    bodyShape.quadraticCurveTo(-bwB, -bh, -bwB + bcr, -bh);
    const bodyGeo = new THREE.ExtrudeGeometry(bodyShape, {
      depth: bDepth, bevelEnabled: true,
      bevelThickness: 0.04, bevelSize: 0.04, bevelSegments: 2
    });
    bodyGeo.center();
    this.bodyMat = new THREE.MeshStandardMaterial({
      color: 0x8EBBA8, roughness: 0.60, metalness: 0.10,
      emissive: 0x3A5A48, emissiveIntensity: 0.06,
    });
    this.bodyMesh = new THREE.Mesh(bodyGeo, this.bodyMat);
    this.bodyMesh.position.y = 1.55;
    this.bodyMesh.castShadow = true;
    this.bodyPivot.add(this.bodyMesh);

    // Body edge highlights
    const bodyEdges = new THREE.EdgesGeometry(bodyGeo, 20);
    this.bodyLine = new THREE.LineSegments(bodyEdges,
      new THREE.LineBasicMaterial({ color: 0xA0D0B8, transparent: true, opacity: 0.25 }));
    this.bodyLine.position.copy(this.bodyMesh.position);
    this.bodyPivot.add(this.bodyLine);

    // ── Front hatch panel (lighter, slightly protruding) ──
    const hatchW = bwT * 1.3, hatchH = bh * 1.3;
    const hatchGeo = new THREE.BoxGeometry(hatchW, hatchH, 0.05);
    const hatchMat = new THREE.MeshStandardMaterial({
      color: 0xC8DDD0, roughness: 0.55, metalness: 0.08
    });
    const hatch = new THREE.Mesh(hatchGeo, hatchMat);
    hatch.position.set(0, 1.55, bDepth / 2 + 0.05);
    this.bodyPivot.add(hatch);

    // Hatch horizontal seam lines
    for (const hy of [-0.15, 0.15]) {
      const seamGeo = new THREE.BoxGeometry(hatchW * 0.92, 0.008, 0.008);
      const seam = new THREE.Mesh(seamGeo, new THREE.MeshStandardMaterial({
        color: 0x6A9A80, roughness: 0.6, metalness: 0.3
      }));
      seam.position.set(0, 1.55 + hy, bDepth / 2 + 0.076);
      this.bodyPivot.add(seam);
    }

    // ── Rivets on front face ──
    const rivetMat = new THREE.MeshStandardMaterial({ color: 0xB0B4BB, roughness: 0.3, metalness: 0.8 });
    const rivetGeo = new THREE.SphereGeometry(0.018, 6, 6);
    const rZ = bDepth / 2 + 0.058;
    const rivets = [
      [-hatchW/2+0.04, bh*0.5], [hatchW/2-0.04, bh*0.5],
      [-hatchW/2+0.04, -bh*0.5], [hatchW/2-0.04, -bh*0.5],
      [-hatchW/2+0.04, 0], [hatchW/2-0.04, 0],
      [0, bh*0.5], [0, -bh*0.5],
    ];
    for (const [rx, ry] of rivets) {
      const r = new THREE.Mesh(rivetGeo, rivetMat);
      r.position.set(rx, 1.55 + ry, rZ);
      this.bodyPivot.add(r);
    }

    // ── Hinge bolts at top of hatch ──
    const hingeMat = new THREE.MeshStandardMaterial({ color: 0x9A9EA5, roughness: 0.3, metalness: 0.7 });
    for (const hx of [-hatchW/2 + 0.05, hatchW/2 - 0.05]) {
      const hinge = new THREE.Mesh(
        new THREE.CylinderGeometry(0.022, 0.022, 0.06, 8), hingeMat);
      hinge.rotation.x = Math.PI / 2;
      hinge.position.set(hx, 1.55 + hatchH/2 - 0.04, bDepth / 2 + 0.08);
      this.bodyPivot.add(hinge);
    }

    // ── Front vent grilles (flanking hatch) ──
    for (const sx of [-1, 1]) {
      for (let vi = 0; vi < 3; vi++) {
        const vent = new THREE.Mesh(
          new THREE.BoxGeometry(0.10, 0.014, 0.014),
          new THREE.MeshStandardMaterial({ color: 0x3A4A42, roughness: 0.9, metalness: 0.1 })
        );
        vent.position.set(sx * (hatchW/2 + 0.12), 1.55 + (vi - 1) * 0.07, bDepth / 2 + 0.05);
        this.bodyPivot.add(vent);
      }
    }

    // ── Top plate with grab handle ──
    const topPlate = new THREE.Mesh(
      new THREE.BoxGeometry(bwT * 1.75, 0.04, bDepth * 0.82),
      new THREE.MeshStandardMaterial({ color: 0x7AAA98, roughness: 0.55, metalness: 0.15 })
    );
    topPlate.position.set(0, 1.55 + bh + 0.02, 0);
    this.bodyPivot.add(topPlate);

    const handleMat = new THREE.MeshStandardMaterial({ color: 0x7A9A8A, roughness: 0.4, metalness: 0.5 });
    const handle = new THREE.Mesh(
      new THREE.TorusGeometry(0.06, 0.015, 6, 12, Math.PI), handleMat);
    handle.rotation.y = Math.PI / 2;
    handle.position.set(0, 1.55 + bh + 0.10, -0.10);
    this.bodyPivot.add(handle);

    // ── Bottom bumper (wider, darker) ──
    const bumper = new THREE.Mesh(
      new THREE.BoxGeometry(bwB * 2.05, 0.06, bDepth * 0.90),
      new THREE.MeshStandardMaterial({ color: 0x5A7A6A, roughness: 0.7, metalness: 0.20 })
    );
    bumper.position.set(0, 1.55 - bh - 0.01, 0);
    this.bodyPivot.add(bumper);

    // ── NECK (telescoping stalk) ──
    const neckGeo = new THREE.CylinderGeometry(0.08, 0.10, 0.7, 8);
    const metalMat = new THREE.MeshStandardMaterial({
      color: 0x7A9A8A, roughness: 0.4, metalness: 0.5
    });
    const neck = new THREE.Mesh(neckGeo, metalMat);
    neck.position.y = 2.55;
    this.bodyPivot.add(neck);

    // Neck joint ring
    const ringGeo = new THREE.TorusGeometry(0.11, 0.025, 8, 16);
    const ring = new THREE.Mesh(ringGeo, metalMat.clone());
    ring.rotation.x = Math.PI / 2;
    ring.position.y = 2.2;
    this.bodyPivot.add(ring);

    // ── EYE UNIT (binocular assembly) ──
    this.eyeUnit = new THREE.Group();
    this.eyeUnit.position.y = 3.1;
    this._buildEyes();
    this.bodyPivot.add(this.eyeUnit);

    // ── ARMS ──
    this._buildArm(1);
    this._buildArm(-1);

    // ── Cheek LEDs (emotion-responsive, beside eyes like Pikachu's cheeks) ──
    this.cheekLeds = [];
    for (const sx of [-1, 1]) {
      const cheekLed = new THREE.Mesh(
        new THREE.SphereGeometry(0.10, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xFFB0C0, transparent: true, opacity: 0.50 })
      );
      cheekLed.position.set(sx * 0.55, -0.28, 0.20);
      this.eyeUnit.add(cheekLed);
      this.cheekLeds.push(cheekLed);
    }

    // ── TRACKS ──
    this._buildTrack(1);
    this._buildTrack(-1);

    this.robotGroup.rotation.y = Math.PI;
    this.scene.add(this.robotGroup);
  }

  _buildEyes() {
    this.eyes = {};
    const metalMat = new THREE.MeshStandardMaterial({
      color: 0x8EBBA8, roughness: 0.30, metalness: 0.35
    });

    // Bridge connecting the two eye tubes
    const bridgeGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.35, 8);
    const bridge = new THREE.Mesh(bridgeGeo, metalMat);
    bridge.rotation.z = Math.PI / 2;
    bridge.position.set(0, 0, 0.05);
    this.eyeUnit.add(bridge);

    for (const side of ['left', 'right']) {
      const sign = side === 'left' ? -1 : 1;
      const g = new THREE.Group();
      g.position.set(sign * 0.34, 0, 0);

      // Eye tube (binocular barrel) — BIGGER
      const tubeGeo = new THREE.CylinderGeometry(0.30, 0.33, 0.45, 32);
      const tubeMat = new THREE.MeshStandardMaterial({
        color: 0x8EBBA8, roughness: 0.25, metalness: 0.35
      });
      const tube = new THREE.Mesh(tubeGeo, tubeMat);
      tube.rotation.x = Math.PI / 2;
      tube.castShadow = true;
      g.add(tube);

      // Lens ring (rim)
      const rimGeo = new THREE.TorusGeometry(0.31, 0.03, 8, 32);
      const rimMat = new THREE.MeshStandardMaterial({
        color: 0x7AAA98, roughness: 0.25, metalness: 0.5
      });
      const rim = new THREE.Mesh(rimGeo, rimMat);
      rim.position.z = 0.23;
      g.add(rim);

      // Lens background (white sclera)
      const lensBack = new THREE.Mesh(
        new THREE.CircleGeometry(0.28, 32),
        new THREE.MeshBasicMaterial({ color: 0xf0f5ff })
      );
      lensBack.position.z = 0.225;
      g.add(lensBack);

      // Iris (large, bright blue)
      const lens = new THREE.Mesh(
        new THREE.CircleGeometry(0.18, 32),
        new THREE.MeshBasicMaterial({ color: 0x3399DD })
      );
      lens.position.z = 0.23;
      g.add(lens);

      // Pupil (dark center — moves for gaze!)
      const pupilGroup = new THREE.Group();
      pupilGroup.position.z = 0.235;
      const pupil = new THREE.Mesh(
        new THREE.CircleGeometry(0.08, 16),
        new THREE.MeshBasicMaterial({ color: 0x0a0a1a })
      );
      pupilGroup.add(pupil);

      // Highlight (big, white catch-light)
      const highlight = new THREE.Mesh(
        new THREE.CircleGeometry(0.045, 12),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.95 })
      );
      highlight.position.set(0.06, 0.06, 0.001);
      pupilGroup.add(highlight);

      // Small secondary highlight
      const highlight2 = new THREE.Mesh(
        new THREE.CircleGeometry(0.02, 8),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 })
      );
      highlight2.position.set(-0.04, -0.04, 0.001);
      pupilGroup.add(highlight2);

      g.add(pupilGroup);

      // Upper eyelid (shutter plate)
      const lidGeo = new THREE.BoxGeometry(0.66, 0.32, 0.05);
      const lidMat = new THREE.MeshStandardMaterial({
        color: 0x8EBBA8, roughness: 0.35, metalness: 0.30
      });
      const eyelid = new THREE.Mesh(lidGeo, lidMat);
      eyelid.position.set(0, 0.42, 0.16);
      g.add(eyelid);

      // Lower eyelid
      const lowerLid = new THREE.Mesh(lidGeo.clone(), lidMat.clone());
      lowerLid.position.set(0, -0.42, 0.16);
      g.add(lowerLid);

      this.eyeUnit.add(g);
      this.eyes[side] = { group: g, tube, lens, lensBack, pupil: pupilGroup, highlight, rim, eyelid, lowerLid };
    }
  }

  _buildArm(sideSign) {
    const armGroup = new THREE.Group();
    // Body half-width at shoulder height (y=1.65): ~0.66
    // Track inner face: 1.02 - 0.16 = 0.86
    // Arm must stay between body surface and track
    const ax = sideSign * 0.67;
    const metalMat = new THREE.MeshStandardMaterial({
      color: 0x7A9A8A, roughness: 0.4, metalness: 0.5
    });

    // Shoulder mount bracket (connects body to joint)
    const bracket = new THREE.Mesh(
      new THREE.BoxGeometry(0.10, 0.06, 0.08), metalMat);
    bracket.position.set(ax, 1.65, 0);
    armGroup.add(bracket);

    // Shoulder joint (on body surface)
    const shoulder = new THREE.Mesh(
      new THREE.SphereGeometry(0.065, 12, 12), metalMat);
    shoulder.position.set(ax + sideSign * 0.04, 1.63, 0);
    armGroup.add(shoulder);

    // Upper arm
    const upper = new THREE.Mesh(
      new THREE.CylinderGeometry(0.042, 0.042, 0.40, 8), metalMat);
    upper.position.set(ax + sideSign * 0.10, 1.42, 0);
    upper.rotation.z = sideSign * 0.25;
    armGroup.add(upper);

    // Elbow joint
    const elbow = new THREE.Mesh(
      new THREE.SphereGeometry(0.048, 8, 8), metalMat);
    elbow.position.set(ax + sideSign * 0.15, 1.22, 0);
    armGroup.add(elbow);

    // Forearm
    const fore = new THREE.Mesh(
      new THREE.CylinderGeometry(0.035, 0.035, 0.36, 8), metalMat);
    fore.position.set(ax + sideSign * 0.15, 1.02, 0);
    armGroup.add(fore);

    // Hand (two-finger claw)
    for (const fz of [-0.035, 0.035]) {
      const finger = new THREE.Mesh(
        new THREE.BoxGeometry(0.025, 0.13, 0.018),
        new THREE.MeshStandardMaterial({ color: 0xC8DDD0, roughness: 0.5, metalness: 0.2 })
      );
      finger.position.set(ax + sideSign * 0.15, 0.78, fz);
      armGroup.add(finger);
    }

    this.bodyPivot.add(armGroup);
  }

  _buildTrack(sideSign) {
    const trackGroup = new THREE.Group();
    const tx = sideSign * 1.02;
    const trackW = 0.32;

    // ── Triangular/trapezoidal belt profile ──
    const botHalf = 0.72;   // half-length of flat bottom
    const topHalf = 0.30;   // half-length of flat top (narrower)
    const hH = 0.375;       // half-height (total 0.75)
    const cr = 0.09;        // corner rounding
    const beltY = 0.50;     // belt center Y position

    const shape = new THREE.Shape();
    // Bottom-left → clockwise
    shape.moveTo(-botHalf + cr, -hH);
    // Bottom edge (flat, wide)
    shape.lineTo(botHalf - cr, -hH);
    // Bottom-right corner → rear slope
    shape.quadraticCurveTo(botHalf, -hH, botHalf - 0.04, -hH + cr);
    // Rear slope up (steep diagonal)
    shape.lineTo(topHalf + 0.04, hH - cr);
    // Top-right corner (sprocket zone)
    shape.quadraticCurveTo(topHalf, hH, topHalf - cr, hH);
    // Top edge (flat, narrow)
    shape.lineTo(-topHalf + cr, hH);
    // Top-left corner (idler zone)
    shape.quadraticCurveTo(-topHalf, hH, -topHalf - 0.04, hH - cr);
    // Front slope down
    shape.lineTo(-botHalf + 0.04, -hH + cr);
    // Bottom-left corner
    shape.quadraticCurveTo(-botHalf, -hH, -botHalf + cr, -hH);

    const beltGeo = new THREE.ExtrudeGeometry(shape, { depth: trackW, bevelEnabled: false });
    const beltMat = new THREE.MeshStandardMaterial({
      color: 0x3A4A42, roughness: 0.85, metalness: 0.25,
      emissive: 0x0A1A12, emissiveIntensity: 0.08,
    });
    const belt = new THREE.Mesh(beltGeo, beltMat);
    belt.rotation.y = Math.PI / 2;
    belt.position.set(tx - trackW / 2, beltY, 0);
    belt.castShadow = true;
    trackGroup.add(belt);

    // Belt outline
    const beltEdges = new THREE.EdgesGeometry(beltGeo);
    const beltLine = new THREE.LineSegments(beltEdges,
      new THREE.LineBasicMaterial({ color: 0x6AAA90, transparent: true, opacity: 0.25 }));
    beltLine.rotation.y = Math.PI / 2;
    beltLine.position.set(tx - trackW / 2, beltY, 0);
    trackGroup.add(beltLine);

    // ── Shared wheel materials ──
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x4A5A52, roughness: 0.50, metalness: 0.45 });
    const hubMat = new THREE.MeshStandardMaterial({ color: 0x8EBBA8, roughness: 0.35, metalness: 0.5 });
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x4A5A50, roughness: 0.5, metalness: 0.4 });

    // ── DRIVE SPROCKET (rear top — largest wheel with teeth) ──
    const spR = 0.17;
    const spY = beltY + hH - spR * 0.6;
    const spZ = -(topHalf * 0.75);
    const sprocket = new THREE.Mesh(
      new THREE.CylinderGeometry(spR, spR, trackW + 0.04, 20), wheelMat);
    sprocket.rotation.z = Math.PI / 2;
    sprocket.position.set(tx, spY, spZ);
    trackGroup.add(sprocket);
    // Sprocket hub
    const spHub = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, trackW + 0.08, 8), hubMat);
    spHub.rotation.z = Math.PI / 2;
    spHub.position.set(tx, spY, spZ);
    trackGroup.add(spHub);
    // Sprocket tooth ring
    const spTeeth = new THREE.Mesh(
      new THREE.TorusGeometry(spR + 0.01, 0.015, 6, 20), darkMat);
    spTeeth.position.set(tx, spY, spZ);
    trackGroup.add(spTeeth);
    // Sprocket spokes (cross pattern)
    for (let a = 0; a < 3; a++) {
      const angle = (a / 3) * Math.PI;
      const spokeGeo = new THREE.BoxGeometry(trackW * 0.6, 0.025, spR * 1.6);
      const spoke = new THREE.Mesh(spokeGeo, hubMat);
      spoke.position.set(tx, spY, spZ);
      spoke.rotation.x = angle;
      trackGroup.add(spoke);
    }

    // ── IDLER WHEEL (front top — medium) ──
    const idR = 0.13;
    const idY = beltY + hH - idR * 0.55;
    const idZ = topHalf * 0.75;
    const idler = new THREE.Mesh(
      new THREE.CylinderGeometry(idR, idR, trackW + 0.02, 16), wheelMat);
    idler.rotation.z = Math.PI / 2;
    idler.position.set(tx, idY, idZ);
    trackGroup.add(idler);
    const idHub = new THREE.Mesh(
      new THREE.CylinderGeometry(0.04, 0.04, trackW + 0.06, 8), hubMat);
    idHub.rotation.z = Math.PI / 2;
    idHub.position.set(tx, idY, idZ);
    trackGroup.add(idHub);

    // ── ROAD WHEELS (4 along the bottom — smaller) ──
    const rwR = 0.11;
    const rwCount = 4;
    const rwSpan = botHalf * 1.4;
    for (let i = 0; i < rwCount; i++) {
      const frac = (i + 0.5) / rwCount;
      const rwZ = -rwSpan / 2 + frac * rwSpan;
      const rwY = beltY - hH + rwR + 0.015;
      const rw = new THREE.Mesh(
        new THREE.CylinderGeometry(rwR, rwR, trackW + 0.02, 14), wheelMat);
      rw.rotation.z = Math.PI / 2;
      rw.position.set(tx, rwY, rwZ);
      trackGroup.add(rw);
      // Road wheel hub
      const rwHub = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.03, trackW + 0.06, 6), hubMat);
      rwHub.rotation.z = Math.PI / 2;
      rwHub.position.set(tx, rwY, rwZ);
      trackGroup.add(rwHub);
    }

    // ── RETURN ROLLERS (2 small, between sprocket & idler on top) ──
    const rrR = 0.045;
    for (const rrZ of [-0.06, 0.06]) {
      const rr = new THREE.Mesh(
        new THREE.CylinderGeometry(rrR, rrR, trackW - 0.04, 8), darkMat);
      rr.rotation.z = Math.PI / 2;
      rr.position.set(tx, beltY + hH + rrR * 0.3, rrZ);
      trackGroup.add(rr);
    }

    // ── TRACK LINK PLATES (along the bottom) ──
    const linkMat = new THREE.MeshStandardMaterial({ color: 0x3A4A42, roughness: 0.9, metalness: 0.3 });
    const linkCount = 14;
    for (let i = 0; i < linkCount; i++) {
      const frac = (i + 0.5) / linkCount;
      const lz = -botHalf * 0.92 + frac * botHalf * 1.84;
      const link = new THREE.Mesh(
        new THREE.BoxGeometry(trackW + 0.06, 0.032, 0.055), linkMat);
      link.position.set(tx, beltY - hH - 0.016, lz);
      trackGroup.add(link);
    }

    // ── SUSPENSION ARMS (road wheels → body frame) ──
    const armMat = new THREE.MeshStandardMaterial({ color: 0x5A7A6A, roughness: 0.5, metalness: 0.45 });
    for (let i = 0; i < rwCount; i++) {
      const frac = (i + 0.5) / rwCount;
      const aZ = -rwSpan / 2 + frac * rwSpan;
      const aY1 = beltY - hH + rwR + 0.015;  // wheel center
      const aY2 = beltY + 0.10;              // frame attach
      const armLen = aY2 - aY1;
      const arm = new THREE.Mesh(
        new THREE.BoxGeometry(0.022, armLen, 0.022), armMat);
      arm.position.set(tx, (aY1 + aY2) / 2, aZ);
      trackGroup.add(arm);
    }

    // ── Tread lines (outer face detail) ──
    const outerX = tx + sideSign * (trackW / 2 + 0.005);
    for (let i = 0; i < 16; i++) {
      const frac = i / 16;
      const tz = -botHalf * 0.88 + frac * botHalf * 1.76;
      const pts = [
        new THREE.Vector3(outerX, beltY - hH + 0.03, tz),
        new THREE.Vector3(outerX, beltY + hH - 0.03, tz)
      ];
      const lg = new THREE.BufferGeometry().setFromPoints(pts);
      trackGroup.add(new THREE.Line(lg,
        new THREE.LineBasicMaterial({ color: 0x5A7A6A, transparent: true, opacity: 0.2 })));
    }

    this.bodyPivot.add(trackGroup);
  }

  _rndBlink() {
    const rates = {
      idle: [3000, 5000], happy: [1800, 3500], excited: [1200, 2500],
      thinking: [5000, 9000], sad: [4000, 8000], surprised: [7000, 12000], angry: [1500, 3000],
    };
    const [min, range] = rates[this.emotion] || [3000, 5000];
    return min + Math.random() * range;
  }

  _animate(ts) {
    const dt = Math.min(0.05, (ts - this.lastTS) / 1000);
    this.lastTS = ts;
    this._update(dt);
    this._updateEyes();
    this._updateColors();
    this._updateCamera();
    this.renderer.render(this.scene, this.camera);
    requestAnimationFrame(this._animate);
  }

  _update(dt) {
    const isSleep = this.emotion === 'sleep';
    const lerp = 1 - Math.exp(-8 * dt);

    const bobSpeed = isSleep ? 0.5 : this.talking ? 4.0 : 1.2;
    const bobAmp = isSleep ? 0.02 : 0.05;
    this.bobPhase += dt * bobSpeed;
    this.bodyPivot.position.y = Math.sin(this.bobPhase) * bobAmp;

    if (this.emotion === 'excited') {
      this.excitedPhase += dt * 7.5;
      this.excitedY = Math.abs(Math.sin(this.excitedPhase)) * 0.12;
    } else {
      this.excitedPhase = 0;
      this.excitedY += (0 - this.excitedY) * Math.min(1, dt * 10);
    }
    this.bodyPivot.position.y += this.excitedY;

    if (!isSleep) {
      this.blinkTimer += dt * 1000;
      if (!this.blinking && this.blinkTimer > this.blinkNext) {
        this.blinking = true; this.blinkAmt = 0;
        this.blinkTimer = 0; this.blinkNext = this._rndBlink();
      }
      if (this.blinking) {
        this.blinkAmt += dt * 12;
        if (this.blinkAmt >= 1) { this.blinkAmt = 1; this.blinking = false; }
      } else {
        this.blinkAmt = Math.max(0, this.blinkAmt - dt * 12);
      }
    } else {
      this.blinkAmt = 0;
    }

    // Head + body actions (nod/shake/move/dance)
    if (this.action !== 'none') {
      this.actionTimer += dt;
      if (this.action === 'nod') {
        this.headTiltXTgt = Math.sin(this.actionTimer * Math.PI / 0.3) * 0.15;
        if (this.actionTimer > 0.7) { this.action = 'none'; this.headTiltXTgt = 0; }
      } else if (this.action === 'shake') {
        this.headTiltYTgt = Math.sin(this.actionTimer * Math.PI * 3) * 0.12;
        if (this.actionTimer > 0.9) { this.action = 'none'; this.headTiltYTgt = 0; }

      // ── Movement actions ──
      } else if (this.action === 'forward') {
        const ry = this.robotGroup.rotation.y;
        this.robotGroup.position.x += Math.sin(ry) * 2.5 * dt;
        this.robotGroup.position.z += Math.cos(ry) * 2.5 * dt;
        if (this.actionTimer > 1.8) { this.action = 'none'; }
      } else if (this.action === 'backward') {
        const ry = this.robotGroup.rotation.y;
        this.robotGroup.position.x -= Math.sin(ry) * 2.0 * dt;
        this.robotGroup.position.z -= Math.cos(ry) * 2.0 * dt;
        if (this.actionTimer > 1.5) { this.action = 'none'; }
      } else if (this.action === 'turn_right') {
        this.targetRotY -= dt * 3.0;
        if (this.actionTimer > 0.6) { this.action = 'none'; }
      } else if (this.action === 'turn_left') {
        this.targetRotY += dt * 3.0;
        if (this.actionTimer > 0.6) { this.action = 'none'; }
      } else if (this.action === 'turn_around') {
        this.targetRotY += dt * 3.5;
        if (this.actionTimer > 1.0) { this.action = 'none'; }
      } else if (this.action === 'spin') {
        this.targetRotY += dt * 8.0;
        this.bodyPivot.position.y = Math.abs(Math.sin(this.actionTimer * 6)) * 0.10;
        if (this.actionTimer > 2.5) { this.action = 'none'; }

      // ── Dance action ──
      } else if (this.action === 'dance') {
        this.dancePhase = (this.dancePhase || 0) + dt;
        const dp = this.dancePhase;
        // Body bounce
        this.bodyPivot.position.y = Math.abs(Math.sin(dp * 5)) * 0.15;
        // Body sway side to side
        this.bodyPivot.position.x = Math.sin(dp * 3) * 0.12;
        // Head groove
        this.headTiltXTgt = Math.sin(dp * 4) * 0.12;
        this.headTiltYTgt = Math.cos(dp * 3) * 0.10;
        this.idleTiltZTgt = Math.sin(dp * 2.5) * 0.15;
        // Gentle rotation sway
        this.targetRotY += Math.sin(dp * 2) * dt * 1.5;
        // End after ~4 seconds
        if (this.actionTimer > 4.0) {
          this.action = 'none';
          this.headTiltXTgt = 0; this.headTiltYTgt = 0; this.idleTiltZTgt = 0;
          this.bodyPivot.position.x = 0;
        }

      // ── Jump action ──
      } else if (this.action === 'jump') {
        const jt = this.actionTimer;
        if (jt < 0.4) {
          this.bodyPivot.position.y = Math.sin(jt / 0.4 * Math.PI) * 0.5;
        } else if (jt < 0.8) {
          this.bodyPivot.position.y = Math.sin((jt - 0.4) / 0.4 * Math.PI) * 0.35;
        } else if (jt < 1.1) {
          this.bodyPivot.position.y = Math.sin((jt - 0.8) / 0.3 * Math.PI) * 0.15;
        }
        if (this.actionTimer > 1.2) { this.action = 'none'; }
      }
    }
    this.headTiltX += (this.headTiltXTgt - this.headTiltX) * lerp;
    this.headTiltY += (this.headTiltYTgt - this.headTiltY) * lerp;
    this.eyeUnit.rotation.x = this.headTiltX;
    this.eyeUnit.rotation.y = this.headTiltY;

    // Idle curiosity — eye wander + head tilt
    if (!isSleep && this.action === 'none' && !this.talking) {
      this.idleTimer += dt * 1000;
      if (this.idleTimer > this.nextIdleWander) {
        this.idleTimer = 0;
        this.nextIdleWander = 2000 + Math.random() * 5000;
        this.idleWanderTgtX = (Math.random() - 0.5) * 0.08;
        this.idleWanderTgtY = (Math.random() - 0.5) * 0.06;
        this.idleTiltZTgt = (Math.random() - 0.5) * 0.12;
      }
      this.idleWanderX += (this.idleWanderTgtX - this.idleWanderX) * lerp * 0.3;
      this.idleWanderY += (this.idleWanderTgtY - this.idleWanderY) * lerp * 0.3;
      this.idleTiltZ += (this.idleTiltZTgt - this.idleTiltZ) * lerp * 0.2;
    } else {
      this.idleWanderX *= 0.95; this.idleWanderY *= 0.95; this.idleTiltZ *= 0.95;
    }
    this.eyeUnit.rotation.z = this.idleTiltZ;

    if (this.talking) this.talkPhase += dt * 10;
    if (this.listening) this.listenPhase += dt * 8;

    const ca = this.camAngle;
    const fwd = [-Math.sin(ca), -Math.cos(ca)];
    const rgt = [Math.cos(ca), -Math.sin(ca)];
    const wx = this.moveInput.x * rgt[0] + this.moveInput.z * fwd[0];
    const wz = this.moveInput.x * rgt[1] + this.moveInput.z * fwd[1];

    const speed = 4.0;
    const accel = 12.0;
    const friction = 8.0;

    if (Math.abs(this.moveInput.x) > 0.01 || Math.abs(this.moveInput.z) > 0.01) {
      this.velocity.x += (wx * speed - this.velocity.x) * Math.min(1, accel * dt);
      this.velocity.z += (wz * speed - this.velocity.z) * Math.min(1, accel * dt);
      this.targetRotY = Math.atan2(wx, wz) + Math.PI;
    } else {
      this.velocity.x += (0 - this.velocity.x) * Math.min(1, friction * dt);
      this.velocity.z += (0 - this.velocity.z) * Math.min(1, friction * dt);
    }

    this.robotGroup.position.x += this.velocity.x * dt;
    this.robotGroup.position.z += this.velocity.z * dt;

    let angleDiff = this.targetRotY - this.robotGroup.rotation.y;
    while (angleDiff > Math.PI) angleDiff -= 2 * Math.PI;
    while (angleDiff < -Math.PI) angleDiff += 2 * Math.PI;
    this.robotGroup.rotation.y += angleDiff * (1 - Math.exp(-10 * dt));
  }

  _updateEyes() {
    const em = this.emotion;
    // Eyelid control: 0 = fully open, 1 = fully closed
    let lidClose = this.blinkAmt * 0.95;

    if (em === 'sleep') lidClose = 0.95;
    else if (em === 'sad') lidClose = Math.max(lidClose, 0.35);
    else if (em === 'happy') lidClose = Math.max(lidClose, 0.25);
    else if (em === 'angry') lidClose = Math.max(lidClose, 0.5);

    for (const [side, eye] of Object.entries(this.eyes)) {
      const isRight = side === 'right';

      // Eyelid position — slides down to cover lens
      const openY = 0.42;
      const closedY = 0.08;
      const upperY = openY - lidClose * (openY - closedY);
      eye.eyelid.position.y = upperY;

      // Lower lid slides up slightly
      const lowerOpenY = -0.42;
      const lowerClosedY = -0.08;
      const lowerY = lowerOpenY + lidClose * (lowerClosedY - lowerOpenY) * 0.25;
      eye.lowerLid.position.y = lowerY;

      // Angry: tilt eyelids inward
      if (em === 'angry') {
        eye.eyelid.rotation.z = isRight ? 0.25 : -0.25;
      } else if (em === 'sad') {
        eye.eyelid.rotation.z = isRight ? -0.2 : 0.2;
      } else {
        eye.eyelid.rotation.z = 0;
      }

      // Pupil gaze (wander) — moves within lens
      const gazeX = this.idleWanderX * 0.8;
      const gazeY = this.idleWanderY * 0.6;
      eye.pupil.position.x = gazeX;
      eye.pupil.position.y = gazeY;

      // Lens visibility
      eye.lens.visible = true;
      eye.lensBack.visible = true;
      eye.pupil.visible = lidClose < 0.85;

      // Thinking: one eye slightly more closed
      if (em === 'thinking' && !isRight) {
        eye.eyelid.position.y = openY - 0.5 * (openY - closedY);
      }

      // Excited: eyes slightly wider
      if (em === 'excited') {
        eye.eyelid.position.y = Math.min(eye.eyelid.position.y + 0.05, openY + 0.06);
      }

      // Surprised: eyes wide open
      if (em === 'surprised') {
        eye.eyelid.position.y = openY + 0.06;
        eye.lowerLid.position.y = lowerOpenY - 0.03;
      }
    }

    // Eye unit tilt for emotions
    if (em === 'sad') {
      this.eyeUnit.rotation.x += (-0.1 - this.eyeUnit.rotation.x) * 0.05;
    } else if (em === 'happy') {
      this.eyeUnit.rotation.x += (0.06 - this.eyeUnit.rotation.x) * 0.05;
    }
  }

  _updateColors() {
    const col = EMOTION_COLORS[this.emotion] || EMOTION_COLORS.idle;
    const primary = new THREE.Color(col.primary);
    const lensCol = new THREE.Color(col.lens);
    const bodyCol = new THREE.Color(col.body);
    const cheekCol = new THREE.Color(col.cheek);

    // Point light follows robot
    this.headLight.color.copy(primary);
    this.headLight.position.set(
      this.robotGroup.position.x,
      this.robotGroup.position.y + 3.5,
      this.robotGroup.position.z
    );

    let intensity = this.emotion === 'sleep' ? 0.4 : 1.5;
    if (this.listening) {
      intensity += Math.sin(this.listenPhase) * 0.5;
    }
    this.headLight.intensity = intensity;

    // Body color
    this.bodyMat.color.copy(bodyCol);
    this.bodyLine.material.color.copy(primary);

    // Lens color per emotion
    for (const eye of Object.values(this.eyes)) {
      eye.lens.material.color.copy(lensCol);
    }

    // Cheek LEDs (emotion-responsive glow)
    const isSleep = this.emotion === 'sleep';
    const isHappy = this.emotion === 'happy' || this.emotion === 'excited';
    this.cheekLeds.forEach(led => {
      led.material.color.copy(cheekCol);
      const baseOp = isSleep ? 0.10 : isHappy ? 0.60 : 0.40;
      led.material.opacity = baseOp + Math.sin(this.bobPhase * 2) * 0.12;
    });
  }

  _updateCamera() {
    const rx = this.robotGroup.position.x;
    const ry = this.robotGroup.position.y;
    const rz = this.robotGroup.position.z;

    const cx = rx + this.camDist * Math.sin(this.camAngle) * Math.cos(this.camPitch);
    const cy = ry + this.camDist * Math.sin(this.camPitch) + 1.5;
    const cz = rz + this.camDist * Math.cos(this.camAngle) * Math.cos(this.camPitch);

    this.camera.position.lerp(new THREE.Vector3(cx, cy, cz), 0.06);
    const lookAt = new THREE.Vector3(rx, ry + 2.0, rz);
    this.camera.lookAt(lookAt);
  }
}

const FACT_KEY = 'looi_memory';
const PROC_KEY = 'looi_proc';
const EMO_KEY  = 'looi_emo';

function getMemory() { return JSON.parse(localStorage.getItem(FACT_KEY) || '[]'); }
function addMemory(fact) {
  if (!fact || fact.length < 3) return;
  const mem = getMemory();
  if (!mem.includes(fact)) {
    mem.push(fact);
    if (mem.length > 30) mem.shift();
    localStorage.setItem(FACT_KEY, JSON.stringify(mem));
  }
}

function trackProc(text) {
  const procs = JSON.parse(localStorage.getItem(PROC_KEY) || '[]');
  procs.push({ text: text.slice(0, 30), hour: new Date().getHours(), ts: Date.now() });
  if (procs.length > 200) procs.shift();
  localStorage.setItem(PROC_KEY, JSON.stringify(procs));
}
function getTopTopics() {
  const procs = JSON.parse(localStorage.getItem(PROC_KEY) || '[]');
  const counts = {};
  procs.forEach(p => { const key = p.text.slice(0, 10); counts[key] = (counts[key] || 0) + 1; });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
}

function trackEmo(emotion) {
  const emos = JSON.parse(localStorage.getItem(EMO_KEY) || '[]');
  emos.push({ emotion, ts: Date.now() });
  if (emos.length > 60) emos.shift();
  localStorage.setItem(EMO_KEY, JSON.stringify(emos));
}
function getRecentMood() {
  const emos = JSON.parse(localStorage.getItem(EMO_KEY) || '[]').slice(-15);
  if (emos.length < 3) return null;
  const pos = emos.filter(e => ['happy','excited'].includes(e.emotion)).length;
  const neg = emos.filter(e => ['sad','angry'].includes(e.emotion)).length;
  if (pos > neg + 3) return 'ポジティブな会話が続いている';
  if (neg > pos + 3) return '少し落ち込んだ話題が続いている';
  return null;
}

function clearAllMemory() { [FACT_KEY, PROC_KEY, EMO_KEY].forEach(k => localStorage.removeItem(k)); }

// ════════════════════════════════════════════════════
// TTS
// ════════════════════════════════════════════════════
function speakFallback(text, onEnd) {
  if (!window.speechSynthesis) { onEnd?.(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP'; utt.rate = 1.15; utt.pitch = 1.3;
  utt.onstart = () => robot.setTalking(true);
  utt.onend   = () => { robot.setTalking(false); onEnd?.(); };
  utt.onerror = () => { robot.setTalking(false); onEnd?.(); };
  setTimeout(() => {
    if (!window.speechSynthesis.speaking) { robot.setTalking(false); onEnd?.(); }
  }, 8000);
  window.speechSynthesis.speak(utt);
}

function speak(text, onEnd) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (!navigator.onLine) { speakFallback(text, onEnd); return; }
  fetch('/api/tts', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  })
  .then(r => { if (!r.ok) throw new Error('tts_err'); return r.blob(); })
  .then(blob => {
    const url   = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onplay  = () => robot.setTalking(true);
    audio.onended = () => { robot.setTalking(false); URL.revokeObjectURL(url); currentAudio = null; onEnd?.(); };
    audio.onerror = () => { robot.setTalking(false); URL.revokeObjectURL(url); currentAudio = null; onEnd?.(); };
    audio.play().catch(() => {
      robot.setTalking(false); URL.revokeObjectURL(url); currentAudio = null;
      speakFallback(text, onEnd);
    });
  })
  .catch(() => { robot.setTalking(false); speakFallback(text, onEnd); });
}

// ════════════════════════════════════════════════════
// スリープ管理
// ════════════════════════════════════════════════════
function resetSleepTimer() {
  clearTimeout(sleepTimer);
  sleepTimer = setTimeout(goToSleep, SLEEP_MS);
}

function resetProactiveTimer() {
  clearTimeout(proactiveTimer);
  if (!sleeping) proactiveTimer = setTimeout(doProactiveChat, PROACTIVE_MS);
}

function goToSleep() {
  clearTimeout(proactiveTimer);
  clearTimeout(sendDebounceTimer); pendingTranscript = '';
  sleeping = true;
  clearTimeout(sleepTimer);
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  try { recognition?.abort(); } catch(e) {}
  continuousMode = false;
  isBusy = false;
  robot.setEmotion('sleep');
  setStatus('sleeping');
  if (!isIOS) setTimeout(startWakeWordListening, 600);
}

function getTimeGreeting() {
  const h = new Date().getHours();
  if (h < 4)  return '社長、夜分遅くに失礼いたします。何かございましたか？';
  if (h < 11) return '社長、おはようございます。本日もよろしくお願いいたします。';
  if (h < 14) return '社長、お疲れさまです。何かお手伝いできることはございますか？';
  if (h < 18) return '社長、お疲れさまです。ご用件をどうぞ。';
  if (h < 22) return '社長、お疲れさまでした。何かございますか？';
  return '社長、遅くまでお疲れさまです。何かお手伝いいたしましょうか？';
}

function wakeUp() {
  if (!sleeping) return;
  sleeping = false;
  stopWakeWordListening();
  robot.setEmotion('excited');
  robot.setAction('nod');
  setStatus('speaking');
  speak(getTimeGreeting(), () => {
    robot.setEmotion('idle');
    resetSleepTimer();
    resetProactiveTimer();
    setTimeout(() => startListening(), 500);
  });
}

const PROACTIVE_MSGS = [
  '社長、何かお手伝いできることはございますか？',
  '社長、本日のご予定はいかがでしょうか？',
  '社長、何かお調べすることはございますか？',
  '社長、最新ニュースをお伝えしましょうか？',
  '社長、お気軽にお申し付けください。',
  '社長、何かございましたらいつでもどうぞ。',
];
function doProactiveChat() {
  if (sleeping || isBusy) return;
  const msg = PROACTIVE_MSGS[Math.floor(Math.random() * PROACTIVE_MSGS.length)];
  isBusy = true;
  robot.setEmotion('happy');
  setStatus('speaking');
  speak(msg, () => {
    isBusy = false; robot.setEmotion('idle');
    resetSleepTimer(); resetProactiveTimer();
    setTimeout(() => startListening(), 500);
  });
}

// ════════════════════════════════════════════════════
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

function stopWakeWordListening() {
  if (sleepRecRef) { try { sleepRecRef.abort(); } catch(e) {} sleepRecRef = null; }
}

function startWakeWordListening() {
  if (!SpeechRec || !sleeping) return;
  if (sleepRecRef) return;
  const sr = new SpeechRec();
  sleepRecRef = sr;
  sr.lang = 'ja-JP'; sr.continuous = true; sr.interimResults = false;
  sr.onresult = e => {
    const last = e.results[e.results.length - 1];
    if (!last.isFinal) return;
    if (WAKE_WORDS.test(last[0].transcript)) wakeUp();
  };
  sr.onend = () => {
    if (sleeping && sleepRecRef === sr) { sleepRecRef = null; setTimeout(startWakeWordListening, 2000); }
  };
  sr.onerror = e => {
    if (e.error === 'not-allowed') return;
    if (sleeping && sleepRecRef === sr) { sleepRecRef = null; setTimeout(startWakeWordListening, 3000); }
  };
  try { sr.start(); } catch(e) { sleepRecRef = null; if (sleeping) setTimeout(startWakeWordListening, 3000); }
}

// ── Client-side action keyword detection (reliable fallback) ──
function detectActionFromText(text) {
  const t = text.toLowerCase();
  if (/踊っ|踊り|ダンス|dance/.test(t)) return 'dance';
  if (/ジャンプ|じゃんぷ|跳ん|飛んで|jump/.test(t)) return 'jump';
  if (/くるくる|ぐるぐる|回って|回転|spin/.test(t)) return 'spin';
  if (/後ろを向|振り返|反対.*向|turn.?around/.test(t)) return 'turn_around';
  if (/右.*向|右.*回|右.*曲|turn.?right/.test(t)) return 'turn_right';
  if (/左.*向|左.*回|左.*曲|turn.?left/.test(t)) return 'turn_left';
  if (/前.*進|前進|進んで|まっすぐ|forward/.test(t)) return 'forward';
  if (/後ろ.*下|バック|後退|backward/.test(t)) return 'backward';
  return null;
}

// ════════════════════════════════════════════════════
// ニュース機能
// ════════════════════════════════════════════════════
const NEWS_RE = /ニュース|にゅーす|最新情報|最新ニュース|news|今日の.*ニュース|本日の.*ニュース/i;

function detectNewsRequest(text) {
  return NEWS_RE.test(text);
}

function extractNewsTopic(text) {
  // 「〜のニュース」「〜ニュース」「〜の最新情報」からトピックを抽出
  const patterns = [
    /(?:本日|今日|最新)の(.+?)の(?:ニュース|にゅーす|最新情報)/,
    /(.+?)の(?:ニュース|にゅーす|最新情報)を?/,
    /(.+?)(?:ニュース|にゅーす|最新情報)/,
  ];
  for (const pat of patterns) {
    const m = text.match(pat);
    if (m && m[1]) {
      // 不要語を除去してトピックだけ残す
      const topic = m[1].replace(/について|に関する|についての|関連|最新|今日|本日/g, '').trim();
      if (topic && topic.length >= 1 && topic.length <= 20) return topic;
    }
  }
  return null; // デフォルト(AI)にフォールバック
}

const newsPanel = document.getElementById('news-panel');
const newsList = document.getElementById('news-list');
const newsClose = document.getElementById('news-close');

newsClose.addEventListener('click', () => {
  newsPanel.classList.remove('open');
});

async function fetchAndShowNews(topic) {
  // Open panel with loading state
  newsPanel.classList.add('open');
  newsList.innerHTML = '<div class="news-loading">ニュースを取得中</div>';

  try {
    const q = topic || 'AI 人工知能 生成AI';
    const res = await fetch(`/api/news?topic=${encodeURIComponent(q)}&limit=8`);
    const data = await res.json();

    if (!data.items || data.items.length === 0) {
      newsList.innerHTML = '<div class="news-empty">ニュースが見つかりませんでした。</div>';
      return 0;
    }

    newsList.innerHTML = data.items.map(item => `
      <a class="news-item" href="${item.link}" target="_blank" rel="noopener">
        <div class="news-item-title">${item.title}</div>
        <div class="news-item-meta">
          ${item.source ? `<span class="news-item-source">${item.source}</span>` : ''}
          <span>${item.date}</span>
        </div>
      </a>
    `).join('');

    return data.items.length;
  } catch (err) {
    console.error('[news]', err);
    newsList.innerHTML = '<div class="news-empty">ニュースの取得に失敗しました。</div>';
    return 0;
  }
}

async function sendMessage(text) {
  if (sleeping || isBusy || !text.trim()) return;
  resetSleepTimer();

  if (SLEEP_WORDS.test(text)) {
    isBusy = true; robot.setEmotion('sad'); setStatus('speaking');
    speak('かしこまりました。ごゆっくりお休みください。', goToSleep);
    return;
  }

  // ── ニュースパネルを閉じる ──
  const CLOSE_RE = /閉じ|とじて|とじる|クローズ|close/i;
  if (CLOSE_RE.test(text) && newsPanel.classList.contains('open')) {
    newsPanel.classList.remove('open');
    isBusy = true; robot.setEmotion('happy'); setStatus('speaking');
    speak('かしこまりました。', () => {
      isBusy = false; resetSleepTimer(); resetProactiveTimer();
      setTimeout(() => startListening(), 1200);
    });
    return;
  }

  // ── ニュースリクエスト検出 ──
  if (detectNewsRequest(text)) {
    const newsTopic = extractNewsTopic(text);
    const topicLabel = newsTopic || 'AI';
    isBusy = true; setStatus('thinking'); robot.setEmotion('excited');
    speak(`社長、最新の${topicLabel}ニュースをお調べいたします。少々お待ちください。`, null);
    // Fetch news in parallel with speech (don't block on TTS callback)
    (async () => {
      const count = await fetchAndShowNews(newsTopic);
      // Wait a moment for the intro speech to finish
      await new Promise(r => setTimeout(r, 3000));
      if (currentAudio) { currentAudio.pause(); currentAudio = null; robot.setTalking(false); }
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      robot.setEmotion('happy'); setStatus('speaking');
      if (count > 0) {
        speak(`本日の${topicLabel}のニュースは以上の${count}件でございます。画面をご確認ください。`, () => {
          isBusy = false; resetSleepTimer(); resetProactiveTimer();
          setTimeout(() => startListening(), 1200);
        });
      } else {
        speak('申し訳ございません。現在ニュースを取得できませんでした。', () => {
          isBusy = false; resetSleepTimer(); resetProactiveTimer();
          setTimeout(() => startListening(), 1200);
        });
      }
    })();
    return;
  }

  // Detect action from keywords immediately (don't wait for API)
  const detectedAction = detectActionFromText(text);
  if (detectedAction) {
    robot.setAction(detectedAction);
  }

  isBusy = true; setStatus('thinking'); robot.setEmotion(detectedAction ? 'happy' : 'thinking');
  if (!detectedAction) {
    const thinkPhrase = THINKING_PHRASES[Math.floor(Math.random() * THINKING_PHRASES.length)];
    speak(thinkPhrase, null);
  }
  trackProc(text);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, memory: getMemory(), proc: getTopTopics(), mood: getRecentMood() }),
    });
    if (currentAudio) { currentAudio.pause(); currentAudio = null; robot.setTalking(false); }
    if (window.speechSynthesis) window.speechSynthesis.cancel();

    const data = await res.json();
    if (data.remember) addMemory(data.remember);
    trackEmo(data.emotion || 'idle');
    robot.setEmotion(data.emotion || (detectedAction ? 'happy' : 'idle'));
    // API action takes priority, but fall back to detected action
    const finalAction = (data.action && data.action !== 'none') ? data.action : null;
    if (finalAction) robot.setAction(finalAction);
    setStatus('speaking');
    speak(data.message || '', () => {
      isBusy = false; resetSleepTimer(); resetProactiveTimer();
      setTimeout(() => startListening(), 1200);
    });
  } catch(err) {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; robot.setTalking(false); }
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    const errMsgs = [
      '申し訳ございません。通信が不安定のようです。もう一度お試しください。',
      '恐れ入ります。接続に問題が発生しております。少々お待ちください。',
    ];
    robot.setEmotion('sad'); setStatus('speaking');
    speak(errMsgs[Math.floor(Math.random() * errMsgs.length)], () => {
      isBusy = false; resetSleepTimer(); setTimeout(() => startListening(), 1200);
    });
  }
}

// ════════════════════════════════════════════════════
// リセット
// ════════════════════════════════════════════════════
async function doReset() {
  try { await fetch('/api/reset', { method: 'POST' }); } catch(e) {}
  clearAllMemory();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  stopWakeWordListening();
  clearTimeout(sleepTimer); clearTimeout(proactiveTimer);
  clearTimeout(sendDebounceTimer); pendingTranscript = '';
  try { recognition?.abort(); } catch(e) {}
  continuousMode = false; isBusy = false; sleeping = false;
  robot.setEmotion('excited'); setStatus('speaking');
  speak('リセットいたしました。何なりとお申し付けください。', () => {
    robot.setEmotion('idle'); resetSleepTimer(); resetProactiveTimer();
    setTimeout(() => startListening(), 500);
  });
}
resetHint.addEventListener('click', doReset);

// ════════════════════════════════════════════════════
// テキスト入力
// ════════════════════════════════════════════════════
const textInput = document.getElementById('text-input');
const textSend  = document.getElementById('text-send');

function submitText() {
  const text = textInput.value.trim();
  if (!text || isBusy) return;
  textInput.value = ''; textInput.blur();
  if (sleeping) { sleeping = false; stopWakeWordListening(); }
  clearTimeout(sendDebounceTimer); pendingTranscript = '';
  try { recognition?.abort(); } catch(e) {}
  listeningActive = false;
  sendMessage(text);
}
textSend.addEventListener('click', submitText);
textInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); submitText(); } });

// ════════════════════════════════════════════════════
// 会話用音声認識
// ════════════════════════════════════════════════════
function startListening() {
  if (!recognition || listeningActive || isBusy || sleeping) return;
  try { recognition.start(); } catch(e) {}
}

let pendingTranscript = '';
let sendDebounceTimer = null;
const SEND_DELAY_MS   = 1500;

function flushTranscript() {
  clearTimeout(sendDebounceTimer); sendDebounceTimer = null;
  const text = pendingTranscript.trim(); pendingTranscript = '';
  if (!text) return;
  try { recognition.abort(); } catch(e) {}
  listeningActive = false;
  resetSleepTimer();
  sendMessage(text);
}

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = 'ja-JP'; recognition.continuous = true; recognition.interimResults = true;

  recognition.onstart = () => {
    listeningActive = true; setStatus('listening'); robot.setEmotion('happy');
  };

  recognition.onresult = e => {
    let finalText = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
    }
    if (finalText) {
      pendingTranscript = finalText;
      robot.setEmotion('happy');
      clearTimeout(sendDebounceTimer);
      sendDebounceTimer = setTimeout(flushTranscript, SEND_DELAY_MS);
    }
  };

  recognition.onend = () => {
    listeningActive = false;
    if (pendingTranscript && sendDebounceTimer) {
      clearTimeout(sendDebounceTimer); flushTranscript(); return;
    }
    if (!isBusy && !sleeping) setTimeout(() => startListening(), 400);
  };

  recognition.onerror = e => {
    listeningActive = false;
    if (e.error === 'no-speech') { if (!isBusy && !sleeping) setTimeout(() => startListening(), 400); return; }
    if (!isBusy && !sleeping) setTimeout(() => startListening(), 1000);
  };
} else {
  setStatus('ready');
}

// ════════════════════════════════════════════════════
// 3Dコンテナ操作（タップ/長押し + カメラ回転）
// ════════════════════════════════════════════════════
{
  const el = robot.renderer.domElement;
  let ptrStart = null;
  let ptrMoved = 0;
  let pressTimer = null;

  el.addEventListener('pointerdown', e => {
    if (e.target.closest('#text-input-bar, #joystick-area, #task-panel')) return;
    ptrStart = { x: e.clientX, y: e.clientY };
    ptrMoved = 0;
    robot._camDragStart(e.clientX, e.clientY);

    pressTimer = setTimeout(() => {
      pressTimer = null;
      if (ptrMoved < 10) {
        if (sleeping) wakeUp(); else goToSleep();
      }
    }, 600);
  });

  el.addEventListener('pointermove', e => {
    if (!ptrStart) return;
    ptrMoved = Math.abs(e.clientX - ptrStart.x) + Math.abs(e.clientY - ptrStart.y);
    if (ptrMoved > 5) robot._camDragMove(e.clientX, e.clientY);
  });

  el.addEventListener('pointerup', () => {
    if (pressTimer) {
      clearTimeout(pressTimer); pressTimer = null;
      if (ptrMoved < 10) {
        if (sleeping) { wakeUp(); }
        else {
          if (currentAudio) { currentAudio.pause(); currentAudio = null; robot.setTalking(false); }
          if (window.speechSynthesis) window.speechSynthesis.cancel();
          clearTimeout(sendDebounceTimer); pendingTranscript = '';
          try { recognition.abort(); } catch(e) {}
          isBusy = false; listeningActive = false;
          resetSleepTimer(); resetProactiveTimer();
          setTimeout(() => startListening(), 300);
        }
      }
    }
    ptrStart = null;
    robot._camDragEnd();
  });

  el.addEventListener('pointercancel', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    ptrStart = null; robot._camDragEnd();
  });

  el.addEventListener('wheel', e => {
    robot.camDist = Math.max(4, Math.min(20, robot.camDist + e.deltaY * 0.01));
  }, { passive: true });
}

// ════════════════════════════════════════════════════
// キーボード移動
// ════════════════════════════════════════════════════
{
  const keys = {};
  window.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    keys[e.key] = true;
    updateKeyMove();
  });
  window.addEventListener('keyup', e => {
    keys[e.key] = false;
    updateKeyMove();
  });
  function updateKeyMove() {
    let x = 0, z = 0;
    if (keys['ArrowUp'] || keys['w']) z = 1;
    if (keys['ArrowDown'] || keys['s']) z = -1;
    if (keys['ArrowLeft'] || keys['a']) x = -1;
    if (keys['ArrowRight'] || keys['d']) x = 1;
    const len = Math.sqrt(x*x + z*z);
    if (len > 0) { x /= len; z /= len; }
    robot.setMoveDirection(x, z);
  }
}

// ════════════════════════════════════════════════════
// タッチジョイスティック
// ════════════════════════════════════════════════════
{
  const area = document.getElementById('joystick-area');
  const knob = document.getElementById('joystick-knob');
  const RANGE = 30;
  let active = false;
  let center = { x: 0, y: 0 };

  area.addEventListener('touchstart', e => {
    e.preventDefault(); active = true;
    const r = area.getBoundingClientRect();
    center = { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }, { passive: false });

  area.addEventListener('touchmove', e => {
    if (!active) return;
    e.preventDefault();
    const t = e.touches[0];
    let dx = t.clientX - center.x;
    let dy = t.clientY - center.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > RANGE) { dx = dx/dist*RANGE; dy = dy/dist*RANGE; }
    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    robot.setMoveDirection(dx / RANGE, -dy / RANGE);
  }, { passive: false });

  const endTouch = () => {
    active = false;
    knob.style.transform = 'translate(-50%, -50%)';
    robot.setMoveDirection(0, 0);
  };
  area.addEventListener('touchend', endTouch);
  area.addEventListener('touchcancel', endTouch);
}

// ════════════════════════════════════════════════════
// オフライン/オンライン検出
// ════════════════════════════════════════════════════
window.addEventListener('offline', () => {
  if (!sleeping && !isBusy) {
    isBusy = true; robot.setEmotion('sad');
    speakFallback('恐れ入ります。ネットワーク接続が切断されたようです。', () => {
      isBusy = false; robot.setEmotion('idle');
      setTimeout(() => startListening(), 800);
    });
  }
});
window.addEventListener('online', () => {
  if (!sleeping && !isBusy) {
    robot.setEmotion('excited');
    speakFallback('ネットワーク接続が復旧いたしました。ご用件をどうぞ。', () => {
      robot.setEmotion('idle'); setTimeout(() => startListening(), 500);
    });
  }
});

// ════════════════════════════════════════════════════
// 8:00 自動起床 + モーニングブリーフィング
// ════════════════════════════════════════════════════
let morningFired = null;

function checkMorningBriefing() {
  const now = new Date();
  const todayKey = now.toISOString().slice(0, 10);
  if (morningFired === todayKey) return;
  if (now.getHours() === 8 && now.getMinutes() === 0) {
    morningFired = todayKey;
    doMorningBriefing();
  }
}

async function doMorningBriefing() {
  if (isBusy) return;
  if (sleeping) { sleeping = false; stopWakeWordListening(); }
  isBusy = true; robot.setEmotion('excited'); robot.setAction('nod'); setStatus('thinking');
  try {
    const res = await fetch('/api/morning-briefing');
    const data = await res.json();
    robot.setEmotion(data.emotion || 'idle');
    if (data.action) robot.setAction(data.action);
    setStatus('speaking');
    speak(data.message || '社長、おはようございます。', () => {
      isBusy = false; robot.setEmotion('idle');
      resetSleepTimer(); resetProactiveTimer();
      setTimeout(() => startListening(), 500);
    });
  } catch(e) {
    robot.setEmotion('idle'); setStatus('speaking');
    speak('社長、おはようございます。本日もよろしくお願いいたします。', () => {
      isBusy = false; resetSleepTimer(); setTimeout(() => startListening(), 500);
    });
  }
}
setInterval(checkMorningBriefing, 30000);

// ════════════════════════════════════════════════════
// タスク管理パネル
// ════════════════════════════════════════════════════
const taskPanel   = document.getElementById('task-panel');
const taskBtn     = document.getElementById('task-btn');
const taskClose   = document.getElementById('task-close');
const taskTitleIn = document.getElementById('task-title-input');
const taskDueIn   = document.getElementById('task-due-input');
const taskAddBtn  = document.getElementById('task-add-btn');
const taskListEl  = document.getElementById('task-list');
let taskFilter    = 'pending';

taskDueIn.value = new Date().toISOString().slice(0, 10);

taskBtn.addEventListener('click', () => { taskPanel.classList.add('open'); loadTasks(); });
taskClose.addEventListener('click', () => taskPanel.classList.remove('open'));

document.querySelectorAll('.task-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.task-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); taskFilter = btn.dataset.filter; loadTasks();
  });
});

taskAddBtn.addEventListener('click', addTask);
taskTitleIn.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addTask(); } });

async function addTask() {
  const title = taskTitleIn.value.trim();
  if (!title) return;
  const due = taskDueIn.value || null;
  try {
    await fetch('/api/tasks', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, due_date: due }),
    });
    taskTitleIn.value = ''; loadTasks();
  } catch(e) {}
}

async function loadTasks() {
  try {
    const params = new URLSearchParams();
    if (taskFilter === 'today') params.set('date', new Date().toISOString().slice(0, 10));
    if (taskFilter === 'all') params.set('done', 'true');
    const res = await fetch('/api/tasks?' + params.toString());
    const data = await res.json();
    renderTasks(data.tasks || []);
  } catch(e) {
    taskListEl.innerHTML = '<li class="task-empty">読み込みに失敗しました</li>';
  }
}

function renderTasks(tasks) {
  if (tasks.length === 0) { taskListEl.innerHTML = '<li class="task-empty">タスクはありません</li>'; return; }
  const today = new Date().toISOString().slice(0, 10);
  taskListEl.innerHTML = tasks.map(t => {
    const isOverdue = t.due_date && t.due_date < today && !t.done;
    return `<li class="task-item${t.done ? ' done' : ''}${isOverdue ? ' overdue' : ''}">
      <button class="task-check${t.done ? ' checked' : ''}" onclick="toggleTask(${t.id}, ${t.done})">${t.done ? '✓' : ''}</button>
      <div class="task-item-body">
        <div class="task-item-title">${escHtml(t.title)}</div>
        ${t.due_date ? `<div class="task-item-due${isOverdue ? ' overdue-text' : ''}">${t.due_date}${isOverdue ? ' (期限超過)' : ''}</div>` : ''}
      </div>
      <button class="task-delete" onclick="deleteTask(${t.id})">×</button>
    </li>`;
  }).join('');
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function toggleTask(id, currentDone) {
  if (currentDone) return;
  try { await fetch(`/api/tasks/${id}/done`, { method: 'POST' }); loadTasks(); } catch(e) {}
}

async function deleteTask(id) {
  try { await fetch(`/api/tasks/${id}`, { method: 'DELETE' }); loadTasks(); } catch(e) {}
}

// ── 初期化 ─────────────────────────────────────────
function unlockAudio() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination); src.start(0); ctx.resume();
  } catch(e) {}
  try {
    const a = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=');
    a.volume = 0.01; a.play().then(() => a.pause()).catch(() => {});
  } catch(e) {}
}

window.addEventListener('load', () => {
  robot.setEmotion('sleep');
  setStatus('sleeping');

  const overlay = document.getElementById('start-overlay');
  if (location.search.includes('autostart')) {
    overlay.classList.add('hidden');
    setTimeout(() => overlay.remove(), 100);
    robot.setEmotion('idle');
    setStatus('idle');
  }
  overlay.addEventListener('click', () => {
    unlockAudio();
    overlay.classList.add('hidden');
    setTimeout(() => overlay.remove(), 500);
    if (!isIOS) setTimeout(startWakeWordListening, 400);
  }, { once: true });
});
