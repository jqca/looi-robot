<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Robot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; width: 100%;
    background: #030912;
    color: #cce8f4;
    font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  #app {
    width: 100%; max-width: 480px; height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    padding: 20px 16px 36px; gap: 20px;
  }

  /* ── キャンバス ── */
  #robot-canvas {
    flex-shrink: 0;
    touch-action: none;
    cursor: pointer;
    border-radius: 50%;
    transition: box-shadow .3s;
  }
  /* 聴取中（一回）*/
  #robot-canvas.listening-once {
    box-shadow: 0 0 0 2px rgba(255,68,136,.55);
  }
  /* 連続モード：外周リング */
  @keyframes canvas-ring {
    0%   { box-shadow: 0 0 0 0   rgba(255,68,136,.50); }
    70%  { box-shadow: 0 0 0 18px rgba(255,68,136,0); }
    100% { box-shadow: 0 0 0 0   rgba(255,68,136,0); }
  }
  #robot-canvas.continuous { animation: canvas-ring 2s infinite; }
  #robot-canvas.continuous.listening-once { animation: canvas-ring .8s infinite; }

  /* ── ステータス ── */
  #status-bar {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: #6a8fa8; flex-shrink: 0;
    letter-spacing: 0.03em; user-select: none;
  }
  #status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #3a6a88; transition: background .3s; flex-shrink: 0;
  }
  @keyframes blink-dot {
    0%,100%{ opacity:.4; transform:scale(1); }
    50%    { opacity:1;  transform:scale(1.4); }
  }
  #status-dot.listening { background:#ff4488; animation:blink-dot .8s infinite; }
  #status-dot.thinking  { background:#aaaaff; animation:blink-dot 1.2s infinite; }
  #status-dot.speaking  { background:#88ccee; animation:blink-dot .6s infinite; }
  #status-dot.ready     { background:#3a6a88; }

  /* 極小リセットボタン */
  #reset-hint {
    margin-left: 6px;
    font-size: 15px;
    opacity: 0.18;
    cursor: pointer;
    transition: opacity .2s;
    line-height: 1;
  }
  #reset-hint:hover { opacity: 0.55; }
  #reset-hint:active { opacity: 0.9; }
</style>
</head>
<body>

<div id="app">
  <canvas id="robot-canvas"></canvas>

  <div id="status-bar">
    <div id="status-dot" class="ready"></div>
    <span id="reset-hint" title="リセット">⟳</span>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// EYE RENDERER  ─ 幾何学的な目で感情表現
//   ・グロー(shadowBlur)なし  ・白系単色
//   ・excited: 上下バウンス
// ════════════════════════════════════════════════════
class EyeRenderer {
  constructor(canvas) {
    this.canvas       = canvas;
    this.ctx          = canvas.getContext('2d');
    this.emotion      = 'idle';
    this.action       = 'none';
    this.blinkAmt     = 0;
    this.blinking     = false;
    this.blinkTimer   = 0;
    this.blinkNext    = this._rndBlink();
    this.bobPhase     = 0;
    this.bobY         = 0;
    this.headTilt     = 0;
    this.headTiltTgt  = 0;
    this.actionTimer  = 0;
    this.lastTS       = 0;
    this.talking      = false;
    this.talkPhase    = 0;
    this.excitedPhase = 0;
    this.excitedY     = 0;
    this.resize();
    requestAnimationFrame(this._loop.bind(this));
  }

  resize() {
    const s = Math.min(window.innerWidth * 0.86, 360);
    this.canvas.width = this.canvas.height = s;
    this.W = s; this.CX = s / 2; this.CY = s / 2;
  }

  setEmotion(e) { this.emotion = e; }
  setTalking(v) { this.talking = v; }
  setAction(a)  { if (a === 'none') return; this.action = a; this.actionTimer = 0; }
  blink()       { if (!this.blinking) { this.blinking = true; this.blinkAmt = 0; } }

  _rndBlink() { return 2800 + Math.random() * 5000; }

  _loop(ts) {
    const dt = Math.min(0.05, (ts - this.lastTS) / 1000);
    this.lastTS = ts;
    this._update(dt);
    this._render();
    requestAnimationFrame(this._loop.bind(this));
  }

  _update(dt) {
    const lerp = 1 - Math.exp(-8 * dt);

    this.bobPhase += dt * (this.talking ? 4.0 : 1.0);
    this.bobY = Math.sin(this.bobPhase) * (this.W * 0.010);

    if (this.emotion === 'excited') {
      this.excitedPhase += dt * 7.5;
      this.excitedY = -Math.abs(Math.sin(this.excitedPhase)) * (this.W * 0.034);
    } else {
      this.excitedPhase = 0;
      this.excitedY += (0 - this.excitedY) * Math.min(1, dt * 10);
    }

    this.blinkTimer += dt * 1000;
    if (!this.blinking && this.blinkTimer > this.blinkNext) {
      this.blinking = true; this.blinkAmt = 0;
      this.blinkTimer = 0; this.blinkNext = this._rndBlink();
    }
    if (this.blinking) {
      this.blinkAmt += dt * 12;
      if (this.blinkAmt >= 1) { this.blinkAmt = 1; this.blinking = false; }
    } else {
      this.blinkAmt = Math.max(0, this.blinkAmt - dt * 12);
    }

    if (this.action !== 'none') {
      this.actionTimer += dt;
      if (this.action === 'nod') {
        this.headTiltTgt = Math.sin(this.actionTimer * Math.PI / 0.3) * 0.10;
        if (this.actionTimer > 0.7) { this.action = 'none'; this.headTiltTgt = 0; }
      } else if (this.action === 'shake') {
        this.headTiltTgt = Math.sin(this.actionTimer * Math.PI * 3) * 0.09;
        if (this.actionTimer > 0.9) { this.action = 'none'; this.headTiltTgt = 0; }
      }
    }
    this.headTilt += (this.headTiltTgt - this.headTilt) * lerp;

    if (this.talking) this.talkPhase += dt * 10;
  }

  _render() {
    const { ctx, W, CX, CY } = this;
    ctx.clearRect(0, 0, W, W);
    ctx.save();
    ctx.translate(CX, CY + this.bobY);
    ctx.rotate(this.headTilt);
    ctx.translate(-CX, -(CY + this.bobY));
    this._drawEyes(ctx, CX, CY + this.bobY);
    ctx.restore();
  }

  _drawEyes(ctx, cx, cy) {
    const W   = this.W;
    const em  = this.emotion;
    const sp  = W * 0.220;
    const hw  = W * 0.145;
    const bSY = 1 - this.blinkAmt * 0.97;

    const yOff = {
      idle:0, happy:0, excited:0,
      thinking: -W * 0.006,
      sad:       W * 0.018,
      surprised:-W * 0.010,
      angry:0,
    };
    const ey = cy - W * 0.010 + (yOff[em] ?? 0) + this.excitedY;
    const talkScale = this.talking ? 1 + Math.sin(this.talkPhase) * 0.04 : 1;

    this._drawOneEye(ctx, cx - sp, ey, hw, bSY * talkScale, em, false);
    this._drawOneEye(ctx, cx + sp, ey, hw, bSY * talkScale, em, true);
  }

  _drawOneEye(ctx, x, y, hw, blinkSY, em, isRight) {
    const W   = this.W;
    const col = this._color();

    const P = {
      idle:      { hRatio: 0.38,                  tilt: 0,                       shape: 'ellipse' },
      happy:     { hRatio: 0,                     tilt: 0,                       shape: 'arc'     },
      excited:   { hRatio: 0.75,                  tilt: 0,                       shape: 'ellipse' },
      thinking:  { hRatio: isRight?0.26:0.18,     tilt: isRight?-0.22:0.22,      shape: 'ellipse' },
      sad:       { hRatio: 0.35,                  tilt: isRight?-0.28:0.28,      shape: 'ellipse' },
      surprised: { hRatio: 1.05,                  tilt: 0,                       shape: 'ellipse' },
      angry:     { hRatio: 0.14,                  tilt: isRight?0.40:-0.40,      shape: 'rect'   },
    };
    const p = P[em] ?? P.idle;

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(1, blinkSY);
    ctx.rotate(p.tilt);

    if (p.shape === 'arc') {
      const r = hw * 0.80;
      ctx.beginPath();
      ctx.arc(0, r * 0.15, r, Math.PI + 0.18, -0.18, false);
      ctx.strokeStyle = col.fill;
      ctx.lineWidth   = W * 0.048;
      ctx.lineCap     = 'round';
      ctx.stroke();
      ctx.restore();
      return;
    }

    if (p.shape === 'rect') {
      const rw = hw * 0.95, rh = hw * p.hRatio;
      ctx.beginPath();
      ctx.roundRect(-rw, -rh, rw * 2, rh * 2, rh * 0.5);
      ctx.fillStyle = col.fill;
      ctx.fill();
      ctx.restore();
      return;
    }

    ctx.beginPath();
    ctx.ellipse(0, 0, hw, hw * p.hRatio, 0, 0, Math.PI * 2);
    ctx.fillStyle = col.fill;
    ctx.fill();
    ctx.restore();
  }

  _color() { return { fill: '#dce9f5' }; }
}

// ════════════════════════════════════════════════════
// APP CONTROLLER
// ════════════════════════════════════════════════════
const canvas    = document.getElementById('robot-canvas');
const statusDt  = document.getElementById('status-dot');
const resetHint = document.getElementById('reset-hint');

const robot = new EyeRenderer(canvas);
let isBusy = false, recognition = null;

window.addEventListener('resize', () => robot.resize());

function setStatus(state) {
  statusDt.className = state;
}

// ── TTS（Edge TTS / NanamiNeural） ──────────────────
let currentAudio = null;
function speak(text, onEnd) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  fetch('/api/tts', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  })
  .then(r => { if (!r.ok) throw new Error(); return r.blob(); })
  .then(blob => {
    const url   = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onplay  = () => robot.setTalking(true);
    audio.onended = () => {
      robot.setTalking(false);
      URL.revokeObjectURL(url); currentAudio = null;
      onEnd?.();
    };
    audio.onerror = () => {
      robot.setTalking(false);
      URL.revokeObjectURL(url); currentAudio = null;
      onEnd?.();
    };
    audio.play().catch(() => { robot.setTalking(false); onEnd?.(); });
  })
  .catch(() => { robot.setTalking(false); onEnd?.(); });
}

// ── メッセージ送信 ───────────────────────────────────
async function sendMessage(text) {
  if (isBusy || !text.trim()) return;
  isBusy = true;
  setStatus('thinking');
  robot.setEmotion('thinking');
  try {
    const res  = await fetch('/api/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    robot.setEmotion(data.emotion || 'idle');
    if (data.action && data.action !== 'none') robot.setAction(data.action);
    setStatus('speaking');
    speak(data.message || '', () => {
      isBusy = false;
      if (continuousMode) {
        setStatus('listening');
        setTimeout(() => startListening(), 600);
      } else {
        setStatus('ready');
      }
    });
  } catch {
    robot.setEmotion('sad');
    setStatus('ready');
    isBusy = false;
  }
}

// ── リセット ─────────────────────────────────────────
async function doReset() {
  await fetch('/api/reset', { method: 'POST' });
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (continuousMode) { continuousMode = false; updateContMode(); }
  robot.setEmotion('idle');
  setStatus('ready');
  isBusy = false;
  setTimeout(() => sendMessage('こんにちは！'), 300);
}
resetHint.addEventListener('click', doReset);

// ── 音声認識 ─────────────────────────────────────────
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let continuousMode = false, listeningActive = false;

function updateContMode() {
  if (continuousMode) {
    canvas.classList.add('continuous');
  } else {
    canvas.classList.remove('continuous', 'listening-once');
    if (!isBusy) setStatus('ready');
  }
}

function startListening() {
  if (!recognition || listeningActive || isBusy) return;
  try { recognition.start(); } catch(e) {}
}

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    listeningActive = true;
    canvas.classList.add('listening-once');
    setStatus('listening');
    robot.setEmotion('happy');
  };
  recognition.onresult = e => {
    listeningActive = false;
    canvas.classList.remove('listening-once');
    const text = e.results[0][0].transcript;
    setTimeout(() => sendMessage(text), 200);
  };
  recognition.onend = () => {
    listeningActive = false;
    canvas.classList.remove('listening-once');
    if (continuousMode && !isBusy) setTimeout(() => startListening(), 400);
    else if (!continuousMode && !isBusy) setStatus('ready');
  };
  recognition.onerror = e => {
    listeningActive = false;
    canvas.classList.remove('listening-once');
    if (e.error === 'no-speech') {
      if (continuousMode && !isBusy) setTimeout(() => startListening(), 400);
      return;
    }
    continuousMode = false; updateContMode();
  };

  // ── キャンバスタップ / 長押し ──────────────────────
  //  短押し → 一回聞く（連続モード中なら解除）
  //  長押し → 連続モード ON/OFF
  let pressTimer = null;
  canvas.addEventListener('pointerdown', () => {
    pressTimer = setTimeout(() => {
      pressTimer = null;
      if (!continuousMode) {
        continuousMode = true; updateContMode();
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        if (!isBusy) startListening();
      } else {
        continuousMode = false; updateContMode();
        try { recognition.abort(); } catch(e) {}
      }
    }, 600);
  });
  canvas.addEventListener('pointerup', () => {
    if (pressTimer) {
      clearTimeout(pressTimer); pressTimer = null;
      if (continuousMode) {
        // 連続モード中の短押し → 解除
        continuousMode = false; updateContMode();
        try { recognition.abort(); } catch(e) {}
      } else {
        if (isBusy) return;
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        if (!listeningActive) startListening();
      }
    }
  });
  canvas.addEventListener('pointercancel', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  });

} else {
  setStatus('ready');
}

// ── 初回挨拶 ─────────────────────────────────────────
window.addEventListener('load', async () => {
  try {
    const res  = await fetch('/api/greet');
    const data = await res.json();
    robot.setEmotion(data.emotion || 'excited');
    robot.setAction(data.action  || 'nod');
    setTimeout(() => speak(data.message), 500);
  } catch {
    robot.setEmotion('excited');
  }
  setStatus('ready');
});
</script>
</body>
</html>
