<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Robot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; width: 100%;
    background: #030912;
    color: #cce8f4;
    font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  #app {
    width: 100%; max-width: 480px; height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 16px 28px; gap: 16px;
  }

  /* ── 吹き出し ── */
  #bubble-wrap {
    width: 100%; min-height: 64px; flex-shrink: 0;
    display: flex; justify-content: center; align-items: flex-end;
  }
  #speech-bubble {
    background: rgba(10,20,32,.88);
    border: 1px solid rgba(255,255,255,.09);
    border-radius: 18px 18px 18px 4px;
    padding: 12px 20px; font-size: 15px; line-height: 1.65;
    max-width: 92%; position: relative;
    transition: opacity .35s, transform .35s;
    opacity: 0; transform: translateY(8px); pointer-events: none;
  }
  #speech-bubble.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  #speech-bubble::after {
    content: ''; position: absolute;
    bottom: -8px; left: 22px; width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 8px solid rgba(255,255,255,.09);
  }

  /* ── キャンバス ── */
  #robot-canvas { flex-shrink: 0; touch-action: none; }

  /* ── ステータス ── */
  #status-bar {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: #6a8fa8; flex-shrink: 0;
    letter-spacing: 0.03em;
  }
  #status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #3a6a88; transition: background .3s; flex-shrink: 0;
  }
  @keyframes blink-dot {
    0%,100%{ opacity:.4; transform:scale(1); }
    50%    { opacity:1;  transform:scale(1.4); }
  }
  #status-dot.listening { background:#ff4488; animation:blink-dot .8s infinite; }
  #status-dot.thinking  { background:#aaaaff; animation:blink-dot 1.2s infinite; }
  #status-dot.speaking  { background:#88ccee; animation:blink-dot .6s infinite; }
  #status-dot.ready     { background:#3a6a88; }

  /* ── ボタン ── */
  #btn-row { display: flex; gap: 16px; justify-content: center; flex-shrink: 0; }

  .round-btn {
    width: 58px; height: 58px; border-radius: 50%; font-size: 22px;
    border: 1px solid rgba(255,255,255,.10); background: rgba(10,20,32,.6);
    color: #cce8f4; cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
  }
  .round-btn:hover  { border-color: rgba(255,255,255,.25); background: rgba(255,255,255,.05); }
  .round-btn:active { transform: scale(.91); }

  #mic-btn {
    width: 68px; height: 68px; font-size: 26px;
    border-color: rgba(255,68,136,.25);
    background: rgba(255,68,136,.05); color: #ff88bb;
  }
  #mic-btn:hover { border-color: rgba(255,68,136,.50); background: rgba(255,68,136,.10); }

  @keyframes mic-pulse {
    0%,100%{ box-shadow:0 0 14px rgba(255,68,136,.35); }
    50%    { box-shadow:0 0 28px rgba(255,68,136,.65); }
  }
  @keyframes cont-ring {
    0%  { box-shadow:0 0 0 0  rgba(255,68,136,.55); }
    70% { box-shadow:0 0 0 12px rgba(255,68,136,0); }
    100%{ box-shadow:0 0 0 0  rgba(255,68,136,0); }
  }
  #mic-btn.listening  { border-color:#ff4488; background:rgba(255,68,136,.18); animation:mic-pulse .6s infinite; }
  #mic-btn.continuous { border-color:#ff4488; background:rgba(255,68,136,.10); animation:cont-ring 1.5s infinite; }
  #mic-btn.continuous.listening { animation:mic-pulse .6s infinite, cont-ring 1.5s infinite; }
</style>
</head>
<body>

<div id="app">
  <div id="bubble-wrap">
    <div id="speech-bubble"><span id="bubble-text"></span></div>
  </div>

  <canvas id="robot-canvas"></canvas>

  <div id="status-bar">
    <div id="status-dot" class="ready"></div>
    <span id="status-text">待機中</span>
  </div>

  <div id="btn-row">
    <button id="mic-btn"   class="round-btn" title="話す（長押しで連続モード）">🎤</button>
    <button id="reset-btn" class="round-btn" title="リセット">🔄</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// EYE RENDERER  ─ 幾何学的な目で感情表現
//   ・グロー(shadowBlur)なし
//   ・白系単色（形だけで感情を語る）
//   ・excited: 回転点なし → 上下バウンス
// ════════════════════════════════════════════════════
class EyeRenderer {
  constructor(canvas) {
    this.canvas       = canvas;
    this.ctx          = canvas.getContext('2d');
    this.emotion      = 'idle';
    this.action       = 'none';
    this.blinkAmt     = 0;
    this.blinking     = false;
    this.blinkTimer   = 0;
    this.blinkNext    = this._rndBlink();
    this.bobPhase     = 0;
    this.bobY         = 0;
    this.headTilt     = 0;
    this.headTiltTgt  = 0;
    this.actionTimer  = 0;
    this.lastTS       = 0;
    this.talking      = false;
    this.talkPhase    = 0;
    this.excitedPhase = 0;   // excited バウンス専用
    this.excitedY     = 0;
    this.resize();
    requestAnimationFrame(this._loop.bind(this));
  }

  resize() {
    const s = Math.min(window.innerWidth * 0.86, 360);
    this.canvas.width = this.canvas.height = s;
    this.W = s; this.CX = s / 2; this.CY = s / 2;
  }

  setEmotion(e) { this.emotion = e; }
  setTalking(v) { this.talking = v; }
  setAction(a)  { if (a === 'none') return; this.action = a; this.actionTimer = 0; }
  blink()       { if (!this.blinking) { this.blinking = true; this.blinkAmt = 0; } }

  _rndBlink() { return 2800 + Math.random() * 5000; }

  _loop(ts) {
    const dt = Math.min(0.05, (ts - this.lastTS) / 1000);
    this.lastTS = ts;
    this._update(dt);
    this._render();
    requestAnimationFrame(this._loop.bind(this));
  }

  _update(dt) {
    const lerp = 1 - Math.exp(-8 * dt);

    // 通常ボブ
    this.bobPhase += dt * (this.talking ? 4.0 : 1.0);
    this.bobY = Math.sin(this.bobPhase) * (this.W * 0.010);

    // excited バウンス（スパークル廃止・跳ね表現に変更）
    if (this.emotion === 'excited') {
      this.excitedPhase += dt * 7.5;
      // Math.abs(sin) → 上→下→上のバウンスボール軌跡
      this.excitedY = -Math.abs(Math.sin(this.excitedPhase)) * (this.W * 0.034);
    } else {
      this.excitedPhase = 0;
      this.excitedY += (0 - this.excitedY) * Math.min(1, dt * 10);
    }

    // 瞬き
    this.blinkTimer += dt * 1000;
    if (!this.blinking && this.blinkTimer > this.blinkNext) {
      this.blinking = true; this.blinkAmt = 0;
      this.blinkTimer = 0; this.blinkNext = this._rndBlink();
    }
    if (this.blinking) {
      this.blinkAmt += dt * 12;
      if (this.blinkAmt >= 1) { this.blinkAmt = 1; this.blinking = false; }
    } else {
      this.blinkAmt = Math.max(0, this.blinkAmt - dt * 12);
    }

    // Nod / Shake
    if (this.action !== 'none') {
      this.actionTimer += dt;
      if (this.action === 'nod') {
        this.headTiltTgt = Math.sin(this.actionTimer * Math.PI / 0.3) * 0.10;
        if (this.actionTimer > 0.7) { this.action = 'none'; this.headTiltTgt = 0; }
      } else if (this.action === 'shake') {
        this.headTiltTgt = Math.sin(this.actionTimer * Math.PI * 3) * 0.09;
        if (this.actionTimer > 0.9) { this.action = 'none'; this.headTiltTgt = 0; }
      }
    }
    this.headTilt += (this.headTiltTgt - this.headTilt) * lerp;

    if (this.talking) this.talkPhase += dt * 10;
  }

  // ── 描画 ──────────────────────────────────────────
  _render() {
    const { ctx, W, CX, CY } = this;
    ctx.clearRect(0, 0, W, W);
    ctx.save();
    ctx.translate(CX, CY + this.bobY);
    ctx.rotate(this.headTilt);
    ctx.translate(-CX, -(CY + this.bobY));
    this._drawEyes(ctx, CX, CY + this.bobY);
    ctx.restore();
  }

  _drawEyes(ctx, cx, cy) {
    const W   = this.W;
    const em  = this.emotion;
    const sp  = W * 0.220;          // 目の中心間隔の半分
    const hw  = W * 0.145;          // 目の半幅
    const bSY = 1 - this.blinkAmt * 0.97;

    // 感情別 Y オフセット（目の高さを微調整）
    const yOff = {
      idle:      0,
      happy:     0,
      excited:   0,             // excitedY で別管理
      thinking: -W * 0.006,     // 少し上（集中）
      sad:       W * 0.018,     // 少し下（重い）
      surprised:-W * 0.010,     // 少し上（見開き）
      angry:     0,
    };
    const ey = cy - W * 0.010 + (yOff[em] ?? 0) + this.excitedY;

    // 発話中はスケール微変動
    const talkScale = this.talking
      ? 1 + Math.sin(this.talkPhase) * 0.04
      : 1;

    this._drawOneEye(ctx, cx - sp, ey, hw, bSY * talkScale, em, false);
    this._drawOneEye(ctx, cx + sp, ey, hw, bSY * talkScale, em, true);
  }

  // ── 1つの目（幾何学的図形・グローなし・単色） ─────
  _drawOneEye(ctx, x, y, hw, blinkSY, em, isRight) {
    const W   = this.W;
    const col = this._color();

    // 感情別パラメータ
    // hRatio: 高さ/幅比  tilt: 傾き(rad)  shape: ellipse|arc|rect
    const P = {
      idle:      { hRatio: 0.38,                   tilt: 0,                       shape: 'ellipse' },
      happy:     { hRatio: 0,                      tilt: 0,                       shape: 'arc'     },
      excited:   { hRatio: 0.75,                   tilt: 0,                       shape: 'ellipse' },
      thinking:  { hRatio: isRight ? 0.26 : 0.18,  tilt: isRight ? -0.22 : 0.22,  shape: 'ellipse' },
      sad:       { hRatio: 0.35,                   tilt: isRight ? -0.28 : 0.28,  shape: 'ellipse' },
      surprised: { hRatio: 1.05,                   tilt: 0,                       shape: 'ellipse' },
      angry:     { hRatio: 0.14,                   tilt: isRight ? 0.40 : -0.40,  shape: 'rect'   },
    };
    const p = P[em] ?? P.idle;

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(1, blinkSY);
    ctx.rotate(p.tilt);

    // ── arc: happy（◠ 笑い目・太め） ─────────────
    if (p.shape === 'arc') {
      const r = hw * 0.80;
      ctx.beginPath();
      ctx.arc(0, r * 0.15, r, Math.PI + 0.18, -0.18, false);
      ctx.strokeStyle = col.fill;
      ctx.lineWidth   = W * 0.048;   // 太くして笑顔を強調
      ctx.lineCap     = 'round';
      ctx.stroke();
      ctx.restore();
      return;
    }

    // ── rect: angry（細い角丸矩形） ──────────────
    if (p.shape === 'rect') {
      const rw  = hw * 0.95;
      const rh  = hw * p.hRatio;
      const rad = rh * 0.5;
      ctx.beginPath();
      ctx.roundRect(-rw, -rh, rw * 2, rh * 2, rad);
      ctx.fillStyle = col.fill;
      ctx.fill();
      ctx.restore();
      return;
    }

    // ── ellipse: その他 ───────────────────────────
    ctx.beginPath();
    ctx.ellipse(0, 0, hw, hw * p.hRatio, 0, 0, Math.PI * 2);
    ctx.fillStyle = col.fill;
    ctx.fill();

    ctx.restore();
  }

  // ── 感情カラー（白系単色・形だけで感情を語る） ────
  _color() {
    return { fill: '#dce9f5' };
  }
}

// ════════════════════════════════════════════════════
// APP CONTROLLER
// ════════════════════════════════════════════════════
const canvas   = document.getElementById('robot-canvas');
const bubble   = document.getElementById('speech-bubble');
const bubText  = document.getElementById('bubble-text');
const micBtn   = document.getElementById('mic-btn');
const resetBtn = document.getElementById('reset-btn');
const statusDt = document.getElementById('status-dot');
const statusTx = document.getElementById('status-text');

const robot = new EyeRenderer(canvas);
let isBusy = false, recognition = null;

window.addEventListener('resize', () => robot.resize());

function setStatus(state, label) {
  statusDt.className = state;
  statusTx.textContent = label;
}
function showBubble(text) { bubText.textContent = text; bubble.classList.add('show'); }
function hideBubble()     { bubble.classList.remove('show'); }

// ── TTS（Edge TTS / NanamiNeural） ──────────────────
let currentAudio = null;
function speak(text, onEnd) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  fetch('/api/tts', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  })
  .then(r => { if (!r.ok) throw new Error(); return r.blob(); })
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onplay  = () => robot.setTalking(true);
    audio.onended = () => {
      robot.setTalking(false);
      URL.revokeObjectURL(url); currentAudio = null;
      onEnd?.();
    };
    audio.onerror = () => {
      robot.setTalking(false);
      URL.revokeObjectURL(url); currentAudio = null;
      onEnd?.();
    };
    audio.play().catch(() => { robot.setTalking(false); onEnd?.(); });
  })
  .catch(() => { robot.setTalking(false); onEnd?.(); });
}

// ── メッセージ送信 ───────────────────────────────────
async function sendMessage(text) {
  if (isBusy || !text.trim()) return;
  isBusy = true;
  setStatus('thinking', '💭 考え中…');
  robot.setEmotion('thinking');
  try {
    const res  = await fetch('/api/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    robot.setEmotion(data.emotion || 'idle');
    if (data.action && data.action !== 'none') robot.setAction(data.action);
    showBubble(data.message || '…');
    setStatus('speaking', '🔊 話し中…');
    speak(data.message || '', () => {
      isBusy = false;
      if (continuousMode) {
        setStatus('listening', '👂 聞いてるよ…');
        setTimeout(() => startListening(), 600);
      } else {
        setStatus('ready', '待機中');
      }
    });
  } catch {
    robot.setEmotion('sad');
    showBubble('通信エラー…もう一度試してね');
    setStatus('ready', '待機中');
    isBusy = false;
  }
}

// ── リセット ─────────────────────────────────────────
resetBtn.addEventListener('click', async () => {
  await fetch('/api/reset', { method: 'POST' });
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  hideBubble(); robot.setEmotion('idle');
  setStatus('ready', '待機中');
  isBusy = false;
  setTimeout(() => sendMessage('こんにちは！'), 300);
});

// ── キャンバスクリック ───────────────────────────────
canvas.addEventListener('click', () => robot.blink());
canvas.addEventListener('dblclick', () => {
  robot.setEmotion('surprised');
  showBubble('えっ！びっくりした！');
  speak('えっ、びっくりした！');
});

// ── 音声認識 ─────────────────────────────────────────
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let continuousMode = false, listeningActive = false;

function updateMicBtn() {
  if (continuousMode) {
    micBtn.textContent = '🔴'; micBtn.classList.add('continuous');
  } else {
    micBtn.textContent = '🎤'; micBtn.classList.remove('continuous', 'listening');
  }
}

function startListening() {
  if (!recognition || listeningActive || isBusy) return;
  try { recognition.start(); } catch(e) {}
}

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    listeningActive = true;
    setStatus('listening', '👂 聞いてるよ…');
    micBtn.classList.add('listening');
    robot.setEmotion('happy');
    hideBubble();
  };
  recognition.onresult = e => {
    listeningActive = false;
    const text = e.results[0][0].transcript;
    setTimeout(() => sendMessage(text), 200);
  };
  recognition.onend = () => {
    listeningActive = false;
    micBtn.classList.remove('listening');
    if (continuousMode && !isBusy) setTimeout(() => startListening(), 400);
    else if (!continuousMode && !isBusy) setStatus('ready', '待機中');
  };
  recognition.onerror = e => {
    listeningActive = false;
    micBtn.classList.remove('listening');
    if (e.error === 'no-speech') {
      if (continuousMode && !isBusy) setTimeout(() => startListening(), 400);
      return;
    }
    continuousMode = false; updateMicBtn();
    setStatus('ready', '待機中');
  };

  let pressTimer = null;
  micBtn.addEventListener('pointerdown', () => {
    pressTimer = setTimeout(() => {
      pressTimer = null;
      if (!continuousMode) {
        continuousMode = true; updateMicBtn();
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        if (!isBusy) startListening();
      }
    }, 500);
  });
  micBtn.addEventListener('pointerup', () => {
    if (pressTimer) {
      clearTimeout(pressTimer); pressTimer = null;
      if (continuousMode) {
        continuousMode = false; updateMicBtn();
        try { recognition.abort(); } catch(e) {}
        setStatus('ready', '待機中');
      } else {
        if (isBusy) return;
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        if (!listeningActive) startListening();
      }
    }
  });
  micBtn.addEventListener('pointercancel', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  });
  updateMicBtn();
} else {
  micBtn.style.opacity = '.35';
}

// ── 初回挨拶 ─────────────────────────────────────────
window.addEventListener('load', async () => {
  try {
    const res  = await fetch('/api/greet');
    const data = await res.json();
    robot.setEmotion(data.emotion || 'excited');
    robot.setAction(data.action  || 'nod');
    showBubble(data.message);
    setTimeout(() => speak(data.message), 500);
  } catch {
    showBubble('こんにちは！何でも話しかけてね〜！');
    robot.setEmotion('excited');
  }
  setStatus('ready', '待機中');
});
</script>
</body>
</html>
