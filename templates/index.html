<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Robot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; width: 100%;
    background: #030912;
    color: #cce8f4;
    font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  #app {
    width: 100%; max-width: 480px; height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    padding: 20px 16px 36px; gap: 20px;
  }

  /* ── キャンバス ── */
  #robot-canvas {
    flex-shrink: 0;
    touch-action: none;
    cursor: pointer;
    border-radius: 50%;
    transition: box-shadow .3s;
  }
  #robot-canvas.listening-once {
    box-shadow: none;
  }
  @keyframes canvas-ring {
    0%   { box-shadow: 0 0 0 0   rgba(255,68,136,.50); }
    70%  { box-shadow: 0 0 0 18px rgba(255,68,136,0); }
    100% { box-shadow: 0 0 0 0   rgba(255,68,136,0); }
  }
  #robot-canvas.continuous { animation: canvas-ring 2s infinite; }
  #robot-canvas.continuous.listening-once { animation: canvas-ring .8s infinite; }

  /* ── ステータスバー ── */
  #status-bar {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: #6a8fa8; flex-shrink: 0;
    user-select: none; height: 20px;
  }
  #status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #1a3a55; transition: background .4s; flex-shrink: 0;
  }
  @keyframes blink-dot {
    0%,100%{ opacity:.4; transform:scale(1); }
    50%    { opacity:1;  transform:scale(1.5); }
  }
  /* ⑨ 強化されたステータス表示 */
  #status-dot.listening { background:#ff4488; animation:blink-dot .7s infinite; }
  #status-dot.thinking  { background:#aaaaff; animation:blink-dot 1.3s infinite; }
  #status-dot.speaking  { background:#88ccee; animation:blink-dot .5s infinite; }
  #status-dot.ready     { background:#3a6a88; }
  #status-dot.sleeping  { background:#1a3a55; }

  /* ⑨ マイクラベル（録音中のみ表示） */
  #mic-label {
    font-size: 11px; color: #ff4488;
    opacity: 0; transition: opacity .3s;
    letter-spacing: .03em;
  }
  #mic-label.visible { opacity: 1; }

  /* 極小リセット */
  #reset-hint {
    margin-left: 4px; font-size: 14px;
    opacity: 0.12; cursor: pointer;
    transition: opacity .2s; line-height: 1;
  }
  #reset-hint:hover  { opacity: 0.50; }
  #reset-hint:active { opacity: 0.90; }
</style>
</head>
<body>

<div id="app">
  <canvas id="robot-canvas"></canvas>
  <div id="status-bar">
    <span id="mic-label"></span>
    <span id="reset-hint" title="リセット">⟳</span>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// EYE RENDERER  ─  ⑧ 感情連動まばたき・マイクロトレモア
// ════════════════════════════════════════════════════
class EyeRenderer {
  constructor(canvas) {
    this.canvas       = canvas;
    this.ctx          = canvas.getContext('2d');
    this.emotion      = 'sleep';
    this.action       = 'none';
    this.blinkAmt     = 0;
    this.blinking     = false;
    this.blinkTimer   = 0;
    this.blinkNext    = this._rndBlink();
    this.bobPhase     = 0;
    this.bobY         = 0;
    this.headTilt     = 0;
    this.headTiltTgt  = 0;
    this.actionTimer  = 0;
    this.lastTS       = 0;
    this.talking      = false;
    this.talkPhase    = 0;
    this.excitedPhase = 0;
    this.excitedY     = 0;
    // ⑧ マイクロトレモア
    this.tremorPhase  = 0;
    this.tremorX      = 0;
    this.tremorY      = 0;
    this.resize();
    requestAnimationFrame(this._loop.bind(this));
  }

  resize() {
    const s = Math.min(window.innerWidth * 0.86, 360);
    this.canvas.width = this.canvas.height = s;
    this.W = s; this.CX = s / 2; this.CY = s / 2;
  }

  setEmotion(e) { this.emotion = e; }
  setTalking(v) { this.talking = v; }
  setAction(a)  { if (a === 'none') return; this.action = a; this.actionTimer = 0; }
  blink()       { if (!this.blinking) { this.blinking = true; this.blinkAmt = 0; } }

  // ⑧ 感情ごとにまばたき間隔を変える
  _rndBlink() {
    const rates = {
      idle:      [3000, 5000],
      happy:     [1800, 3500],
      excited:   [1200, 2500],
      thinking:  [5000, 9000],  // 集中中は瞬きが少ない
      sad:       [4000, 8000],
      surprised: [7000,12000],  // 驚き目は瞬きしにくい
      angry:     [1500, 3000],
    };
    const [min, range] = rates[this.emotion] || [3000, 5000];
    return min + Math.random() * range;
  }

  _loop(ts) {
    const dt = Math.min(0.05, (ts - this.lastTS) / 1000);
    this.lastTS = ts;
    this._update(dt);
    this._render();
    requestAnimationFrame(this._loop.bind(this));
  }

  _update(dt) {
    const isSleep = this.emotion === 'sleep';
    const lerp = 1 - Math.exp(-8 * dt);

    // ボブ
    const bobSpeed = isSleep ? 0.35 : this.talking ? 4.0 : 1.0;
    const bobAmp   = isSleep ? 0.004 : 0.010;
    this.bobPhase += dt * bobSpeed;
    this.bobY = Math.sin(this.bobPhase) * (this.W * bobAmp);

    // excited バウンス
    if (this.emotion === 'excited') {
      this.excitedPhase += dt * 7.5;
      this.excitedY = -Math.abs(Math.sin(this.excitedPhase)) * (this.W * 0.034);
    } else {
      this.excitedPhase = 0;
      this.excitedY += (0 - this.excitedY) * Math.min(1, dt * 10);
    }

    // ⑧ マイクロトレモア（感情ごとに振幅変化）
    const tremorAmps = {
      excited: 0.0025,
      angry:   0.0055,
      sad:     0,
      idle:    0,
      thinking:0.0008,
      happy:   0.0005,
      surprised:0.0015,
    };
    const amp = tremorAmps[this.emotion] || 0;
    this.tremorPhase += dt * 28;
    this.tremorX = amp * Math.sin(this.tremorPhase * 2.3) * this.W;
    this.tremorY = amp * Math.cos(this.tremorPhase * 1.7) * this.W;

    // ⑧ 感情連動まばたき
    if (!isSleep) {
      this.blinkTimer += dt * 1000;
      if (!this.blinking && this.blinkTimer > this.blinkNext) {
        this.blinking = true; this.blinkAmt = 0;
        this.blinkTimer = 0; this.blinkNext = this._rndBlink();
      }
      if (this.blinking) {
        this.blinkAmt += dt * 12;
        if (this.blinkAmt >= 1) { this.blinkAmt = 1; this.blinking = false; }
      } else {
        this.blinkAmt = Math.max(0, this.blinkAmt - dt * 12);
      }
    } else {
      this.blinkAmt = 0;
    }

    // Nod / Shake
    if (this.action !== 'none') {
      this.actionTimer += dt;
      if (this.action === 'nod') {
        this.headTiltTgt = Math.sin(this.actionTimer * Math.PI / 0.3) * 0.10;
        if (this.actionTimer > 0.7) { this.action = 'none'; this.headTiltTgt = 0; }
      } else if (this.action === 'shake') {
        this.headTiltTgt = Math.sin(this.actionTimer * Math.PI * 3) * 0.09;
        if (this.actionTimer > 0.9) { this.action = 'none'; this.headTiltTgt = 0; }
      }
    }
    this.headTilt += (this.headTiltTgt - this.headTilt) * lerp;

    if (this.talking) this.talkPhase += dt * 10;
  }

  _render() {
    const { ctx, W, CX, CY } = this;
    ctx.clearRect(0, 0, W, W);
    ctx.save();
    // ⑧ トレモアをトランスレートに反映
    ctx.translate(CX + this.tremorX, CY + this.bobY + this.tremorY);
    ctx.rotate(this.headTilt);
    ctx.translate(-(CX + this.tremorX), -(CY + this.bobY + this.tremorY));
    this._drawEyes(ctx, CX + this.tremorX, CY + this.bobY + this.tremorY);
    ctx.restore();
  }

  _drawEyes(ctx, cx, cy) {
    const W   = this.W;
    const em  = this.emotion;
    const sp  = W * 0.200;
    const hw  = W * 0.100;
    const bSY = 1 - this.blinkAmt * 0.97;

    const yOff = {
      sleep:0, idle:0, happy:0, excited:0,
      thinking: -W * 0.006,
      sad:       W * 0.018,
      surprised:-W * 0.010,
      angry:0,
    };
    const ey = cy - W * 0.010 + (yOff[em] ?? 0) + this.excitedY;
    const talkScale = this.talking ? 1 + Math.sin(this.talkPhase) * 0.04 : 1;

    this._drawOneEye(ctx, cx - sp, ey, hw, bSY * talkScale, em, false);
    this._drawOneEye(ctx, cx + sp, ey, hw, bSY * talkScale, em, true);
  }

  _drawOneEye(ctx, x, y, hw, blinkSY, em, isRight) {
    const W   = this.W;
    const col = this._color();

    const P = {
      sleep:     { hRatio: 0.07,               tilt: 0,                  shape: 'ellipse' },
      idle:      { hRatio: 1.00,               tilt: 0,                  shape: 'ellipse' },
      happy:     { hRatio: 0,                  tilt: 0,                  shape: 'arc'     },
      excited:   { hRatio: 1.15,               tilt: 0,                  shape: 'ellipse' },
      thinking:  { hRatio: isRight?0.70:0.45,  tilt: 0,                  shape: 'ellipse' },
      sad:       { hRatio: 0.70,               tilt: isRight?-0.26:0.26, shape: 'ellipse' },
      surprised: { hRatio: 1.30,               tilt: 0,                  shape: 'ellipse' },
      angry:     { hRatio: 0.16,               tilt: isRight?0.40:-0.40, shape: 'rect'   },
    };
    const p = P[em] ?? P.idle;

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(1, blinkSY);
    ctx.rotate(p.tilt);
    ctx.globalAlpha = (em === 'sleep') ? 0.30 : 1.0;

    if (p.shape === 'arc') {
      const r = hw * 0.80;
      ctx.beginPath();
      ctx.arc(0, r * 0.15, r, Math.PI + 0.18, -0.18, false);
      ctx.strokeStyle = col.fill;
      ctx.lineWidth   = W * 0.048;
      ctx.lineCap     = 'round';
      ctx.stroke();
      ctx.restore();
      return;
    }

    if (p.shape === 'rect') {
      const rw = hw * 0.95, rh = hw * p.hRatio;
      ctx.beginPath();
      ctx.roundRect(-rw, -rh, rw * 2, rh * 2, rh * 0.5);
      ctx.fillStyle = col.fill;
      ctx.fill();
      ctx.restore();
      return;
    }

    ctx.beginPath();
    ctx.ellipse(0, 0, hw, hw * p.hRatio, 0, 0, Math.PI * 2);
    ctx.fillStyle = col.fill;
    ctx.fill();
    ctx.restore();
  }

  _color() { return { fill: '#dce9f5' }; }
}

// ════════════════════════════════════════════════════
// APP CONTROLLER
// ════════════════════════════════════════════════════
const canvas    = document.getElementById('robot-canvas');
const statusDt  = { className: '' }; // ステータスドット削除済み（ダミー）
const micLabel  = document.getElementById('mic-label');    // ⑨
const resetHint = document.getElementById('reset-hint');

const robot = new EyeRenderer(canvas);
window.addEventListener('resize', () => robot.resize());

let isBusy         = false;
let recognition    = null;
let sleepRecRef    = null;
let sleeping       = true;
let continuousMode = false;
let listeningActive= false;
let sleepTimer     = null;
let proactiveTimer = null;  // ⑦
let currentAudio   = null;

const SLEEP_MS      = 300_000; // 5分
const PROACTIVE_MS  = 120_000; // ⑦ 2分無言でプロアクティブ発言

// ② 拡張ウェイクワード＋信頼度閾値
const WAKE_WORDS         = /起きて|おきて|起こして|おこして|おはよ|秋山|あきやま|ねえ|ねぇ|スタート|起動|きどう/;
const WAKE_CONFIDENCE_MIN = 0.50;
const SLEEP_WORDS         = /おやすみ|寝て|ねて|バイバイ|またね|終わり|おわり/;

// ① 思考中フレーズ
const THINKING_PHRASES = [
  '少々お待ちください。'
];

// ⑨ ステータス表示（マイクラベル付き）
function setStatus(state) {
  statusDt.className = state;
  if (state === 'listening') {
    micLabel.classList.add('visible');
  } else {
    micLabel.classList.remove('visible');
  }
}

// ════════════════════════════════════════════════════
// ⑥ 3層記憶システム
// ════════════════════════════════════════════════════
const FACT_KEY  = 'looi_memory';   // 事実記憶
const PROC_KEY  = 'looi_proc';     // 手続き記憶（話題パターン）
const EMO_KEY   = 'looi_emo';      // 感情記憶

// 事実記憶
function getMemory() { return JSON.parse(localStorage.getItem(FACT_KEY) || '[]'); }
function addMemory(fact) {
  if (!fact || fact.length < 3) return;
  const mem = getMemory();
  if (!mem.includes(fact)) {
    mem.push(fact);
    if (mem.length > 30) mem.shift();
    localStorage.setItem(FACT_KEY, JSON.stringify(mem));
    console.log('[memory:fact]', fact);
  }
}

// 手続き記憶：話題×時間帯を蓄積
function trackProc(text) {
  const procs = JSON.parse(localStorage.getItem(PROC_KEY) || '[]');
  procs.push({ text: text.slice(0, 30), hour: new Date().getHours(), ts: Date.now() });
  if (procs.length > 200) procs.shift();
  localStorage.setItem(PROC_KEY, JSON.stringify(procs));
}
function getTopTopics() {
  const procs = JSON.parse(localStorage.getItem(PROC_KEY) || '[]');
  const counts = {};
  procs.forEach(p => {
    const key = p.text.slice(0, 10);
    counts[key] = (counts[key] || 0) + 1;
  });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
}

// 感情記憶：最近の会話の感情傾向
function trackEmo(emotion) {
  const emos = JSON.parse(localStorage.getItem(EMO_KEY) || '[]');
  emos.push({ emotion, ts: Date.now() });
  if (emos.length > 60) emos.shift();
  localStorage.setItem(EMO_KEY, JSON.stringify(emos));
}
function getRecentMood() {
  const emos = JSON.parse(localStorage.getItem(EMO_KEY) || '[]').slice(-15);
  if (emos.length < 3) return null;
  const pos = emos.filter(e => ['happy','excited'].includes(e.emotion)).length;
  const neg = emos.filter(e => ['sad','angry'].includes(e.emotion)).length;
  if (pos > neg + 3) return 'ポジティブな会話が続いている';
  if (neg > pos + 3) return '少し落ち込んだ話題が続いている';
  return null;
}

function clearAllMemory() {
  [FACT_KEY, PROC_KEY, EMO_KEY].forEach(k => localStorage.removeItem(k));
}

// ════════════════════════════════════════════════════
// ⑤ TTS（ブラウザ音声合成フォールバック付き）
// ════════════════════════════════════════════════════

// ⑤ ブラウザ内蔵TTSフォールバック
function speakFallback(text, onEnd) {
  if (!window.speechSynthesis) { onEnd?.(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP'; utt.rate = 1.1; utt.pitch = 1.05;
  utt.onstart = () => robot.setTalking(true);
  utt.onend   = () => { robot.setTalking(false); onEnd?.(); };
  utt.onerror = () => { robot.setTalking(false); onEnd?.(); };
  // ⑤ 音声が見つからない場合に備えてタイムアウト
  setTimeout(() => {
    if (!window.speechSynthesis.speaking) { robot.setTalking(false); onEnd?.(); }
  }, 8000);
  window.speechSynthesis.speak(utt);
}

function speak(text, onEnd) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  // ⑤ オフライン確認
  if (!navigator.onLine) {
    speakFallback(text, onEnd);
    return;
  }
  fetch('/api/tts', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  })
  .then(r => { if (!r.ok) throw new Error('tts_err'); return r.blob(); })
  .then(blob => {
    const url   = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onplay  = () => robot.setTalking(true);
    audio.onended = () => {
      robot.setTalking(false);
      URL.revokeObjectURL(url); currentAudio = null;
      onEnd?.();
    };
    audio.onerror = () => {
      robot.setTalking(false);
      URL.revokeObjectURL(url); currentAudio = null;
      onEnd?.();
    };
    audio.play().catch(() => { robot.setTalking(false); onEnd?.(); });
  })
  .catch(() => {
    robot.setTalking(false);
    // ⑤ Edge TTS失敗時はブラウザTTSで代替
    speakFallback(text, onEnd);
  });
}

// ════════════════════════════════════════════════════
// スリープ管理
// ════════════════════════════════════════════════════
function resetSleepTimer() {
  clearTimeout(sleepTimer);
  sleepTimer = setTimeout(goToSleep, SLEEP_MS);
}

// ⑦ プロアクティブタイマー
function resetProactiveTimer() {
  clearTimeout(proactiveTimer);
  if (!sleeping) proactiveTimer = setTimeout(doProactiveChat, PROACTIVE_MS);
}

function goToSleep() {
  clearTimeout(proactiveTimer);
  clearTimeout(sendDebounceTimer); pendingTranscript = '';
  sleeping = true;
  clearTimeout(sleepTimer);
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  try { recognition?.abort(); } catch(e) {}
  continuousMode = false;
  canvas.classList.remove('continuous', 'listening-once');
  isBusy = false;
  robot.setEmotion('sleep');
  setStatus('sleeping');
  if (!isIOS) setTimeout(startWakeWordListening, 600);
}

// ⑦ 時刻に応じた挨拶
function getTimeGreeting() {
  const h = new Date().getHours();
  if (h < 4)  return '社長、夜分遅くに失礼いたします。何かございましたか？';
  if (h < 11) return '社長、おはようございます。本日もよろしくお願いいたします。';
  if (h < 14) return '社長、お疲れさまです。何かお手伝いできることはございますか？';
  if (h < 18) return '社長、お疲れさまです。ご用件をどうぞ。';
  if (h < 22) return '社長、お疲れさまでした。何かございますか？';
  return '社長、遅くまでお疲れさまです。何かお手伝いいたしましょうか？';
}

function wakeUp() {
  if (!sleeping) return;
  sleeping = false;
  stopWakeWordListening();
  robot.setEmotion('excited');
  robot.setAction('nod');
  setStatus('speaking');
  speak(getTimeGreeting(), () => { // ⑦ 時刻別挨拶
    robot.setEmotion('idle');
    resetSleepTimer();
    resetProactiveTimer(); // ⑦
    setTimeout(() => startListening(), 500);
  });
}

// ⑦ プロアクティブ発話（2分無言で話しかける）
const PROACTIVE_MSGS = [
  '社長、何かお手伝いできることはございますか？',
  '社長、本日のご予定はいかがでしょうか？',
  '社長、何かお調べすることはございますか？',
  '社長、最新ニュースをお伝えしましょうか？',
  '社長、お気軽にお申し付けください。',
  '社長、何かございましたらいつでもどうぞ。',
];
function doProactiveChat() {
  if (sleeping || isBusy) return;
  const msg = PROACTIVE_MSGS[Math.floor(Math.random() * PROACTIVE_MSGS.length)];
  isBusy = true;
  robot.setEmotion('happy');
  setStatus('speaking');
  speak(msg, () => {
    isBusy = false;
    robot.setEmotion('idle');
    resetSleepTimer();
    resetProactiveTimer(); // ⑦ 次のプロアクティブをセット
    setTimeout(() => startListening(), 500);
  });
}

// ════════════════════════════════════════════════════
// ② ウェイクワード検出（信頼度スコア付き）
// ════════════════════════════════════════════════════
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

function stopWakeWordListening() {
  if (sleepRecRef) {
    try { sleepRecRef.abort(); } catch(e) {}
    sleepRecRef = null;
  }
}

function startWakeWordListening() {
  if (!SpeechRec || !sleeping) return;
  if (sleepRecRef) return; // 既に起動中なら重複起動しない
  const sr = new SpeechRec();
  sleepRecRef = sr;
  sr.lang = 'ja-JP';
  sr.continuous = true;   // iOS: start()の呼び出し回数を最小化
  sr.interimResults = false;

  sr.onresult = e => {
    const last = e.results[e.results.length - 1];
    if (!last.isFinal) return;
    const text = last[0].transcript;
    console.log(`[wake] "${text}"`);
    if (WAKE_WORDS.test(text)) wakeUp();
  };
  sr.onend = () => {
    // continuous=trueでもブラウザが認識を終了することがある（iOS等）
    // その場合のみ再起動（頻度を下げるため間隔を長めに）
    if (sleeping && sleepRecRef === sr) {
      sleepRecRef = null;
      setTimeout(startWakeWordListening, 2000);
    }
  };
  sr.onerror = e => {
    console.warn('[wake] error:', e.error);
    if (sleeping && sleepRecRef === sr) {
      sleepRecRef = null;
      setTimeout(startWakeWordListening, 3000);
    }
  };
  try {
    sr.start();
    console.log('[wake] listening started (continuous)');
  } catch(e) {
    console.warn('[wake] start() threw:', e);
    sleepRecRef = null;
    if (sleeping) setTimeout(startWakeWordListening, 3000);
  }
}

// ════════════════════════════════════════════════════
// 会話
// ════════════════════════════════════════════════════
async function sendMessage(text) {
  if (sleeping || isBusy || !text.trim()) return;
  resetSleepTimer();

  // 寝かしつけワード
  if (SLEEP_WORDS.test(text)) {
    isBusy = true;
    robot.setEmotion('sad');
    setStatus('speaking');
    speak('かしこまりました。ごゆっくりお休みください。', goToSleep);
    return;
  }

  isBusy = true;
  setStatus('thinking');
  robot.setEmotion('thinking');

  // ① 即座に思考中フレーズを発話（API待機中）
  const thinkPhrase = THINKING_PHRASES[Math.floor(Math.random() * THINKING_PHRASES.length)];
  speak(thinkPhrase, null); // コールバックなし＝APIが返ったら中断

  // ⑥ 手続き記憶に話題を記録
  trackProc(text);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        memory:  getMemory(),             // 事実記憶（フォールバック）
        proc:    getTopTopics(),           // ⑥ 手続き記憶
        mood:    getRecentMood(),          // ⑥ 感情記憶
      }),
    });

    // ① 思考中フレーズを止めて本返答へ
    if (currentAudio) { currentAudio.pause(); currentAudio = null; robot.setTalking(false); }
    if (window.speechSynthesis) window.speechSynthesis.cancel();

    const data = await res.json();
    if (data.remember) addMemory(data.remember);
    trackEmo(data.emotion || 'idle');  // ⑥ 感情記録

    robot.setEmotion(data.emotion || 'idle');
    if (data.action && data.action !== 'none') robot.setAction(data.action);
    setStatus('speaking');
    speak(data.message || '', () => {
      isBusy = false;
      resetSleepTimer();
      resetProactiveTimer();             // ⑦
      setTimeout(() => startListening(), 1200); // ③ エコー消えるまで待つ
    });
  } catch(err) {
    // ① 思考中フレーズを止める
    if (currentAudio) { currentAudio.pause(); currentAudio = null; robot.setTalking(false); }
    if (window.speechSynthesis) window.speechSynthesis.cancel();

    // ⑤ ネットワークエラー時のフレンドリーメッセージ
    const errMsgs = [
      '申し訳ございません。通信が不安定のようです。もう一度お試しください。',
      '恐れ入ります。接続に問題が発生しております。少々お待ちください。',
    ];
    const errMsg = errMsgs[Math.floor(Math.random() * errMsgs.length)];
    robot.setEmotion('sad');
    setStatus('speaking');
    speak(errMsg, () => {
      isBusy = false;
      resetSleepTimer();
      setTimeout(() => startListening(), 1200); // ③
    });
  }
}

// ════════════════════════════════════════════════════
// リセット
// ════════════════════════════════════════════════════
async function doReset() {
  try { await fetch('/api/reset', { method: 'POST' }); } catch(e) {}
  clearAllMemory(); // ⑥ 全3層記憶をクリア
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  stopWakeWordListening();
  clearTimeout(sleepTimer);
  clearTimeout(proactiveTimer); // ⑦
  clearTimeout(sendDebounceTimer); pendingTranscript = '';
  try { recognition?.abort(); } catch(e) {}
  continuousMode = false;
  canvas.classList.remove('continuous', 'listening-once');
  isBusy = false;
  sleeping = false;
  robot.setEmotion('excited');
  setStatus('speaking');
  speak('リセットいたしました。何なりとお申し付けください。', () => {
    robot.setEmotion('idle');
    resetSleepTimer();
    resetProactiveTimer(); // ⑦
    setTimeout(() => startListening(), 500);
  });
}
resetHint.addEventListener('click', doReset);

// ════════════════════════════════════════════════════
// 会話用音声認識
// ════════════════════════════════════════════════════
function startListening() {
  if (!recognition || listeningActive || isBusy || sleeping) return;
  try { recognition.start(); } catch(e) {}
}

// 発話をデバウンスで蓄積し、間が空いてから送信する
let pendingTranscript = '';
let sendDebounceTimer = null;
const SEND_DELAY_MS   = 1500; // 1.5秒無言で送信確定

function flushTranscript() {
  clearTimeout(sendDebounceTimer);
  sendDebounceTimer = null;
  const text = pendingTranscript.trim();
  pendingTranscript = '';
  if (!text) return;
  try { recognition.abort(); } catch(e) {}
  listeningActive = false;
  canvas.classList.remove('listening-once');
  resetSleepTimer();
  sendMessage(text);
}

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    listeningActive = true;
    canvas.classList.add('listening-once');
    setStatus('listening');
    robot.setEmotion('happy');
  };

  recognition.onresult = e => {
    let interim = '';
    let finalText = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalText += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }

    if (finalText) {
      pendingTranscript = finalText;
      robot.setEmotion('happy');
      clearTimeout(sendDebounceTimer);
      sendDebounceTimer = setTimeout(flushTranscript, SEND_DELAY_MS);
    }

    if (interim) {
      robot.setEmotion('happy');
      clearTimeout(sendDebounceTimer);
      sendDebounceTimer = setTimeout(flushTranscript, SEND_DELAY_MS);
    }
  };

  recognition.onend = () => {
    listeningActive = false;
    canvas.classList.remove('listening-once');
    if (pendingTranscript && sendDebounceTimer) {
      // デバウンス待ち中に認識が切れた場合、即送信
      clearTimeout(sendDebounceTimer);
      flushTranscript();
      return;
    }
    if (!isBusy && !sleeping) setTimeout(() => startListening(), 400);
  };

  recognition.onerror = e => {
    listeningActive = false;
    canvas.classList.remove('listening-once');
    if (e.error === 'no-speech') {
      if (!isBusy && !sleeping) setTimeout(() => startListening(), 400);
      return;
    }
    if (!isBusy && !sleeping) setTimeout(() => startListening(), 1000);
  };

  // ── キャンバス操作 ──────────────────────────────────
  let pressTimer = null;
  canvas.addEventListener('pointerdown', () => {
    pressTimer = setTimeout(() => {
      pressTimer = null;
      if (sleeping) { wakeUp(); return; }
      goToSleep();
    }, 600);
  });
  canvas.addEventListener('pointerup', () => {
    if (pressTimer) {
      clearTimeout(pressTimer); pressTimer = null;
      if (sleeping) { wakeUp(); return; }
      if (currentAudio) { currentAudio.pause(); currentAudio = null; robot.setTalking(false); }
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      clearTimeout(sendDebounceTimer); pendingTranscript = '';
      try { recognition.abort(); } catch(e) {}
      isBusy = false;
      listeningActive = false;
      canvas.classList.remove('listening-once');
      resetSleepTimer();
      resetProactiveTimer(); // ⑦
      setTimeout(() => startListening(), 300);
    }
  });
  canvas.addEventListener('pointercancel', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  });

} else {
  setStatus('ready');
}

// ⑤ オフライン/オンライン検出
window.addEventListener('offline', () => {
  if (!sleeping && !isBusy) {
    isBusy = true;
    robot.setEmotion('sad');
    speakFallback('恐れ入ります。ネットワーク接続が切断されたようです。', () => {
      isBusy = false;
      robot.setEmotion('idle');
      setTimeout(() => startListening(), 800);
    });
  }
});
window.addEventListener('online', () => {
  if (!sleeping && !isBusy) {
    robot.setEmotion('excited');
    speakFallback('ネットワーク接続が復旧いたしました。ご用件をどうぞ。', () => {
      robot.setEmotion('idle');
      setTimeout(() => startListening(), 500);
    });
  }
});

// ── 初期化 ─────────────────────────────────────────
window.addEventListener('load', () => {
  robot.setEmotion('sleep');
  setStatus('sleeping');
  if (!isIOS) setTimeout(startWakeWordListening, 800);
});
</script>
