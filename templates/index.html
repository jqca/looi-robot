<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Robot</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; width: 100%;
    background: #030912;
    color: #cce8f4;
    font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
    overflow: hidden;
  }

  #app {
    width: 100%; height: 100vh;
    position: relative;
  }

  #robot-3d {
    position: absolute; inset: 0;
    touch-action: none;
    cursor: grab;
  }
  #robot-3d:active { cursor: grabbing; }

  /* ── ステータスバー ── */
  #status-bar {
    position: absolute; bottom: 68px;
    left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: #6a8fa8;
    user-select: none; height: 20px; z-index: 10;
  }
  #mic-label {
    font-size: 11px; color: #ff4488;
    opacity: 0; transition: opacity .3s;
    letter-spacing: .03em;
  }
  #mic-label.visible { opacity: 1; }
  #reset-hint {
    margin-left: 4px; font-size: 14px;
    opacity: 0.12; cursor: pointer;
    transition: opacity .2s; line-height: 1;
  }
  #reset-hint:hover  { opacity: 0.50; }
  #reset-hint:active { opacity: 0.90; }

  /* ── テキスト入力 ── */
  #text-input-bar {
    position: absolute; bottom: 16px;
    left: 12px; right: 12px;
    display: flex; align-items: center; gap: 8px;
    max-width: 440px; margin: 0 auto; z-index: 10;
  }
  #text-input {
    flex: 1; height: 40px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(102,170,255,.2);
    border-radius: 20px;
    padding: 0 16px;
    color: #cce8f4;
    font-size: 14px;
    outline: none;
    transition: border-color .3s;
  }
  #text-input::placeholder { color: rgba(204,232,244,.3); }
  #text-input:focus { border-color: rgba(102,170,255,.5); }
  #text-send {
    width: 40px; height: 40px; flex-shrink: 0;
    background: rgba(102,170,255,.15);
    border: 1px solid rgba(102,170,255,.3);
    border-radius: 50%;
    color: #88bbff;
    font-size: 18px;
    cursor: pointer;
    transition: background .2s, transform .1s;
    display: flex; align-items: center; justify-content: center;
  }
  #text-send:hover { background: rgba(102,170,255,.25); }
  #text-send:active { transform: scale(.9); }

  /* ── ジョイスティック ── */
  #joystick-area {
    position: absolute; bottom: 80px; left: 16px;
    width: 90px; height: 90px;
    border-radius: 50%;
    background: rgba(102,170,255,.06);
    border: 1px solid rgba(102,170,255,.12);
    touch-action: none; z-index: 10;
    display: none;
  }
  #joystick-knob {
    position: absolute; width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(102,170,255,.20);
    border: 1px solid rgba(102,170,255,.3);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  @media (hover: none) and (pointer: coarse) {
    #joystick-area { display: block; }
  }

  /* ── 操作ヒント ── */
  #controls-hint {
    position: absolute; top: 12px; right: 12px;
    font-size: 11px; color: rgba(106,143,168,.5);
    z-index: 10; text-align: right; line-height: 1.6;
    pointer-events: none; user-select: none;
  }
  @media (hover: none) { #controls-hint { display: none; } }

  #start-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: #030912;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; cursor: pointer;
    transition: opacity .4s;
  }
  #start-overlay.hidden { opacity: 0; pointer-events: none; }
  #start-overlay .circle {
    width: 120px; height: 120px; border-radius: 50%;
    border: 2px solid rgba(102,170,255,.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    animation: pulse-ring 2s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 0 0 rgba(102,170,255,.3); }
    50% { box-shadow: 0 0 0 16px rgba(102,170,255,0); }
  }
  #start-overlay .label {
    font-size: 15px; color: rgba(204,232,244,.6);
    letter-spacing: 1px;
  }

  /* ── タスク管理パネル ── */
  #task-btn {
    width: 40px; height: 40px; flex-shrink: 0;
    background: rgba(102,170,255,.10);
    border: 1px solid rgba(102,170,255,.2);
    border-radius: 50%;
    color: #6a8fa8;
    font-size: 18px;
    cursor: pointer;
    transition: background .2s, transform .1s;
    display: flex; align-items: center; justify-content: center;
  }
  #task-btn:hover { background: rgba(102,170,255,.20); }
  #task-btn:active { transform: scale(.9); }

  #task-panel {
    position: fixed; inset: 0; z-index: 8000;
    background: rgba(3,9,18,.95);
    display: none; flex-direction: column;
    padding: 20px 16px; overflow-y: auto;
  }
  #task-panel.open { display: flex; }

  #task-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-shrink: 0;
  }
  #task-panel-header h2 {
    font-size: 18px; font-weight: 600; color: #88bbff; margin: 0;
  }
  #task-close {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    color: #6a8fa8; font-size: 20px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }
  #task-add-bar {
    display: flex; gap: 8px; margin-bottom: 12px; flex-shrink: 0;
  }
  #task-title-input {
    flex: 1; height: 38px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(102,170,255,.2);
    border-radius: 8px; padding: 0 12px;
    color: #cce8f4; font-size: 14px; outline: none;
  }
  #task-title-input::placeholder { color: rgba(204,232,244,.3); }
  #task-due-input {
    width: 130px; height: 38px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(102,170,255,.2);
    border-radius: 8px; padding: 0 8px;
    color: #cce8f4; font-size: 13px; outline: none;
    color-scheme: dark;
  }
  #task-add-btn {
    height: 38px; padding: 0 16px;
    background: rgba(102,170,255,.2);
    border: 1px solid rgba(102,170,255,.3);
    border-radius: 8px; color: #88bbff;
    font-size: 14px; cursor: pointer; white-space: nowrap;
  }
  #task-add-btn:hover { background: rgba(102,170,255,.3); }
  #task-filter {
    display: flex; gap: 8px; margin-bottom: 12px; flex-shrink: 0;
  }
  .task-filter-btn {
    padding: 4px 12px; border-radius: 14px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
    color: #6a8fa8; font-size: 12px; cursor: pointer;
  }
  .task-filter-btn.active {
    background: rgba(102,170,255,.15);
    border-color: rgba(102,170,255,.3);
    color: #88bbff;
  }
  .task-list { list-style: none; flex: 1; overflow-y: auto; }
  .task-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; margin-bottom: 6px;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 8px; transition: opacity .3s;
  }
  .task-item.done { opacity: .4; }
  .task-item.done .task-item-title { text-decoration: line-through; }
  .task-item.overdue { border-color: rgba(255,100,100,.25); }
  .task-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid rgba(102,170,255,.3);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 12px; color: transparent;
  }
  .task-check.checked {
    background: rgba(102,170,255,.2);
    border-color: rgba(102,170,255,.5);
    color: #88bbff;
  }
  .task-item-body { flex: 1; min-width: 0; }
  .task-item-title { font-size: 14px; color: #cce8f4; }
  .task-item-due { font-size: 11px; color: #4a7a9a; margin-top: 2px; }
  .task-item-due.overdue-text { color: #ff6666; }
  .task-delete {
    width: 28px; height: 28px; border-radius: 50%;
    background: transparent; border: none;
    color: #4a5a6a; font-size: 16px;
    cursor: pointer; flex-shrink: 0;
  }
  .task-delete:hover { color: #ff6666; }
  .task-empty { text-align: center; padding: 32px 0; color: #4a6a8a; font-size: 14px; }
</style>
</head>
<body>

<div id="start-overlay">
  <div class="circle">👋</div>
  <div class="label">タップして開始</div>
</div>

<div id="app">
  <div id="robot-3d"></div>

  <div id="controls-hint">矢印キー: 移動 / ドラッグ: 視点回転</div>

  <div id="status-bar">
    <span id="mic-label"></span>
    <span id="reset-hint" title="リセット">⟳</span>
  </div>

  <div id="text-input-bar">
    <button id="task-btn" title="タスク管理">☰</button>
    <input id="text-input" type="text" placeholder="テキストで指示..." autocomplete="off">
    <button id="text-send" title="送信">▶</button>
  </div>

  <div id="joystick-area">
    <div id="joystick-knob"></div>
  </div>
</div>

<div id="task-panel">
  <div id="task-panel-header">
    <h2>タスク管理</h2>
    <button id="task-close">✕</button>
  </div>
  <div id="task-add-bar">
    <input id="task-title-input" type="text" placeholder="新しいタスク..." autocomplete="off">
    <input id="task-due-input" type="date">
    <button id="task-add-btn">追加</button>
  </div>
  <div id="task-filter">
    <button class="task-filter-btn active" data-filter="pending">未完了</button>
    <button class="task-filter-btn" data-filter="all">すべて</button>
    <button class="task-filter-btn" data-filter="today">今日</button>
  </div>
  <ul class="task-list" id="task-list"></ul>
</div>

<script>
// ════════════════════════════════════════════════════
// 3D ROBOT RENDERER (Three.js)
// ════════════════════════════════════════════════════
const EMOTION_COLORS = {
  idle:      { primary: 0x66aaff, iris: 0x55aaff },
  happy:     { primary: 0x44ffaa, iris: 0x33ffbb },
  sleep:     { primary: 0x223344, iris: 0x556688 },
  excited:   { primary: 0xffee00, iris: 0xffee44 },
  thinking:  { primary: 0xaaaaff, iris: 0x8888ff },
  sad:       { primary: 0x6688aa, iris: 0x557799 },
  surprised: { primary: 0xff88cc, iris: 0xff66aa },
  angry:     { primary: 0xff4444, iris: 0xff2222 },
};

class RobotRenderer3D {
  constructor(container) {
    this.container = container;
    this.emotion = 'sleep';
    this.talking = false;
    this.action = 'none';
    this.actionTimer = 0;
    this.blinkAmt = 0;
    this.blinking = false;
    this.blinkTimer = 0;
    this.blinkNext = 3000 + Math.random() * 5000;
    this.bobPhase = 0;
    this.talkPhase = 0;
    this.excitedPhase = 0;
    this.excitedY = 0;
    this.headTiltX = 0;
    this.headTiltXTgt = 0;
    this.headTiltY = 0;
    this.headTiltYTgt = 0;
    this.listening = false;
    this.listenPhase = 0;

    this.camAngle = 0;
    this.camPitch = 0.35;
    this.camDist = 9;
    this._lastDrag = null;

    this.moveInput = { x: 0, z: 0 };
    this.velocity = { x: 0, z: 0 };
    this.targetRotY = Math.PI;

    this._initScene();
    this._buildRobot();
    this.lastTS = performance.now();
    this._animate = this._animate.bind(this);
    requestAnimationFrame(this._animate);
  }

  setEmotion(e) { this.emotion = e; }
  setTalking(v) { this.talking = v; }
  setAction(a) {
    if (a === 'none') return;
    this.action = a;
    this.actionTimer = 0;
  }
  blink() { if (!this.blinking) { this.blinking = true; this.blinkAmt = 0; } }
  setListening(v) { this.listening = v; }
  setMoveDirection(x, z) { this.moveInput.x = x; this.moveInput.z = z; }

  resize() {
    const w = this.container.clientWidth;
    const h = this.container.clientHeight;
    this.camera.aspect = w / h;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(w, h);
  }

  _camDragStart(x, y) { this._lastDrag = { x, y }; }
  _camDragMove(x, y) {
    if (!this._lastDrag) return;
    this.camAngle -= (x - this._lastDrag.x) * 0.006;
    this.camPitch = Math.max(0.1, Math.min(1.1, this.camPitch + (y - this._lastDrag.y) * 0.006));
    this._lastDrag = { x, y };
  }
  _camDragEnd() { this._lastDrag = null; }

  _initScene() {
    const w = this.container.clientWidth;
    const h = this.container.clientHeight;

    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x030912);
    this.scene.fog = new THREE.FogExp2(0x030912, 0.025);

    this.camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 120);

    this.renderer = new THREE.WebGLRenderer({ antialias: true });
    this.renderer.setSize(w, h);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.container.appendChild(this.renderer.domElement);

    this.ambientLight = new THREE.AmbientLight(0x334466, 0.5);
    this.scene.add(this.ambientLight);

    this.headLight = new THREE.PointLight(0x66aaff, 1.2, 18);
    this.headLight.castShadow = true;
    this.scene.add(this.headLight);

    const dirLight = new THREE.DirectionalLight(0x668899, 0.4);
    dirLight.position.set(5, 12, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(512, 512);
    this.scene.add(dirLight);

    const hemiLight = new THREE.HemisphereLight(0x1a2a44, 0x050d1e, 0.3);
    this.scene.add(hemiLight);

    const grid = new THREE.GridHelper(60, 60, 0x1a2a44, 0x0a1525);
    grid.material.transparent = true;
    grid.material.opacity = 0.6;
    this.scene.add(grid);

    const groundGeo = new THREE.PlaneGeometry(80, 80);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x050d1e, roughness: 0.95, metalness: 0.05
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.01;
    ground.receiveShadow = true;
    this.scene.add(ground);
  }

  _buildRobot() {
    this.robotGroup = new THREE.Group();
    this.bodyPivot = new THREE.Group();
    this.robotGroup.add(this.bodyPivot);

    const headGeo = new THREE.SphereGeometry(1.0, 32, 32);
    const headMat = new THREE.MeshStandardMaterial({
      color: 0x0d1a2e, roughness: 0.3, metalness: 0.6,
      emissive: 0x0a1525, emissiveIntensity: 0.3,
    });
    this.headMesh = new THREE.Mesh(headGeo, headMat);
    this.headMesh.position.y = 2.8;
    this.headMesh.castShadow = true;
    this.bodyPivot.add(this.headMesh);

    const glowGeo = new THREE.SphereGeometry(1.06, 32, 32);
    this.headGlow = new THREE.Mesh(glowGeo, new THREE.MeshBasicMaterial({
      color: 0x66aaff, transparent: true, opacity: 0.08, side: THREE.BackSide
    }));
    this.headGlow.position.y = 2.8;
    this.bodyPivot.add(this.headGlow);

    const antPoleGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.45, 8);
    this.antPoleMat = new THREE.MeshBasicMaterial({ color: 0x66aaff });
    const antPole = new THREE.Mesh(antPoleGeo, this.antPoleMat);
    antPole.position.set(0, 4.03, 0);
    this.bodyPivot.add(antPole);

    const antTipGeo = new THREE.SphereGeometry(0.06, 12, 12);
    this.antTip = new THREE.Mesh(antTipGeo, this.antPoleMat.clone());
    this.antTip.position.set(0, 4.3, 0);
    this.bodyPivot.add(this.antTip);

    this._buildEyes();

    const neckGeo = new THREE.CylinderGeometry(0.18, 0.22, 0.3, 8);
    const neckMat = new THREE.MeshStandardMaterial({ color: 0x0d1a2e, roughness: 0.5, metalness: 0.5 });
    const neck = new THREE.Mesh(neckGeo, neckMat);
    neck.position.y = 1.65;
    this.bodyPivot.add(neck);

    const bodyGeo = new THREE.BoxGeometry(1.8, 0.6, 0.9);
    const bodyMat = new THREE.MeshStandardMaterial({
      color: 0x0a1020, roughness: 0.4, metalness: 0.5,
      emissive: 0x0a1525, emissiveIntensity: 0.15,
    });
    this.bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
    this.bodyMesh.position.y = 1.2;
    this.bodyMesh.castShadow = true;
    this.bodyPivot.add(this.bodyMesh);

    const bodyEdges = new THREE.EdgesGeometry(bodyGeo);
    this.bodyLine = new THREE.LineSegments(bodyEdges,
      new THREE.LineBasicMaterial({ color: 0x66aaff, transparent: true, opacity: 0.3 }));
    this.bodyLine.position.copy(this.bodyMesh.position);
    this.bodyPivot.add(this.bodyLine);

    this.leds = [];
    for (let i = 0; i < 5; i++) {
      const ledGeo = new THREE.SphereGeometry(0.04, 8, 8);
      const ledMat = new THREE.MeshBasicMaterial({ color: 0x66aaff, transparent: true, opacity: 0.5 });
      const led = new THREE.Mesh(ledGeo, ledMat);
      led.position.set(-0.6 + i * 0.3, 1.2, 0.46);
      this.bodyPivot.add(led);
      this.leds.push(led);
    }

    this._buildTrack(1);
    this._buildTrack(-1);

    this.robotGroup.rotation.y = Math.PI;
    this.scene.add(this.robotGroup);
  }

  _buildEyes() {
    this.eyes = {};
    for (const side of ['left', 'right']) {
      const sign = side === 'left' ? -1 : 1;
      const g = new THREE.Group();
      g.position.set(sign * 0.38, 2.85, 0.88);

      const sclera = new THREE.Mesh(
        new THREE.CircleGeometry(0.22, 32),
        new THREE.MeshBasicMaterial({ color: 0xdce9f5 })
      );
      g.add(sclera);

      const iris = new THREE.Mesh(
        new THREE.CircleGeometry(0.11, 24),
        new THREE.MeshBasicMaterial({ color: 0x55aaff })
      );
      iris.position.z = 0.005;
      g.add(iris);

      const pupil = new THREE.Mesh(
        new THREE.CircleGeometry(0.05, 16),
        new THREE.MeshBasicMaterial({ color: 0x0a0a1a })
      );
      pupil.position.z = 0.01;
      g.add(pupil);

      const highlight = new THREE.Mesh(
        new THREE.CircleGeometry(0.03, 8),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 })
      );
      highlight.position.set(0.06, 0.06, 0.015);
      g.add(highlight);

      const sleepEye = new THREE.Mesh(
        new THREE.PlaneGeometry(0.38, 0.04),
        new THREE.MeshBasicMaterial({ color: 0xdce9f5, transparent: true, opacity: 0.3 })
      );
      sleepEye.visible = false;
      g.add(sleepEye);

      const arcShape = new THREE.Shape();
      const ar = 0.18;
      arcShape.absarc(0, 0, ar, 0, Math.PI, false);
      arcShape.absarc(0, 0, ar - 0.05, Math.PI, 0, true);
      const happyEye = new THREE.Mesh(
        new THREE.ShapeGeometry(arcShape),
        new THREE.MeshBasicMaterial({ color: 0xdce9f5 })
      );
      happyEye.rotation.z = Math.PI;
      happyEye.position.y = 0.02;
      happyEye.visible = false;
      g.add(happyEye);

      const angryEye = new THREE.Mesh(
        new THREE.PlaneGeometry(0.38, 0.05),
        new THREE.MeshBasicMaterial({ color: 0xdce9f5 })
      );
      angryEye.rotation.z = sign * 0.4;
      angryEye.visible = false;
      g.add(angryEye);

      this.bodyPivot.add(g);
      this.eyes[side] = { group: g, sclera, iris, pupil, highlight, sleepEye, happyEye, angryEye };
    }
  }

  _buildTrack(sideSign) {
    const trackGroup = new THREE.Group();
    const tx = sideSign * (0.9 + 0.2);

    const trackGeo = new THREE.CylinderGeometry(0.2, 0.2, 1.2, 12);
    const trackMat = new THREE.MeshStandardMaterial({
      color: 0x0c1425, roughness: 0.6, metalness: 0.4,
      emissive: 0x0a1020, emissiveIntensity: 0.1,
    });
    const trackBody = new THREE.Mesh(trackGeo, trackMat);
    trackBody.position.set(tx, 0.7, 0);
    trackBody.castShadow = true;
    trackGroup.add(trackBody);

    const trackEdges = new THREE.EdgesGeometry(trackGeo);
    const trackLine = new THREE.LineSegments(trackEdges,
      new THREE.LineBasicMaterial({ color: 0x66aaff, transparent: true, opacity: 0.2 }));
    trackLine.position.copy(trackBody.position);
    trackGroup.add(trackLine);

    for (const wy of [0.25, 1.15]) {
      const wheelGeo = new THREE.TorusGeometry(0.14, 0.02, 8, 16);
      const wheelMat = new THREE.MeshBasicMaterial({ color: 0x66aaff, transparent: true, opacity: 0.3 });
      const wheel = new THREE.Mesh(wheelGeo, wheelMat);
      wheel.position.set(tx, wy, 0);
      wheel.rotation.y = Math.PI / 2;
      trackGroup.add(wheel);

      const axle = new THREE.Mesh(
        new THREE.SphereGeometry(0.03, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0x66aaff, transparent: true, opacity: 0.4 })
      );
      axle.position.set(tx, wy, 0);
      trackGroup.add(axle);
    }

    for (let i = 0; i < 6; i++) {
      const ty = 0.3 + i * 0.15;
      const points = [new THREE.Vector3(tx - 0.12, ty, 0), new THREE.Vector3(tx + 0.12, ty, 0)];
      const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.Line(lineGeo,
        new THREE.LineBasicMaterial({ color: 0x66aaff, transparent: true, opacity: 0.15 }));
      trackGroup.add(line);
    }

    this.bodyPivot.add(trackGroup);
  }

  _rndBlink() {
    const rates = {
      idle: [3000, 5000], happy: [1800, 3500], excited: [1200, 2500],
      thinking: [5000, 9000], sad: [4000, 8000], surprised: [7000, 12000], angry: [1500, 3000],
    };
    const [min, range] = rates[this.emotion] || [3000, 5000];
    return min + Math.random() * range;
  }

  _animate(ts) {
    const dt = Math.min(0.05, (ts - this.lastTS) / 1000);
    this.lastTS = ts;
    this._update(dt);
    this._updateEyes();
    this._updateColors();
    this._updateCamera();
    this.renderer.render(this.scene, this.camera);
    requestAnimationFrame(this._animate);
  }

  _update(dt) {
    const isSleep = this.emotion === 'sleep';
    const lerp = 1 - Math.exp(-8 * dt);

    const bobSpeed = isSleep ? 0.35 : this.talking ? 4.0 : 1.0;
    const bobAmp = isSleep ? 0.015 : 0.03;
    this.bobPhase += dt * bobSpeed;
    this.bodyPivot.position.y = Math.sin(this.bobPhase) * bobAmp;

    if (this.emotion === 'excited') {
      this.excitedPhase += dt * 7.5;
      this.excitedY = Math.abs(Math.sin(this.excitedPhase)) * 0.12;
    } else {
      this.excitedPhase = 0;
      this.excitedY += (0 - this.excitedY) * Math.min(1, dt * 10);
    }
    this.bodyPivot.position.y += this.excitedY;

    if (!isSleep) {
      this.blinkTimer += dt * 1000;
      if (!this.blinking && this.blinkTimer > this.blinkNext) {
        this.blinking = true; this.blinkAmt = 0;
        this.blinkTimer = 0; this.blinkNext = this._rndBlink();
      }
      if (this.blinking) {
        this.blinkAmt += dt * 12;
        if (this.blinkAmt >= 1) { this.blinkAmt = 1; this.blinking = false; }
      } else {
        this.blinkAmt = Math.max(0, this.blinkAmt - dt * 12);
      }
    } else {
      this.blinkAmt = 0;
    }

    if (this.action !== 'none') {
      this.actionTimer += dt;
      if (this.action === 'nod') {
        this.headTiltXTgt = Math.sin(this.actionTimer * Math.PI / 0.3) * 0.15;
        if (this.actionTimer > 0.7) { this.action = 'none'; this.headTiltXTgt = 0; }
      } else if (this.action === 'shake') {
        this.headTiltYTgt = Math.sin(this.actionTimer * Math.PI * 3) * 0.12;
        if (this.actionTimer > 0.9) { this.action = 'none'; this.headTiltYTgt = 0; }
      }
    }
    this.headTiltX += (this.headTiltXTgt - this.headTiltX) * lerp;
    this.headTiltY += (this.headTiltYTgt - this.headTiltY) * lerp;
    this.headMesh.rotation.x = this.headTiltX;
    this.headMesh.rotation.y = this.headTiltY;

    if (this.talking) this.talkPhase += dt * 10;
    if (this.listening) this.listenPhase += dt * 8;

    const ca = this.camAngle;
    const fwd = [-Math.sin(ca), -Math.cos(ca)];
    const rgt = [Math.cos(ca), -Math.sin(ca)];
    const wx = this.moveInput.x * rgt[0] + this.moveInput.z * fwd[0];
    const wz = this.moveInput.x * rgt[1] + this.moveInput.z * fwd[1];

    const speed = 4.0;
    const accel = 12.0;
    const friction = 8.0;

    if (Math.abs(this.moveInput.x) > 0.01 || Math.abs(this.moveInput.z) > 0.01) {
      this.velocity.x += (wx * speed - this.velocity.x) * Math.min(1, accel * dt);
      this.velocity.z += (wz * speed - this.velocity.z) * Math.min(1, accel * dt);
      this.targetRotY = Math.atan2(wx, wz) + Math.PI;
    } else {
      this.velocity.x += (0 - this.velocity.x) * Math.min(1, friction * dt);
      this.velocity.z += (0 - this.velocity.z) * Math.min(1, friction * dt);
    }

    this.robotGroup.position.x += this.velocity.x * dt;
    this.robotGroup.position.z += this.velocity.z * dt;

    let angleDiff = this.targetRotY - this.robotGroup.rotation.y;
    while (angleDiff > Math.PI) angleDiff -= 2 * Math.PI;
    while (angleDiff < -Math.PI) angleDiff += 2 * Math.PI;
    this.robotGroup.rotation.y += angleDiff * (1 - Math.exp(-10 * dt));
  }

  _updateEyes() {
    const em = this.emotion;
    const blink = 1 - this.blinkAmt * 0.95;
    const talkScale = this.talking ? 1 + Math.sin(this.talkPhase) * 0.06 : 1;
    const sc = blink * talkScale;

    for (const [side, eye] of Object.entries(this.eyes)) {
      const isRight = side === 'right';
      eye.sclera.visible = false;
      eye.iris.visible = false;
      eye.pupil.visible = false;
      eye.highlight.visible = false;
      eye.sleepEye.visible = false;
      eye.happyEye.visible = false;
      eye.angryEye.visible = false;

      if (em === 'sleep') {
        eye.sleepEye.visible = true;
        eye.group.scale.set(1, 1, 1);
      } else if (em === 'happy') {
        eye.happyEye.visible = true;
        eye.group.scale.set(1, sc, 1);
      } else if (em === 'angry') {
        eye.angryEye.visible = true;
        eye.group.scale.set(1, sc, 1);
      } else {
        eye.sclera.visible = true;
        eye.iris.visible = true;
        eye.pupil.visible = true;
        eye.highlight.visible = true;

        let s = 1.0;
        if (em === 'excited') s = 1.15;
        else if (em === 'surprised') s = 1.3;
        else if (em === 'thinking') s = isRight ? 1.0 : 0.7;
        else if (em === 'sad') s = 0.85;
        eye.group.scale.set(s, s * sc, s);

        if (em === 'sad') {
          eye.group.rotation.z = isRight ? -0.15 : 0.15;
        } else if (em === 'thinking') {
          eye.group.position.y = 2.85 + (isRight ? 0.03 : -0.03);
          eye.group.rotation.z = 0;
        } else {
          eye.group.rotation.z = 0;
          eye.group.position.y = 2.85;
        }
      }
    }
  }

  _updateColors() {
    const col = EMOTION_COLORS[this.emotion] || EMOTION_COLORS.idle;
    const c = new THREE.Color(col.primary);

    this.headLight.color.copy(c);
    this.headLight.position.set(
      this.robotGroup.position.x,
      this.robotGroup.position.y + 3.5,
      this.robotGroup.position.z
    );

    let intensity = this.emotion === 'sleep' ? 0.3 : 1.2;
    if (this.listening) {
      intensity += Math.sin(this.listenPhase) * 0.5;
    }
    this.headLight.intensity = intensity;

    this.headGlow.material.color.copy(c);
    this.headGlow.material.opacity = this.emotion === 'sleep' ? 0.03 : 0.1;

    this.antPoleMat.color.copy(c);
    this.antTip.material.color.copy(c);

    this.bodyLine.material.color.copy(c);

    const irisCol = new THREE.Color(col.iris);
    for (const eye of Object.values(this.eyes)) {
      eye.iris.material.color.copy(irisCol);
    }

    const isSleep = this.emotion === 'sleep';
    this.leds.forEach((led, i) => {
      led.material.color.copy(c);
      led.material.opacity = isSleep ? 0.1 : (0.3 + Math.sin(i * 1.2 + this.bobPhase * 3) * 0.3);
    });
  }

  _updateCamera() {
    const rx = this.robotGroup.position.x;
    const ry = this.robotGroup.position.y;
    const rz = this.robotGroup.position.z;

    const cx = rx + this.camDist * Math.sin(this.camAngle) * Math.cos(this.camPitch);
    const cy = ry + this.camDist * Math.sin(this.camPitch) + 1.5;
    const cz = rz + this.camDist * Math.cos(this.camAngle) * Math.cos(this.camPitch);

    this.camera.position.lerp(new THREE.Vector3(cx, cy, cz), 0.06);
    const lookAt = new THREE.Vector3(rx, ry + 2.0, rz);
    this.camera.lookAt(lookAt);
  }
}

// ════════════════════════════════════════════════════
// APP CONTROLLER
// ════════════════════════════════════════════════════
const container3d = document.getElementById('robot-3d');
const statusDt    = { className: '' };
const micLabel    = document.getElementById('mic-label');
const resetHint   = document.getElementById('reset-hint');

const robot = new RobotRenderer3D(container3d);
window.addEventListener('resize', () => robot.resize());

let isBusy         = false;
let recognition    = null;
let sleepRecRef    = null;
let sleeping       = true;
let continuousMode = false;
let listeningActive= false;
let sleepTimer     = null;
let proactiveTimer = null;
let currentAudio   = null;

const SLEEP_MS      = 300_000;
const PROACTIVE_MS  = 120_000;

const WAKE_WORDS         = /起きて|おきて|起こして|おこして|おはよ|秋山|あきやま|ねえ|ねぇ|スタート|起動|きどう/;
const WAKE_CONFIDENCE_MIN = 0.50;
const SLEEP_WORDS         = /おやすみ|寝て|ねて|バイバイ|またね|終わり|おわり/;

const THINKING_PHRASES = ['少々お待ちください。'];

function setStatus(state) {
  statusDt.className = state;
  if (state === 'listening') {
    micLabel.classList.add('visible');
    robot.setListening(true);
  } else {
    micLabel.classList.remove('visible');
    robot.setListening(false);
  }
}

// ════════════════════════════════════════════════════
// 3層記憶システム
// ════════════════════════════════════════════════════
const FACT_KEY = 'looi_memory';
const PROC_KEY = 'looi_proc';
const EMO_KEY  = 'looi_emo';

function getMemory() { return JSON.parse(localStorage.getItem(FACT_KEY) || '[]'); }
function addMemory(fact) {
  if (!fact || fact.length < 3) return;
  const mem = getMemory();
  if (!mem.includes(fact)) {
    mem.push(fact);
    if (mem.length > 30) mem.shift();
    localStorage.setItem(FACT_KEY, JSON.stringify(mem));
  }
}

function trackProc(text) {
  const procs = JSON.parse(localStorage.getItem(PROC_KEY) || '[]');
  procs.push({ text: text.slice(0, 30), hour: new Date().getHours(), ts: Date.now() });
  if (procs.length > 200) procs.shift();
  localStorage.setItem(PROC_KEY, JSON.stringify(procs));
}
function getTopTopics() {
  const procs = JSON.parse(localStorage.getItem(PROC_KEY) || '[]');
  const counts = {};
  procs.forEach(p => { const key = p.text.slice(0, 10); counts[key] = (counts[key] || 0) + 1; });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
}

function trackEmo(emotion) {
  const emos = JSON.parse(localStorage.getItem(EMO_KEY) || '[]');
  emos.push({ emotion, ts: Date.now() });
  if (emos.length > 60) emos.shift();
  localStorage.setItem(EMO_KEY, JSON.stringify(emos));
}
function getRecentMood() {
  const emos = JSON.parse(localStorage.getItem(EMO_KEY) || '[]').slice(-15);
  if (emos.length < 3) return null;
  const pos = emos.filter(e => ['happy','excited'].includes(e.emotion)).length;
  const neg = emos.filter(e => ['sad','angry'].includes(e.emotion)).length;
  if (pos > neg + 3) return 'ポジティブな会話が続いている';
  if (neg > pos + 3) return '少し落ち込んだ話題が続いている';
  return null;
}

function clearAllMemory() { [FACT_KEY, PROC_KEY, EMO_KEY].forEach(k => localStorage.removeItem(k)); }

// ════════════════════════════════════════════════════
// TTS
// ════════════════════════════════════════════════════
function speakFallback(text, onEnd) {
  if (!window.speechSynthesis) { onEnd?.(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP'; utt.rate = 1.1; utt.pitch = 1.05;
  utt.onstart = () => robot.setTalking(true);
  utt.onend   = () => { robot.setTalking(false); onEnd?.(); };
  utt.onerror = () => { robot.setTalking(false); onEnd?.(); };
  setTimeout(() => {
    if (!window.speechSynthesis.speaking) { robot.setTalking(false); onEnd?.(); }
  }, 8000);
  window.speechSynthesis.speak(utt);
}

function speak(text, onEnd) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (!navigator.onLine) { speakFallback(text, onEnd); return; }
  fetch('/api/tts', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  })
  .then(r => { if (!r.ok) throw new Error('tts_err'); return r.blob(); })
  .then(blob => {
    const url   = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onplay  = () => robot.setTalking(true);
    audio.onended = () => { robot.setTalking(false); URL.revokeObjectURL(url); currentAudio = null; onEnd?.(); };
    audio.onerror = () => { robot.setTalking(false); URL.revokeObjectURL(url); currentAudio = null; onEnd?.(); };
    audio.play().catch(() => {
      robot.setTalking(false); URL.revokeObjectURL(url); currentAudio = null;
      speakFallback(text, onEnd);
    });
  })
  .catch(() => { robot.setTalking(false); speakFallback(text, onEnd); });
}

// ════════════════════════════════════════════════════
// スリープ管理
// ════════════════════════════════════════════════════
function resetSleepTimer() {
  clearTimeout(sleepTimer);
  sleepTimer = setTimeout(goToSleep, SLEEP_MS);
}

function resetProactiveTimer() {
  clearTimeout(proactiveTimer);
  if (!sleeping) proactiveTimer = setTimeout(doProactiveChat, PROACTIVE_MS);
}

function goToSleep() {
  clearTimeout(proactiveTimer);
  clearTimeout(sendDebounceTimer); pendingTranscript = '';
  sleeping = true;
  clearTimeout(sleepTimer);
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  try { recognition?.abort(); } catch(e) {}
  continuousMode = false;
  isBusy = false;
  robot.setEmotion('sleep');
  setStatus('sleeping');
  if (!isIOS) setTimeout(startWakeWordListening, 600);
}

function getTimeGreeting() {
  const h = new Date().getHours();
  if (h < 4)  return '社長、夜分遅くに失礼いたします。何かございましたか？';
  if (h < 11) return '社長、おはようございます。本日もよろしくお願いいたします。';
  if (h < 14) return '社長、お疲れさまです。何かお手伝いできることはございますか？';
  if (h < 18) return '社長、お疲れさまです。ご用件をどうぞ。';
  if (h < 22) return '社長、お疲れさまでした。何かございますか？';
  return '社長、遅くまでお疲れさまです。何かお手伝いいたしましょうか？';
}

function wakeUp() {
  if (!sleeping) return;
  sleeping = false;
  stopWakeWordListening();
  robot.setEmotion('excited');
  robot.setAction('nod');
  setStatus('speaking');
  speak(getTimeGreeting(), () => {
    robot.setEmotion('idle');
    resetSleepTimer();
    resetProactiveTimer();
    setTimeout(() => startListening(), 500);
  });
}

const PROACTIVE_MSGS = [
  '社長、何かお手伝いできることはございますか？',
  '社長、本日のご予定はいかがでしょうか？',
  '社長、何かお調べすることはございますか？',
  '社長、最新ニュースをお伝えしましょうか？',
  '社長、お気軽にお申し付けください。',
  '社長、何かございましたらいつでもどうぞ。',
];
function doProactiveChat() {
  if (sleeping || isBusy) return;
  const msg = PROACTIVE_MSGS[Math.floor(Math.random() * PROACTIVE_MSGS.length)];
  isBusy = true;
  robot.setEmotion('happy');
  setStatus('speaking');
  speak(msg, () => {
    isBusy = false; robot.setEmotion('idle');
    resetSleepTimer(); resetProactiveTimer();
    setTimeout(() => startListening(), 500);
  });
}

// ════════════════════════════════════════════════════
// ウェイクワード検出
// ════════════════════════════════════════════════════
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

function stopWakeWordListening() {
  if (sleepRecRef) { try { sleepRecRef.abort(); } catch(e) {} sleepRecRef = null; }
}

function startWakeWordListening() {
  if (!SpeechRec || !sleeping) return;
  if (sleepRecRef) return;
  const sr = new SpeechRec();
  sleepRecRef = sr;
  sr.lang = 'ja-JP'; sr.continuous = true; sr.interimResults = false;
  sr.onresult = e => {
    const last = e.results[e.results.length - 1];
    if (!last.isFinal) return;
    if (WAKE_WORDS.test(last[0].transcript)) wakeUp();
  };
  sr.onend = () => {
    if (sleeping && sleepRecRef === sr) { sleepRecRef = null; setTimeout(startWakeWordListening, 2000); }
  };
  sr.onerror = e => {
    if (e.error === 'not-allowed') return;
    if (sleeping && sleepRecRef === sr) { sleepRecRef = null; setTimeout(startWakeWordListening, 3000); }
  };
  try { sr.start(); } catch(e) { sleepRecRef = null; if (sleeping) setTimeout(startWakeWordListening, 3000); }
}

// ════════════════════════════════════════════════════
// 会話
// ════════════════════════════════════════════════════
async function sendMessage(text) {
  if (sleeping || isBusy || !text.trim()) return;
  resetSleepTimer();

  if (SLEEP_WORDS.test(text)) {
    isBusy = true; robot.setEmotion('sad'); setStatus('speaking');
    speak('かしこまりました。ごゆっくりお休みください。', goToSleep);
    return;
  }

  isBusy = true; setStatus('thinking'); robot.setEmotion('thinking');
  const thinkPhrase = THINKING_PHRASES[Math.floor(Math.random() * THINKING_PHRASES.length)];
  speak(thinkPhrase, null);
  trackProc(text);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, memory: getMemory(), proc: getTopTopics(), mood: getRecentMood() }),
    });
    if (currentAudio) { currentAudio.pause(); currentAudio = null; robot.setTalking(false); }
    if (window.speechSynthesis) window.speechSynthesis.cancel();

    const data = await res.json();
    if (data.remember) addMemory(data.remember);
    trackEmo(data.emotion || 'idle');
    robot.setEmotion(data.emotion || 'idle');
    if (data.action && data.action !== 'none') robot.setAction(data.action);
    setStatus('speaking');
    speak(data.message || '', () => {
      isBusy = false; resetSleepTimer(); resetProactiveTimer();
      setTimeout(() => startListening(), 1200);
    });
  } catch(err) {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; robot.setTalking(false); }
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    const errMsgs = [
      '申し訳ございません。通信が不安定のようです。もう一度お試しください。',
      '恐れ入ります。接続に問題が発生しております。少々お待ちください。',
    ];
    robot.setEmotion('sad'); setStatus('speaking');
    speak(errMsgs[Math.floor(Math.random() * errMsgs.length)], () => {
      isBusy = false; resetSleepTimer(); setTimeout(() => startListening(), 1200);
    });
  }
}

// ════════════════════════════════════════════════════
// リセット
// ════════════════════════════════════════════════════
async function doReset() {
  try { await fetch('/api/reset', { method: 'POST' }); } catch(e) {}
  clearAllMemory();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  stopWakeWordListening();
  clearTimeout(sleepTimer); clearTimeout(proactiveTimer);
  clearTimeout(sendDebounceTimer); pendingTranscript = '';
  try { recognition?.abort(); } catch(e) {}
  continuousMode = false; isBusy = false; sleeping = false;
  robot.setEmotion('excited'); setStatus('speaking');
  speak('リセットいたしました。何なりとお申し付けください。', () => {
    robot.setEmotion('idle'); resetSleepTimer(); resetProactiveTimer();
    setTimeout(() => startListening(), 500);
  });
}
resetHint.addEventListener('click', doReset);

// ════════════════════════════════════════════════════
// テキスト入力
// ════════════════════════════════════════════════════
const textInput = document.getElementById('text-input');
const textSend  = document.getElementById('text-send');

function submitText() {
  const text = textInput.value.trim();
  if (!text || isBusy) return;
  textInput.value = ''; textInput.blur();
  if (sleeping) { sleeping = false; stopWakeWordListening(); }
  clearTimeout(sendDebounceTimer); pendingTranscript = '';
  try { recognition?.abort(); } catch(e) {}
  listeningActive = false;
  sendMessage(text);
}
textSend.addEventListener('click', submitText);
textInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); submitText(); } });

// ════════════════════════════════════════════════════
// 会話用音声認識
// ════════════════════════════════════════════════════
function startListening() {
  if (!recognition || listeningActive || isBusy || sleeping) return;
  try { recognition.start(); } catch(e) {}
}

let pendingTranscript = '';
let sendDebounceTimer = null;
const SEND_DELAY_MS   = 1500;

function flushTranscript() {
  clearTimeout(sendDebounceTimer); sendDebounceTimer = null;
  const text = pendingTranscript.trim(); pendingTranscript = '';
  if (!text) return;
  try { recognition.abort(); } catch(e) {}
  listeningActive = false;
  resetSleepTimer();
  sendMessage(text);
}

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = 'ja-JP'; recognition.continuous = true; recognition.interimResults = true;

  recognition.onstart = () => {
    listeningActive = true; setStatus('listening'); robot.setEmotion('happy');
  };

  recognition.onresult = e => {
    let finalText = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
    }
    if (finalText) {
      pendingTranscript = finalText;
      robot.setEmotion('happy');
      clearTimeout(sendDebounceTimer);
      sendDebounceTimer = setTimeout(flushTranscript, SEND_DELAY_MS);
    }
  };

  recognition.onend = () => {
    listeningActive = false;
    if (pendingTranscript && sendDebounceTimer) {
      clearTimeout(sendDebounceTimer); flushTranscript(); return;
    }
    if (!isBusy && !sleeping) setTimeout(() => startListening(), 400);
  };

  recognition.onerror = e => {
    listeningActive = false;
    if (e.error === 'no-speech') { if (!isBusy && !sleeping) setTimeout(() => startListening(), 400); return; }
    if (!isBusy && !sleeping) setTimeout(() => startListening(), 1000);
  };
} else {
  setStatus('ready');
}

// ════════════════════════════════════════════════════
// 3Dコンテナ操作（タップ/長押し + カメラ回転）
// ════════════════════════════════════════════════════
{
  const el = robot.renderer.domElement;
  let ptrStart = null;
  let ptrMoved = 0;
  let pressTimer = null;

  el.addEventListener('pointerdown', e => {
    if (e.target.closest('#text-input-bar, #joystick-area, #task-panel')) return;
    ptrStart = { x: e.clientX, y: e.clientY };
    ptrMoved = 0;
    robot._camDragStart(e.clientX, e.clientY);

    pressTimer = setTimeout(() => {
      pressTimer = null;
      if (ptrMoved < 10) {
        if (sleeping) wakeUp(); else goToSleep();
      }
    }, 600);
  });

  el.addEventListener('pointermove', e => {
    if (!ptrStart) return;
    ptrMoved = Math.abs(e.clientX - ptrStart.x) + Math.abs(e.clientY - ptrStart.y);
    if (ptrMoved > 5) robot._camDragMove(e.clientX, e.clientY);
  });

  el.addEventListener('pointerup', () => {
    if (pressTimer) {
      clearTimeout(pressTimer); pressTimer = null;
      if (ptrMoved < 10) {
        if (sleeping) { wakeUp(); }
        else {
          if (currentAudio) { currentAudio.pause(); currentAudio = null; robot.setTalking(false); }
          if (window.speechSynthesis) window.speechSynthesis.cancel();
          clearTimeout(sendDebounceTimer); pendingTranscript = '';
          try { recognition.abort(); } catch(e) {}
          isBusy = false; listeningActive = false;
          resetSleepTimer(); resetProactiveTimer();
          setTimeout(() => startListening(), 300);
        }
      }
    }
    ptrStart = null;
    robot._camDragEnd();
  });

  el.addEventListener('pointercancel', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    ptrStart = null; robot._camDragEnd();
  });

  el.addEventListener('wheel', e => {
    robot.camDist = Math.max(4, Math.min(20, robot.camDist + e.deltaY * 0.01));
  }, { passive: true });
}

// ════════════════════════════════════════════════════
// キーボード移動
// ════════════════════════════════════════════════════
{
  const keys = {};
  window.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    keys[e.key] = true;
    updateKeyMove();
  });
  window.addEventListener('keyup', e => {
    keys[e.key] = false;
    updateKeyMove();
  });
  function updateKeyMove() {
    let x = 0, z = 0;
    if (keys['ArrowUp'] || keys['w']) z = 1;
    if (keys['ArrowDown'] || keys['s']) z = -1;
    if (keys['ArrowLeft'] || keys['a']) x = -1;
    if (keys['ArrowRight'] || keys['d']) x = 1;
    const len = Math.sqrt(x*x + z*z);
    if (len > 0) { x /= len; z /= len; }
    robot.setMoveDirection(x, z);
  }
}

// ════════════════════════════════════════════════════
// タッチジョイスティック
// ════════════════════════════════════════════════════
{
  const area = document.getElementById('joystick-area');
  const knob = document.getElementById('joystick-knob');
  const RANGE = 30;
  let active = false;
  let center = { x: 0, y: 0 };

  area.addEventListener('touchstart', e => {
    e.preventDefault(); active = true;
    const r = area.getBoundingClientRect();
    center = { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }, { passive: false });

  area.addEventListener('touchmove', e => {
    if (!active) return;
    e.preventDefault();
    const t = e.touches[0];
    let dx = t.clientX - center.x;
    let dy = t.clientY - center.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > RANGE) { dx = dx/dist*RANGE; dy = dy/dist*RANGE; }
    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    robot.setMoveDirection(dx / RANGE, -dy / RANGE);
  }, { passive: false });

  const endTouch = () => {
    active = false;
    knob.style.transform = 'translate(-50%, -50%)';
    robot.setMoveDirection(0, 0);
  };
  area.addEventListener('touchend', endTouch);
  area.addEventListener('touchcancel', endTouch);
}

// ════════════════════════════════════════════════════
// オフライン/オンライン検出
// ════════════════════════════════════════════════════
window.addEventListener('offline', () => {
  if (!sleeping && !isBusy) {
    isBusy = true; robot.setEmotion('sad');
    speakFallback('恐れ入ります。ネットワーク接続が切断されたようです。', () => {
      isBusy = false; robot.setEmotion('idle');
      setTimeout(() => startListening(), 800);
    });
  }
});
window.addEventListener('online', () => {
  if (!sleeping && !isBusy) {
    robot.setEmotion('excited');
    speakFallback('ネットワーク接続が復旧いたしました。ご用件をどうぞ。', () => {
      robot.setEmotion('idle'); setTimeout(() => startListening(), 500);
    });
  }
});

// ════════════════════════════════════════════════════
// 8:00 自動起床 + モーニングブリーフィング
// ════════════════════════════════════════════════════
let morningFired = null;

function checkMorningBriefing() {
  const now = new Date();
  const todayKey = now.toISOString().slice(0, 10);
  if (morningFired === todayKey) return;
  if (now.getHours() === 8 && now.getMinutes() === 0) {
    morningFired = todayKey;
    doMorningBriefing();
  }
}

async function doMorningBriefing() {
  if (isBusy) return;
  if (sleeping) { sleeping = false; stopWakeWordListening(); }
  isBusy = true; robot.setEmotion('excited'); robot.setAction('nod'); setStatus('thinking');
  try {
    const res = await fetch('/api/morning-briefing');
    const data = await res.json();
    robot.setEmotion(data.emotion || 'idle');
    if (data.action) robot.setAction(data.action);
    setStatus('speaking');
    speak(data.message || '社長、おはようございます。', () => {
      isBusy = false; robot.setEmotion('idle');
      resetSleepTimer(); resetProactiveTimer();
      setTimeout(() => startListening(), 500);
    });
  } catch(e) {
    robot.setEmotion('idle'); setStatus('speaking');
    speak('社長、おはようございます。本日もよろしくお願いいたします。', () => {
      isBusy = false; resetSleepTimer(); setTimeout(() => startListening(), 500);
    });
  }
}
setInterval(checkMorningBriefing, 30000);

// ════════════════════════════════════════════════════
// タスク管理パネル
// ════════════════════════════════════════════════════
const taskPanel   = document.getElementById('task-panel');
const taskBtn     = document.getElementById('task-btn');
const taskClose   = document.getElementById('task-close');
const taskTitleIn = document.getElementById('task-title-input');
const taskDueIn   = document.getElementById('task-due-input');
const taskAddBtn  = document.getElementById('task-add-btn');
const taskListEl  = document.getElementById('task-list');
let taskFilter    = 'pending';

taskDueIn.value = new Date().toISOString().slice(0, 10);

taskBtn.addEventListener('click', () => { taskPanel.classList.add('open'); loadTasks(); });
taskClose.addEventListener('click', () => taskPanel.classList.remove('open'));

document.querySelectorAll('.task-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.task-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); taskFilter = btn.dataset.filter; loadTasks();
  });
});

taskAddBtn.addEventListener('click', addTask);
taskTitleIn.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addTask(); } });

async function addTask() {
  const title = taskTitleIn.value.trim();
  if (!title) return;
  const due = taskDueIn.value || null;
  try {
    await fetch('/api/tasks', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, due_date: due }),
    });
    taskTitleIn.value = ''; loadTasks();
  } catch(e) {}
}

async function loadTasks() {
  try {
    const params = new URLSearchParams();
    if (taskFilter === 'today') params.set('date', new Date().toISOString().slice(0, 10));
    if (taskFilter === 'all') params.set('done', 'true');
    const res = await fetch('/api/tasks?' + params.toString());
    const data = await res.json();
    renderTasks(data.tasks || []);
  } catch(e) {
    taskListEl.innerHTML = '<li class="task-empty">読み込みに失敗しました</li>';
  }
}

function renderTasks(tasks) {
  if (tasks.length === 0) { taskListEl.innerHTML = '<li class="task-empty">タスクはありません</li>'; return; }
  const today = new Date().toISOString().slice(0, 10);
  taskListEl.innerHTML = tasks.map(t => {
    const isOverdue = t.due_date && t.due_date < today && !t.done;
    return `<li class="task-item${t.done ? ' done' : ''}${isOverdue ? ' overdue' : ''}">
      <button class="task-check${t.done ? ' checked' : ''}" onclick="toggleTask(${t.id}, ${t.done})">${t.done ? '✓' : ''}</button>
      <div class="task-item-body">
        <div class="task-item-title">${escHtml(t.title)}</div>
        ${t.due_date ? `<div class="task-item-due${isOverdue ? ' overdue-text' : ''}">${t.due_date}${isOverdue ? ' (期限超過)' : ''}</div>` : ''}
      </div>
      <button class="task-delete" onclick="deleteTask(${t.id})">×</button>
    </li>`;
  }).join('');
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function toggleTask(id, currentDone) {
  if (currentDone) return;
  try { await fetch(`/api/tasks/${id}/done`, { method: 'POST' }); loadTasks(); } catch(e) {}
}

async function deleteTask(id) {
  try { await fetch(`/api/tasks/${id}`, { method: 'DELETE' }); loadTasks(); } catch(e) {}
}

// ── 初期化 ─────────────────────────────────────────
function unlockAudio() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination); src.start(0); ctx.resume();
  } catch(e) {}
  try {
    const a = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=');
    a.volume = 0.01; a.play().then(() => a.pause()).catch(() => {});
  } catch(e) {}
}

window.addEventListener('load', () => {
  robot.setEmotion('sleep');
  setStatus('sleeping');

  const overlay = document.getElementById('start-overlay');
  overlay.addEventListener('click', () => {
    unlockAudio();
    overlay.classList.add('hidden');
    setTimeout(() => overlay.remove(), 500);
    if (!isIOS) setTimeout(startWakeWordListening, 400);
  }, { once: true });
});
</script>
