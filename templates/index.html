<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LOOI Robot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:    #020b12;
    --bg2:   #0a1a26;
    --accent:#00d4ff;
    --text:  #cce8f4;
    --muted: #4a7a99;
  }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  #app {
    width: 100%; max-width: 480px; height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 16px 24px; gap: 12px;
  }

  /* ── 吹き出し ── */
  #bubble-wrap {
    width: 100%; min-height: 60px; flex-shrink: 0;
    display: flex; justify-content: center; align-items: flex-end;
  }
  #speech-bubble {
    background: var(--bg2);
    border: 1px solid rgba(0,212,255,.3);
    border-radius: 18px 18px 18px 4px;
    padding: 12px 18px; font-size: 15px; line-height: 1.6;
    max-width: 90%; position: relative;
    box-shadow: 0 0 20px rgba(0,212,255,.1);
    transition: opacity .3s, transform .3s;
    opacity: 0; transform: translateY(6px); pointer-events: none;
  }
  #speech-bubble.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  #speech-bubble::after {
    content: ''; position: absolute;
    bottom: -8px; left: 24px; width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 8px solid rgba(0,212,255,.3);
  }

  /* ── キャンバス ── */
  #robot-canvas {
    flex-shrink: 0; cursor: crosshair;
    border-radius: 50%;
    filter: drop-shadow(0 0 28px rgba(0,212,255,.22));
    touch-action: none;
  }

  /* ── ステータス ── */
  #status-bar {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted); flex-shrink: 0; min-height: 20px;
  }
  #status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); transition: background .3s;
  }
  @keyframes blink { 0%,100%{opacity:.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }
  #status-dot.listening { background:#ff4488; animation:blink .8s infinite; }
  #status-dot.thinking  { background:#ffaa00; animation:blink 1.2s infinite; }
  #status-dot.speaking  { background:var(--accent); animation:blink .6s infinite; }
  #status-dot.ready     { background:var(--accent); }

  /* ── ボタン ── */
  #btn-row { display:flex; gap:14px; justify-content:center; }

  .round-btn {
    width:60px; height:60px; border-radius:50%; font-size:24px;
    border:2px solid rgba(0,212,255,.2); background:var(--bg2);
    color:var(--text); cursor:pointer; transition:all .2s;
    display:flex; align-items:center; justify-content:center;
    user-select:none; -webkit-user-select:none;
  }
  .round-btn:hover  { border-color:var(--accent); background:rgba(0,212,255,.08); }
  .round-btn:active { transform:scale(.92); }

  #mic-btn {
    width:70px; height:70px; font-size:28px;
    border-color:rgba(255,68,136,.35);
    background:rgba(255,68,136,.08); color:#ff88bb;
  }
  #mic-btn:hover { border-color:#ff4488; background:rgba(255,68,136,.16); }
  @keyframes mic-pulse { 0%,100%{box-shadow:0 0 20px rgba(255,68,136,.4)} 50%{box-shadow:0 0 36px rgba(255,68,136,.75)} }
  @keyframes cont-ring  { 0%{box-shadow:0 0 0 0 rgba(255,68,136,.6)} 70%{box-shadow:0 0 0 12px rgba(255,68,136,0)} 100%{box-shadow:0 0 0 0 rgba(255,68,136,0)} }
  #mic-btn.listening { border-color:#ff4488; background:rgba(255,68,136,.22); animation:mic-pulse .6s infinite; }
  #mic-btn.continuous { border-color:#ff4488; background:rgba(255,68,136,.14); animation:cont-ring 1.5s infinite; }
  #mic-btn.continuous.listening { animation:mic-pulse .6s infinite, cont-ring 1.5s infinite; }

  /* ── スキャンライン ── */
  #scan-overlay {
    position:fixed; inset:0; pointer-events:none; z-index:999;
    background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,212,255,.016) 3px,rgba(0,212,255,.016) 4px);
  }
</style>
</head>
<body>
<div id="scan-overlay"></div>

<div id="app">
  <div id="bubble-wrap">
    <div id="speech-bubble"><span id="bubble-text"></span></div>
  </div>

  <canvas id="robot-canvas"></canvas>

  <div id="status-bar">
    <div id="status-dot" class="ready"></div>
    <span id="status-text">待機中</span>
  </div>

  <div id="btn-row">
    <button id="mic-btn" class="round-btn" title="話す（長押しで連続モード）">🎤</button>
    <button id="reset-btn" class="round-btn" title="リセット">🔄</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// ROBOT RENDERER  ─ 目だけで感情表現
// ════════════════════════════════════════════════════
class RobotRenderer {
  constructor(canvas) {
    this.canvas   = canvas;
    this.ctx      = canvas.getContext('2d');
    this.emotion  = 'idle';
    this.action   = 'none';
    this.blinkAmt = 0;
    this.blinking = false;
    this.blinkTimer = 0;
    this.blinkNext  = this._rndBlink();
    this.pupilX = 0; this.pupilY = 0;
    this.targetPX = 0; this.targetPY = 0;
    this.bobPhase = 0; this.bobY = 0;
    this.headTilt = 0; this.headTiltTgt = 0;
    this.actionTimer = 0;
    this.lastTS  = 0;
    this.talking = false; this.talkPhase = 0;
    this.resize();
    requestAnimationFrame(this._loop.bind(this));
  }

  resize() {
    const size = Math.min(window.innerWidth * 0.88, 360);
    this.canvas.width = this.canvas.height = size;
    this.W = size; this.CX = size / 2; this.CY = size / 2;
  }

  setEmotion(e) { this.emotion = e; }
  setAction(a)  { if (a === 'none') return; this.action = a; this.actionTimer = 0; }
  setTalking(v) { this.talking = v; }
  gazeAt(nx, ny){ this.targetPX = nx; this.targetPY = ny; }
  blink()       { if (!this.blinking) { this.blinking = true; this.blinkAmt = 0; } }

  _rndBlink() { return 2500 + Math.random() * 5000; }

  _loop(ts) {
    const dt = Math.min(0.05, (ts - this.lastTS) / 1000);
    this.lastTS = ts;
    this._update(dt);
    this._render();
    requestAnimationFrame(this._loop.bind(this));
  }

  _update(dt) {
    const lerp = 1 - Math.exp(-9 * dt);
    this.pupilX += (this.targetPX - this.pupilX) * lerp;
    this.pupilY += (this.targetPY - this.pupilY) * lerp;
    this.bobPhase += dt * (this.talking ? 3.5 : 1.2);
    this.bobY = Math.sin(this.bobPhase) * (this.W * 0.012);
    this.blinkTimer += dt * 1000;
    if (!this.blinking && this.blinkTimer > this.blinkNext) {
      this.blinking = true; this.blinkAmt = 0;
      this.blinkTimer = 0; this.blinkNext = this._rndBlink();
    }
    if (this.blinking) {
      this.blinkAmt += dt * 10;
      if (this.blinkAmt >= 1) { this.blinkAmt = 1; this.blinking = false; }
    } else {
      this.blinkAmt = Math.max(0, this.blinkAmt - dt * 10);
    }
    if (this.action !== 'none') {
      this.actionTimer += dt;
      if (this.action === 'nod') {
        this.headTiltTgt = Math.sin(this.actionTimer * Math.PI / 0.3) * 0.12;
        if (this.actionTimer > 0.7) { this.action = 'none'; this.headTiltTgt = 0; }
      } else if (this.action === 'shake') {
        this.headTiltTgt = Math.sin(this.actionTimer * Math.PI * 3) * 0.10;
        if (this.actionTimer > 0.9) { this.action = 'none'; this.headTiltTgt = 0; }
      }
    }
    this.headTilt += (this.headTiltTgt - this.headTilt) * lerp;
    if (this.talking) this.talkPhase += dt * 12;
  }

  // ── 描画 ────────────────────────────────────────────
  _render() {
    const ctx = this.ctx;
    const { W, CX, CY } = this;
    ctx.clearRect(0, 0, W, W);
    ctx.save();
    ctx.translate(CX, CY + this.bobY);
    ctx.rotate(this.headTilt);
    ctx.translate(-CX, -(CY + this.bobY));
    const cy = CY + this.bobY;
    this._drawFace(ctx, CX, cy);
    this._drawEyes(ctx, CX, cy);
    this._drawRing(ctx, CX, cy);
    ctx.restore();
  }

  // ── 顔（シンプルな暗い円） ─────────────────────────
  _drawFace(ctx, cx, cy) {
    const W = this.W, r = W * 0.42;
    const ec = this._emotionColor();
    // 外側グロー
    const gg = ctx.createRadialGradient(cx, cy, r * 0.5, cx, cy, r * 1.2);
    gg.addColorStop(0, ec.halo);
    gg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(cx, cy, r * 1.2, 0, Math.PI * 2);
    ctx.fillStyle = gg; ctx.fill();
    // 顔本体
    const bg = ctx.createRadialGradient(cx, cy - r * .22, 0, cx, cy, r);
    bg.addColorStop(0, '#161a2a');
    bg.addColorStop(1, '#050810');
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = bg; ctx.fill();
  }

  // ── 両目 ────────────────────────────────────────────
  _drawEyes(ctx, cx, cy) {
    const W = this.W, em = this.emotion;
    const sp  = W * 0.188;
    const ey  = cy - W * 0.040;
    const hw  = W * 0.148;
    const bSY = 1 - this.blinkAmt * 0.98;
    this._drawOneEye(ctx, cx - sp, ey, hw, bSY, em, false);
    this._drawOneEye(ctx, cx + sp, ey, hw, bSY, em, true);
  }

  // ── 1つの目 ─────────────────────────────────────────
  // u = 上まぶた高さ比率, d = 下まぶた高さ比率
  // t = 傾き(rad), ir = 虹彩サイズ比率
  _drawOneEye(ctx, x, y, hw, blinkSY, em, isRight) {
    const W  = this.W;
    const ec = this._emotionColor();
    const hh = hw * 0.62;

    // 感情別パラメータ
    const S = {
      idle:      { u:0.70, d:0.32, t:0,                   ir:0.76 },
      happy:     null,   // 特殊: ◡ アーク
      excited:   { u:0.96, d:0.74, t:0,                   ir:0.90 },
      thinking:  { u:0.52, d:0.22, t:isRight?-0.20:0.20,  ir:0.64 },
      sad:       { u:0.50, d:0.24, t:isRight?-0.28:0.28,  ir:0.62 },
      surprised: { u:1.05, d:0.86, t:0,                   ir:0.95 },
      angry:     { u:0.30, d:0.18, t:isRight?0.36:-0.36,  ir:0.54 },
    };
    const s = S[em];

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(1, blinkSY);

    // ── happy: 閉じた笑い目 (◡) ─────────────────────
    if (!s) {
      ctx.rotate(0);
      ctx.beginPath();
      ctx.moveTo(-hw, 0);
      ctx.quadraticCurveTo(0, -hh * 0.65, hw, 0);
      ctx.strokeStyle = ec.iris1;
      ctx.lineWidth = W * 0.030;
      ctx.lineCap = 'round';
      ctx.shadowColor = ec.iris1; ctx.shadowBlur = 18;
      ctx.stroke(); ctx.shadowBlur = 0;
      ctx.restore();
      return;
    }

    ctx.rotate(s.t);

    // ── 目の形（ベジェ曲線） ─────────────────────────
    ctx.beginPath();
    ctx.moveTo(-hw, 0);
    ctx.quadraticCurveTo(0, -hh * s.u,  hw, 0);  // 上まぶた
    ctx.quadraticCurveTo(0,  hh * s.d, -hw, 0);  // 下まぶた
    ctx.closePath();

    // 白目
    ctx.fillStyle = '#ddeeff';
    ctx.fill();

    // 虹彩クリップ
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(-hw, 0);
    ctx.quadraticCurveTo(0, -hh * s.u,  hw, 0);
    ctx.quadraticCurveTo(0,  hh * s.d, -hw, 0);
    ctx.closePath();
    ctx.clip();

    const ir   = hh * s.ir;
    const pOff = ir * 0.22;
    const px = em === 'thinking' ? (isRight ? pOff*.5 : -pOff*.5) : this.pupilX * pOff;
    const py = this.pupilY * pOff * 0.4;

    if (ir > 2) {
      // 虹彩
      const ig = ctx.createRadialGradient(px-ir*.28, py-ir*.28, 0, px, py, ir);
      ig.addColorStop(0,   ec.iris1);
      ig.addColorStop(0.65,ec.iris2);
      ig.addColorStop(1,   '#000a14');
      ctx.beginPath(); ctx.arc(px, py, ir, 0, Math.PI * 2);
      ctx.fillStyle = ig;
      ctx.shadowColor = ec.iris1; ctx.shadowBlur = 12;
      ctx.fill(); ctx.shadowBlur = 0;
      // 瞳孔
      const pr = ir * 0.34;
      ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI * 2);
      ctx.fillStyle = '#000810'; ctx.fill();
      // ハイライト
      ctx.beginPath(); ctx.arc(px-pr*.42, py-pr*.42, pr*.30, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,.95)'; ctx.fill();
      ctx.beginPath(); ctx.arc(px+pr*.18, py-pr*.10, pr*.12, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,.50)'; ctx.fill();
      // excited キラキラ
      if (em === 'excited') {
        for (let i = 0; i < 4; i++) {
          const a = (i/4)*Math.PI*2 + this.bobPhase;
          ctx.beginPath(); ctx.arc(px+Math.cos(a)*ir*.84, py+Math.sin(a)*ir*.84, 2.5, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(255,255,160,.85)'; ctx.fill();
        }
      }
    }
    ctx.restore(); // クリップ解除

    // 上まぶたライン
    ctx.beginPath();
    ctx.moveTo(-hw, 0);
    ctx.quadraticCurveTo(0, -hh * s.u, hw, 0);
    ctx.strokeStyle = em === 'angry' ? '#ff3311' : '#001830';
    ctx.lineWidth = W * 0.022; ctx.lineCap = 'round';
    ctx.shadowColor = em === 'angry' ? '#ff3311' : ec.border;
    ctx.shadowBlur = 4; ctx.stroke(); ctx.shadowBlur = 0;

    // 下まぶたライン（控えめ）
    ctx.beginPath();
    ctx.moveTo(-hw, 0);
    ctx.quadraticCurveTo(0, hh * s.d, hw, 0);
    ctx.strokeStyle = 'rgba(0,18,36,0.30)';
    ctx.lineWidth = W * 0.008;
    ctx.stroke();

    ctx.restore();
  }

  // ── 外枠リング ──────────────────────────────────────
  _drawRing(ctx, cx, cy) {
    const r  = this.W * 0.42;
    const ec = this._emotionColor();
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = ec.border; ctx.lineWidth = 2.5;
    ctx.shadowColor = ec.border; ctx.shadowBlur = 18;
    ctx.stroke(); ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(cx, cy, r * .88, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,212,255,.05)'; ctx.lineWidth = 1; ctx.stroke();
  }

  // ── 感情カラー ──────────────────────────────────────
  _emotionColor() {
    const m = {
      idle:      { border:'#00d4ff', halo:'rgba(0,212,255,.07)',  iris1:'#00e5ff', iris2:'#004466' },
      happy:     { border:'#00ffcc', halo:'rgba(0,255,180,.09)',  iris1:'#00ffaa', iris2:'#006644' },
      excited:   { border:'#aaff00', halo:'rgba(160,255,0,.09)', iris1:'#ccff44', iris2:'#446600' },
      thinking:  { border:'#8888ff', halo:'rgba(130,130,255,.07)',iris1:'#aaaaff', iris2:'#222266' },
      sad:       { border:'#4488cc', halo:'rgba(60,120,200,.07)', iris1:'#6699ee', iris2:'#112244' },
      surprised: { border:'#ffcc00', halo:'rgba(255,200,0,.09)', iris1:'#ffdd55', iris2:'#664400' },
      angry:     { border:'#ff4400', halo:'rgba(255,80,0,.09)',  iris1:'#ff6633', iris2:'#660000' },
    };
    return m[this.emotion] ?? m.idle;
  }
}

// ════════════════════════════════════════════════════
// APP CONTROLLER
// ════════════════════════════════════════════════════
const canvas   = document.getElementById('robot-canvas');
const bubble   = document.getElementById('speech-bubble');
const bubText  = document.getElementById('bubble-text');
const micBtn   = document.getElementById('mic-btn');
const resetBtn = document.getElementById('reset-btn');
const statusDt = document.getElementById('status-dot');
const statusTx = document.getElementById('status-text');

const robot = new RobotRenderer(canvas);
let isBusy = false, recognition = null;

// ── 視線追従 ────────────────────────────────────────
function updateGaze(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  const dx = clientX - cx, dy = clientY - cy;
  const d  = Math.sqrt(dx*dx + dy*dy) || 1;
  const s  = Math.min(1, d / (r.width * 0.6));
  robot.gazeAt((dx/d)*s, (dy/d)*s);
}
document.addEventListener('mousemove', e => updateGaze(e.clientX, e.clientY));
document.addEventListener('touchmove', e => {
  updateGaze(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });

window.addEventListener('resize', () => robot.resize());

// ── ステータス ──────────────────────────────────────
function setStatus(state, label) {
  statusDt.className = state;
  statusTx.textContent = label;
}
function showBubble(text) { bubText.textContent = text; bubble.classList.add('show'); }
function hideBubble()     { bubble.classList.remove('show'); }

// ── TTS（Edge TTS / NanamiNeural） ──────────────────
let currentAudio = null;
function speak(text, onEnd) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  fetch('/api/tts', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ text }),
  })
  .then(r => { if (!r.ok) throw new Error(); return r.blob(); })
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onplay  = () => { robot.setTalking(true); };
    audio.onended = () => {
      robot.setTalking(false);
      URL.revokeObjectURL(url); currentAudio = null;
      onEnd?.();
    };
    audio.onerror = () => {
      robot.setTalking(false);
      URL.revokeObjectURL(url); currentAudio = null;
      onEnd?.();
    };
    audio.play().catch(() => { robot.setTalking(false); onEnd?.(); });
  })
  .catch(() => { robot.setTalking(false); onEnd?.(); });
}

// ── メッセージ送信 ──────────────────────────────────
async function sendMessage(text) {
  if (isBusy || !text.trim()) return;
  isBusy = true;
  setStatus('thinking', '考え中…');
  robot.setEmotion('thinking');
  try {
    const res  = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    robot.setEmotion(data.emotion || 'idle');
    if (data.action && data.action !== 'none') robot.setAction(data.action);
    showBubble(data.message || '…');
    setStatus('speaking', '話し中…');
    speak(data.message || '', () => {
      isBusy = false;
      if (continuousMode) {
        setStatus('listening', '聞いてるよ…');
        setTimeout(() => startListening(), 600);
      } else {
        setStatus('ready', '待機中');
      }
    });
  } catch {
    robot.setEmotion('sad');
    showBubble('通信エラーが起きたよ…もう一度試してね');
    setStatus('ready', '待機中');
    isBusy = false;
  }
}

// ── リセット ────────────────────────────────────────
resetBtn.addEventListener('click', async () => {
  await fetch('/api/reset', { method:'POST' });
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  hideBubble(); robot.setEmotion('idle');
  setStatus('ready', '待機中');
  isBusy = false;
  setTimeout(() => sendMessage('こんにちは！'), 300);
});

// ── キャンバスクリック ──────────────────────────────
canvas.addEventListener('click', () => robot.blink());
canvas.addEventListener('dblclick', () => {
  robot.setEmotion('surprised');
  showBubble('えっ！びっくりした！');
  speak('えっ、びっくりした！');
});

// ── 音声認識 ────────────────────────────────────────
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let continuousMode = false, listeningActive = false;

function updateMicBtn() {
  if (continuousMode) {
    micBtn.textContent = '🔴';
    micBtn.title = 'タップで連続モード停止';
    micBtn.classList.add('continuous');
  } else {
    micBtn.textContent = '🎤';
    micBtn.title = '話す（長押しで連続モード）';
    micBtn.classList.remove('continuous', 'listening');
  }
}

function startListening() {
  if (!recognition || listeningActive || isBusy) return;
  try { recognition.start(); } catch(e) {}
}

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    listeningActive = true;
    setStatus('listening', '聞いてるよ…');
    micBtn.classList.add('listening');
    robot.setEmotion('happy');
    hideBubble();
  };
  recognition.onresult = e => {
    listeningActive = false;
    const text = e.results[0][0].transcript;
    setTimeout(() => sendMessage(text), 200);
  };
  recognition.onend = () => {
    listeningActive = false;
    micBtn.classList.remove('listening');
    if (continuousMode && !isBusy) setTimeout(() => startListening(), 400);
    else if (!continuousMode && !isBusy) setStatus('ready', '待機中');
  };
  recognition.onerror = e => {
    listeningActive = false;
    micBtn.classList.remove('listening');
    if (e.error === 'no-speech') {
      if (continuousMode && !isBusy) setTimeout(() => startListening(), 400);
      return;
    }
    continuousMode = false; updateMicBtn();
    setStatus('ready', '待機中');
    showBubble('マイクが使えなかったよ。もう一度試してね');
  };

  // 短タップ→1回 / 長押し500ms→連続モード
  let pressTimer = null;
  micBtn.addEventListener('pointerdown', () => {
    pressTimer = setTimeout(() => {
      pressTimer = null;
      if (!continuousMode) {
        continuousMode = true; updateMicBtn();
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        if (!isBusy) startListening();
      }
    }, 500);
  });
  micBtn.addEventListener('pointerup', () => {
    if (pressTimer) {
      clearTimeout(pressTimer); pressTimer = null;
      if (continuousMode) {
        continuousMode = false; updateMicBtn();
        try { recognition.abort(); } catch(e) {}
        setStatus('ready', '待機中');
      } else {
        if (isBusy) return;
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        if (!listeningActive) startListening();
      }
    }
  });
  micBtn.addEventListener('pointercancel', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  });
  updateMicBtn();
} else {
  micBtn.style.opacity = '.35';
  micBtn.title = 'このブラウザは音声認識非対応';
}

// ── 初回挨拶 ────────────────────────────────────────
window.addEventListener('load', async () => {
  try {
    const res  = await fetch('/api/greet');
    const data = await res.json();
    robot.setEmotion(data.emotion || 'excited');
    robot.setAction(data.action  || 'nod');
    showBubble(data.message);
    setTimeout(() => speak(data.message), 500);
  } catch {
    showBubble('こんにちは！何でも話しかけてね〜！');
    robot.setEmotion('excited');
    robot.setAction('nod');
  }
  setStatus('ready', '待機中');
});
</script>
