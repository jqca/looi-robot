<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Robot Kids</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%; width: 100%;
    background: #F0E8D8;
    color: #4a3a2a;
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP',
                 'メイリオ', 'Meiryo', sans-serif;
    overflow: hidden;
  }

  #app {
    width: 100%; height: 100vh;
    position: relative;
  }

  #robot-3d {
    position: absolute; inset: 0;
    touch-action: none;
  }

  /* ── ステータスバー ── */
  #status-bar {
    position: absolute; bottom: 68px;
    left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: #4a6a7a;
    user-select: none; height: 20px; z-index: 10;
  }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4a6a7a; transition: background .3s;
  }
  #status-dot.listening { background: #ff4488; animation: blink .7s infinite; }
  #status-dot.thinking  { background: #ffaa00; animation: blink 1.1s infinite; }
  #status-dot.speaking  { background: #44ffaa; animation: blink .5s infinite; }
  #status-dot.ready     { background: #44aaff; }
  #status-dot.sleeping  { background: #6a5acd; animation: blink 3s infinite; }
  @keyframes blink { 0%,100%{ opacity:.3; } 50%{ opacity:1; } }

  #mic-label {
    font-size: 11px; color: #dd3366;
    opacity: 0; transition: opacity .3s;
    letter-spacing: .03em;
  }
  #mic-label.visible { opacity: 1; }

  /* ── テキスト入力 ── */
  #text-input-bar {
    position: absolute; bottom: 16px;
    left: 12px; right: 12px;
    display: flex; align-items: center; gap: 8px;
    max-width: 440px; margin: 0 auto; z-index: 10;
  }
  #text-input {
    flex: 1; height: 40px;
    background: rgba(255,255,255,.75);
    border: 1px solid rgba(100,160,200,.4);
    border-radius: 20px;
    padding: 0 16px;
    color: #2a3a4a;
    font-size: 14px;
    outline: none;
    transition: border-color .3s;
  }
  #text-input::placeholder { color: rgba(60,80,100,.4); }
  #text-input:focus { border-color: rgba(80,140,200,.6); }
  #text-send {
    width: 40px; height: 40px; flex-shrink: 0;
    background: rgba(80,140,200,.25);
    border: 1px solid rgba(80,140,200,.4);
    border-radius: 50%;
    color: #3a6a8a;
    font-size: 18px;
    cursor: pointer;
    transition: background .2s, transform .1s;
    display: flex; align-items: center; justify-content: center;
  }
  #text-send:hover { background: rgba(80,140,200,.35); }
  #text-send:active { transform: scale(.9); }

  #start-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(180deg, #F0E8D8 0%, #F5E0C8 60%, #F0D8B8 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; cursor: pointer;
    transition: opacity .4s;
  }
  #start-overlay.hidden { opacity: 0; pointer-events: none; }
  #start-overlay .circle {
    width: 120px; height: 120px; border-radius: 50%;
    border: 2px solid rgba(80,140,200,.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    animation: pulse-ring 2s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 0 0 rgba(80,140,200,.3); }
    50% { box-shadow: 0 0 0 16px rgba(80,140,200,0); }
  }
  #start-overlay .label {
    font-size: 15px; color: rgba(40,70,100,.6);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="start-overlay">
  <div class="circle">🤖</div>
  <div class="label">タップしてはじめよう！</div>
</div>

<div id="app">
  <div id="robot-3d"></div>

  <div id="status-bar">
    <div id="status-dot" class="ready"></div>
    <span id="status-text">まってるよ！</span>
    <span id="mic-label"></span>
  </div>

  <div id="text-input-bar">
    <input id="text-input" type="text" placeholder="はなしかけてね…" autocomplete="off" />
    <button id="text-send">▶</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// 3D ROBOT RENDERER (Three.js)
// ════════════════════════════════════════════════════
const EMOTION_COLORS = {
  idle:      { primary: 0x8EBBA8, lens: 0x3399DD, body: 0x8EBBA8, cheek: 0xFFB0C0 },
  happy:     { primary: 0x9ECCA0, lens: 0x44BBEE, body: 0x96C4A8, cheek: 0xFF8FA0 },
  sleep:     { primary: 0x7AA090, lens: 0x6688AA, body: 0x80A898, cheek: 0xCC9AAA },
  excited:   { primary: 0x80D8B8, lens: 0x55CCFF, body: 0x90CCA8, cheek: 0xFF7788 },
  thinking:  { primary: 0x88AAC0, lens: 0x7799EE, body: 0x88B0A8, cheek: 0xBBAACC },
  sad:       { primary: 0x7A9A90, lens: 0x6688AA, body: 0x80A09A, cheek: 0xAA99AA },
  surprised: { primary: 0x80CCB8, lens: 0xEE88CC, body: 0x90C0A8, cheek: 0xFF88AA },
  angry:     { primary: 0xCC8878, lens: 0xFF4444, body: 0xA09888, cheek: 0xFF5555 },
};

class RobotRenderer3D {
  constructor(container) {
    this.container = container;
    this.emotion = 'sleep';
    this.talking = false;
    this.action = 'none';
    this.actionTimer = 0;
    this.blinkAmt = 0;
    this.blinking = false;
    this.blinkTimer = 0;
    this.blinkNext = 3000 + Math.random() * 5000;
    this.bobPhase = 0;
    this.talkPhase = 0;
    this.excitedPhase = 0;
    this.excitedY = 0;
    this.headTiltX = 0;
    this.headTiltXTgt = 0;
    this.headTiltY = 0;
    this.headTiltYTgt = 0;
    this.listening = false;
    this.listenPhase = 0;

    this.idleTimer = 0;
    this.idleWanderX = 0;
    this.idleWanderY = 0;
    this.idleWanderTgtX = 0;
    this.idleWanderTgtY = 0;
    this.nextIdleWander = 2000 + Math.random() * 4000;
    this.idleTiltZ = 0;
    this.idleTiltZTgt = 0;

    this.camAngle = Math.PI;
    this.camPitch = 0.35;
    this.camDist = 9;
    this._lastDrag = null;

    this.armRaiseR = 0; this.armRaiseTgtR = 0;
    this.armRaiseL = 0; this.armRaiseTgtL = 0;

    this.moveInput = { x: 0, z: 0 };
    this.velocity = { x: 0, z: 0 };
    this.targetRotY = Math.PI;

    this._initScene();
    this._buildRobot();
    this.lastTS = performance.now();
    this._animate = this._animate.bind(this);
    requestAnimationFrame(this._animate);
  }

  setEmotion(e) { this.emotion = e; }
  setTalking(v) { this.talking = v; }
  setAction(a) {
    if (a === 'none') return;
    this.action = a;
    this.actionTimer = 0;
    this.dancePhase = 0;
  }
  blink() { if (!this.blinking) { this.blinking = true; this.blinkAmt = 0; } }
  setListening(v) { this.listening = v; }
  setMoveDirection(x, z) { this.moveInput.x = x; this.moveInput.z = z; }

  resize() {
    const w = this.container.clientWidth;
    const h = this.container.clientHeight;
    this.camera.aspect = w / h;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(w, h);
  }

  _initScene() {
    const w = this.container.clientWidth;
    const h = this.container.clientHeight;

    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0xF0E8D8);
    this.scene.fog = new THREE.FogExp2(0xF0E8D8, 0.016);

    this.camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 120);

    this.renderer = new THREE.WebGLRenderer({ antialias: true });
    this.renderer.setSize(w, h);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 1.15;
    this.container.appendChild(this.renderer.domElement);

    this.ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
    this.scene.add(this.ambientLight);

    this.headLight = new THREE.PointLight(0xffeecc, 1.0, 18);
    this.headLight.castShadow = true;
    this.scene.add(this.headLight);

    const dirLight = new THREE.DirectionalLight(0xfff8ee, 1.0);
    dirLight.position.set(4, 14, 6);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 40;
    dirLight.shadow.camera.left = -12;
    dirLight.shadow.camera.right = 12;
    dirLight.shadow.camera.top = 12;
    dirLight.shadow.camera.bottom = -12;
    dirLight.shadow.bias = -0.001;
    this.scene.add(dirLight);

    const hemiLight = new THREE.HemisphereLight(0xFFF0E0, 0xDDCCAA, 0.7);
    this.scene.add(hemiLight);

    // Sunlight from window
    const winLight = new THREE.DirectionalLight(0xFFF5E0, 0.6);
    winLight.position.set(-3, 8, -12); this.scene.add(winLight);

    // Light pine floor
    const groundGeo = new THREE.PlaneGeometry(80, 80);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0xE8D4B0, roughness: 0.65, metalness: 0.0 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2; ground.position.y = -0.01; ground.receiveShadow = true;
    this.scene.add(ground);

    this._buildKidsRoom();
  }

  _buildKidsRoom() {
    const s = this.scene;
    const M = (c, r, m) => new THREE.MeshStandardMaterial({ color: c, roughness: r !== undefined ? r : 0.7, metalness: m || 0 });
    const ME = (c, ec, ei) => new THREE.MeshStandardMaterial({ color: c, emissive: ec, emissiveIntensity: ei, roughness: 0.6 });
    const add = (mesh) => { s.add(mesh); return mesh; };

    // Helper: make a star shape
    const makeStar = (outerR, innerR) => {
      const pts = [];
      for (let i = 0; i < 10; i++) {
        const r = i % 2 === 0 ? outerR : innerR;
        const a = (i * Math.PI / 5) - Math.PI / 2;
        pts.push(new THREE.Vector2(Math.cos(a) * r, Math.sin(a) * r));
      }
      return new THREE.Shape(pts);
    };

    // Helper: make a heart shape
    const makeHeart = (sc) => {
      const h = new THREE.Shape();
      h.moveTo(0, 0.15 * sc);
      h.bezierCurveTo(0, 0.3 * sc, -0.18 * sc, 0.35 * sc, -0.25 * sc, 0.2 * sc);
      h.bezierCurveTo(-0.35 * sc, 0, 0, -0.2 * sc, 0, -0.3 * sc);
      h.bezierCurveTo(0, -0.2 * sc, 0.35 * sc, 0, 0.25 * sc, 0.2 * sc);
      h.bezierCurveTo(0.18 * sc, 0.35 * sc, 0, 0.3 * sc, 0, 0.15 * sc);
      return h;
    };

    // ═══════════════════════════════════
    // WALLS — warm pastel with wainscoting
    // ═══════════════════════════════════
    // Back wall — soft peach upper
    add(new THREE.Mesh(new THREE.BoxGeometry(24, 7.5, 0.2), M(0xFFE0C8, 0.95))).position.set(0, 3.75, -10);
    // Left wall — mint green
    add(new THREE.Mesh(new THREE.BoxGeometry(0.2, 7.5, 22), M(0xC8EED0, 0.95))).position.set(-12, 3.75, 1);
    // Right wall — soft lavender
    add(new THREE.Mesh(new THREE.BoxGeometry(0.2, 7.5, 22), M(0xD8D0F0, 0.95))).position.set(12, 3.75, 1);
    // Ceiling
    add(new THREE.Mesh(new THREE.BoxGeometry(24.4, 0.12, 22.4), M(0xFAF8F5, 0.9))).position.set(0, 7.5, 1);

    // Wainscoting — white lower panels
    add(new THREE.Mesh(new THREE.BoxGeometry(24, 2.0, 0.06), M(0xFAFAFA, 0.85))).position.set(0, 1.0, -9.88);
    add(new THREE.Mesh(new THREE.BoxGeometry(0.06, 2.0, 22), M(0xFAFAFA, 0.85))).position.set(-11.88, 1.0, 1);
    add(new THREE.Mesh(new THREE.BoxGeometry(0.06, 2.0, 22), M(0xFAFAFA, 0.85))).position.set(11.88, 1.0, 1);
    // Chair rail (divider strip)
    const railMat = M(0xF0E8E0, 0.7);
    add(new THREE.Mesh(new THREE.BoxGeometry(24, 0.06, 0.08), railMat)).position.set(0, 2.02, -9.86);
    add(new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.06, 22), railMat)).position.set(-11.86, 2.02, 1);
    add(new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.06, 22), railMat)).position.set(11.86, 2.02, 1);
    // Baseboard
    const trimMat = M(0xF5F0E8, 0.75);
    add(new THREE.Mesh(new THREE.BoxGeometry(24, 0.1, 0.05), trimMat)).position.set(0, 0.05, -9.88);
    add(new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.1, 22), trimMat)).position.set(-11.88, 0.05, 1);
    add(new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.1, 22), trimMat)).position.set(11.88, 0.05, 1);

    // ═══════════════════════════════════
    // LARGE WINDOW — back wall with sunlight
    // ═══════════════════════════════════
    const frameMat = M(0xF5F0E8, 0.6, 0.05);
    // Window frame (white wood)
    add(new THREE.Mesh(new THREE.BoxGeometry(4.0, 3.2, 0.08), frameMat)).position.set(-3, 4.6, -9.88);
    // Glass — bright sky with clouds feel
    add(new THREE.Mesh(new THREE.BoxGeometry(3.5, 2.7, 0.02),
      new THREE.MeshStandardMaterial({ color: 0xBBDDFF, emissive: 0x99CCEE, emissiveIntensity: 0.8, roughness: 0.05, transparent: true, opacity: 0.92 })
    )).position.set(-3, 4.6, -9.82);
    // Mullions (cross pattern)
    add(new THREE.Mesh(new THREE.BoxGeometry(0.06, 2.7, 0.05), frameMat)).position.set(-3, 4.6, -9.80);
    add(new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.06, 0.05), frameMat)).position.set(-3, 4.6, -9.80);
    // Window sill
    add(new THREE.Mesh(new THREE.BoxGeometry(4.4, 0.06, 0.20), M(0xF5F0E8, 0.6))).position.set(-3, 3.0, -9.78);

    // Curtains — polka dot pink
    const curtMat = M(0xFFB0B8, 0.95);
    // Left curtain (gathered)
    add(new THREE.Mesh(new THREE.BoxGeometry(0.7, 3.5, 0.06), curtMat)).position.set(-5.2, 4.5, -9.72);
    // Right curtain
    add(new THREE.Mesh(new THREE.BoxGeometry(0.7, 3.5, 0.06), curtMat)).position.set(-0.8, 4.5, -9.72);
    // Curtain rod (white)
    add(new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 5.0, 8), M(0xF5F0E8, 0.5))).position.set(-3, 6.3, -9.72);
    add(new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 5.0, 8), M(0xF5F0E8, 0.5))).position.set(-3, 6.3, -9.72);
    // Rod finials
    add(new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), M(0xF5F0E8, 0.5))).position.set(-5.5, 6.3, -9.72);
    add(new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), M(0xF5F0E8, 0.5))).position.set(-0.5, 6.3, -9.72);
    // Curtain tie-backs (ribbon bows)
    add(new THREE.Mesh(new THREE.TorusGeometry(0.08, 0.02, 6, 12), M(0xFF8899, 0.8))).position.set(-5.2, 4.0, -9.68);
    add(new THREE.Mesh(new THREE.TorusGeometry(0.08, 0.02, 6, 12), M(0xFF8899, 0.8))).position.set(-0.8, 4.0, -9.68);

    // Small flower pot on window sill
    add(new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.1, 8), M(0xE8A070, 0.8))).position.set(-3.8, 3.1, -9.72);
    add(new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), M(0x55AA55, 0.85))).position.set(-3.8, 3.22, -9.72);
    // Tiny flower
    add(new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 6), ME(0xFF88AA, 0xFF88AA, 0.2))).position.set(-3.78, 3.32, -9.70);

    // ═══════════════════════════════════
    // BED — cozy child's bed (left side)
    // ═══════════════════════════════════
    const bedX = -7, bedZ = -6.5;
    const woodMat = M(0xF0E8D8, 0.6, 0.03);
    // Bed frame base
    add(new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.12, 3.2), woodMat)).position.set(bedX, 0.35, bedZ);
    // Side rails
    add(new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.40, 3.2), woodMat)).position.set(bedX - 0.86, 0.2, bedZ);
    add(new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.40, 3.2), woodMat)).position.set(bedX + 0.86, 0.2, bedZ);
    // Legs (4 rounded)
    [[-0.80, -1.45], [0.80, -1.45], [-0.80, 1.45], [0.80, 1.45]].forEach(([dx, dz]) => {
      add(new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.35, 8), woodMat)).position.set(bedX + dx, 0.175, bedZ + dz);
    });
    // Headboard (arched top — cute house shape)
    add(new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.0, 0.08), woodMat)).position.set(bedX, 0.9, bedZ - 1.56);
    // Headboard arch (triangle roof shape)
    const roofShape = new THREE.Shape();
    roofShape.moveTo(-0.9, 0); roofShape.lineTo(0, 0.5); roofShape.lineTo(0.9, 0); roofShape.lineTo(-0.9, 0);
    const roofGeo = new THREE.ExtrudeGeometry(roofShape, { depth: 0.08, bevelEnabled: false });
    const roof = add(new THREE.Mesh(roofGeo, woodMat));
    roof.position.set(bedX, 1.4, bedZ - 1.56);
    // Headboard window cutout decoration (circle)
    add(new THREE.Mesh(new THREE.RingGeometry(0.12, 0.16, 16), M(0xBBDDFF, 0.5))).position.set(bedX, 1.48, bedZ - 1.50);
    // Footboard (lower)
    add(new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.55, 0.08), woodMat)).position.set(bedX, 0.68, bedZ + 1.56);

    // Mattress
    add(new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.18, 2.9), M(0xFFFAF0, 0.9))).position.set(bedX, 0.50, bedZ);
    // Fitted sheet (light blue)
    add(new THREE.Mesh(new THREE.BoxGeometry(1.58, 0.04, 2.88), M(0xC8E0F8, 0.92))).position.set(bedX, 0.61, bedZ);
    // Pillow
    add(new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.14, 0.45), M(0xF8F0F0, 0.92))).position.set(bedX, 0.69, bedZ - 1.15);
    // Pillow puff
    add(new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 8), M(0xF8F0F0, 0.92))).position.set(bedX, 0.72, bedZ - 1.15);
    // Duvet/blanket (stars pattern — represented by coloured top)
    add(new THREE.Mesh(new THREE.BoxGeometry(1.55, 0.10, 1.8), M(0xFFB8C8, 0.9))).position.set(bedX, 0.67, bedZ + 0.3);
    // Blanket fold edge
    add(new THREE.Mesh(new THREE.BoxGeometry(1.55, 0.12, 0.08), M(0xFFA0B0, 0.9))).position.set(bedX, 0.69, bedZ - 0.6);
    // Small star decorations on blanket
    [[-0.3, 0.0], [0.2, 0.4], [-0.1, 0.8], [0.4, -0.2]].forEach(([dx, dz]) => {
      const stGeo = new THREE.ExtrudeGeometry(makeStar(0.06, 0.025), { depth: 0.01, bevelEnabled: false });
      add(new THREE.Mesh(stGeo, ME(0xFFDD55, 0xFFDD55, 0.15))).position.set(bedX + dx, 0.73, bedZ + 0.3 + dz);
    });
    // Stuffed bunny on bed
    add(new THREE.Mesh(new THREE.SphereGeometry(0.10, 8, 8), M(0xF5E8E0, 0.9))).position.set(bedX + 0.5, 0.78, bedZ - 0.8);
    add(new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), M(0xF5E8E0, 0.9))).position.set(bedX + 0.5, 0.90, bedZ - 0.8);
    // Bunny ears
    add(new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.025, 0.12, 6), M(0xF5E8E0, 0.9))).position.set(bedX + 0.47, 1.00, bedZ - 0.8);
    add(new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.025, 0.12, 6), M(0xF5E8E0, 0.9))).position.set(bedX + 0.53, 1.00, bedZ - 0.8);
    // Bunny pink inner ears
    add(new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.015, 0.08, 6), M(0xFFBBCC, 0.9))).position.set(bedX + 0.47, 1.00, bedZ - 0.79);
    add(new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.015, 0.08, 6), M(0xFFBBCC, 0.9))).position.set(bedX + 0.53, 1.00, bedZ - 0.79);

    // Night light (star shape) — on wall above bed
    const nlGeo = new THREE.ExtrudeGeometry(makeStar(0.22, 0.10), { depth: 0.04, bevelEnabled: false });
    add(new THREE.Mesh(nlGeo, ME(0xFFEE88, 0xFFEE88, 0.4))).position.set(bedX, 3.8, -9.80);
    add(new THREE.PointLight(0xFFEE88, 0.3, 5)).position.set(bedX, 3.8, -9.5);

    // ═══════════════════════════════════
    // BOOKSHELF — colourful cube storage
    // ═══════════════════════════════════
    const bsX = -5, bsZ = -9.2;
    const bsW = 2.4, bsH = 2.4, bsD = 0.45;
    const shelfWood = M(0xF0E8D8, 0.55, 0.03);
    // Main frame
    add(new THREE.Mesh(new THREE.BoxGeometry(bsW, bsH, bsD), shelfWood)).position.set(bsX, bsH / 2 + 0.02, bsZ);
    // Horizontal dividers (3 rows → 2 dividers)
    [0.82, 1.62].forEach(y => {
      add(new THREE.Mesh(new THREE.BoxGeometry(bsW - 0.08, 0.04, bsD - 0.04), shelfWood)).position.set(bsX, y, bsZ);
    });
    // Vertical dividers (3 cols → 2 dividers)

  _buildRobot() {
    this.robotGroup = new THREE.Group();
    this.bodyPivot = new THREE.Group();
    this.robotGroup.add(this.bodyPivot);

    const bwB = 0.574, bwT = 0.406, bh = 0.364, bDepth = 0.91;
    const bodyShape = new THREE.Shape();
    const bcr = 0.06;
    bodyShape.moveTo(-bwB + bcr, -bh);
    bodyShape.lineTo(bwB - bcr, -bh);
    bodyShape.quadraticCurveTo(bwB, -bh, bwB - 0.02, -bh + bcr);
    bodyShape.lineTo(bwT + 0.02, bh - bcr);
    bodyShape.quadraticCurveTo(bwT, bh, bwT - bcr, bh);
    bodyShape.lineTo(-bwT + bcr, bh);
    bodyShape.quadraticCurveTo(-bwT, bh, -bwT - 0.02, bh - bcr);
    bodyShape.lineTo(-bwB + 0.02, -bh + bcr);
    bodyShape.quadraticCurveTo(-bwB, -bh, -bwB + bcr, -bh);
    const bodyGeo = new THREE.ExtrudeGeometry(bodyShape, {
      depth: bDepth, bevelEnabled: true,

    bodyGeo.center();
    this.bodyMat = new THREE.MeshStandardMaterial({

    });
    this.bodyMesh = new THREE.Mesh(bodyGeo, this.bodyMat);
    this.bodyMesh.position.y = 1.114;
    this.bodyMesh.castShadow = true;
    this.bodyPivot.add(this.bodyMesh);

    const bodyEdges = new THREE.EdgesGeometry(bodyGeo, 20);
    this.bodyLine = new THREE.LineSegments(bodyEdges,
      new THREE.LineBasicMaterial({ color: 0xA0D0B8, transparent: true, opacity: 0.25 }));
    this.bodyLine.position.copy(this.bodyMesh.position);
    this.bodyPivot.add(this.bodyLine);

    const hatchW = bwT * 1.3, hatchH = bh * 1.3;
    const hatchGeo = new THREE.BoxGeometry(hatchW, hatchH, 0.05);
    const hatchMat = new THREE.MeshStandardMaterial({ color: 0xC8DDD0, roughness: 0.55, metalness: 0.08 });
    const hatch = new THREE.Mesh(hatchGeo, hatchMat);
    hatch.position.set(0, 1.114, bDepth / 2 + 0.05);
    this.bodyPivot.add(hatch);

    for (const hy of [-0.15, 0.15]) {
      const seamGeo = new THREE.BoxGeometry(hatchW * 0.92, 0.008, 0.008);
      const seam = new THREE.Mesh(seamGeo, new THREE.MeshStandardMaterial({ color: 0x6A9A80, roughness: 0.6, metalness: 0.3 }));
      seam.position.set(0, 1.114 + hy, bDepth / 2 + 0.076);

    }

    const rivetMat = new THREE.MeshStandardMaterial({ color: 0xB0B4BB, roughness: 0.3, metalness: 0.8 });
    const rivetGeo = new THREE.SphereGeometry(0.018, 6, 6);
    const rZ = bDepth / 2 + 0.058;
    const rivets = [[-hatchW/2+0.04,bh*0.5],[hatchW/2-0.04,bh*0.5],[-hatchW/2+0.04,-bh*0.5],[hatchW/2-0.04,-bh*0.5],[-hatchW/2+0.04,0],[hatchW/2-0.04,0],[0,bh*0.5],[0,-bh*0.5]];
    for (const [rx, ry] of rivets) { const r = new THREE.Mesh(rivetGeo, rivetMat); r.position.set(rx, 1.114+ry, rZ); this.bodyPivot.add(r); }

    const hingeMat = new THREE.MeshStandardMaterial({ color: 0x9A9EA5, roughness: 0.3, metalness: 0.7 });
    for (const hx of [-hatchW/2+0.05, hatchW/2-0.05]) {
      const hinge = new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.022,0.06,8), hingeMat);
      hinge.rotation.x = Math.PI/2; hinge.position.set(hx, 1.114+hatchH/2-0.04, bDepth/2+0.08);
      this.bodyPivot.add(hinge);
    }

    for (const sx of [-1,1]) { for (let vi=0;vi<3;vi++) {
      const vent = new THREE.Mesh(new THREE.BoxGeometry(0.10,0.014,0.014), new THREE.MeshStandardMaterial({color:0x3A4A42,roughness:0.9,metalness:0.1}));
      vent.position.set(sx*(hatchW/2+0.12), 1.114+(vi-1)*0.07, bDepth/2+0.05); this.bodyPivot.add(vent);
    }}

    const topPlate = new THREE.Mesh(new THREE.BoxGeometry(bwT*1.75,0.04,bDepth*0.82), new THREE.MeshStandardMaterial({color:0x7AAA98,roughness:0.55,metalness:0.15}));
    topPlate.position.set(0, 1.114+bh+0.02, 0); this.bodyPivot.add(topPlate);

    const handleMat = new THREE.MeshStandardMaterial({color:0x7A9A8A,roughness:0.4,metalness:0.5});
    const handle = new THREE.Mesh(new THREE.TorusGeometry(0.06,0.015,6,12,Math.PI), handleMat);
    handle.rotation.y = Math.PI/2; handle.position.set(0, 1.114+bh+0.10, -0.10); this.bodyPivot.add(handle);

    const bumper = new THREE.Mesh(new THREE.BoxGeometry(bwB*2.05,0.06,bDepth*0.90), new THREE.MeshStandardMaterial({color:0x5A7A6A,roughness:0.7,metalness:0.20}));
    bumper.position.set(0, 1.114-bh-0.01, 0); this.bodyPivot.add(bumper);

    const neckGeo = new THREE.CylinderGeometry(0.08, 0.10, 0.7, 8);
    const metalMat = new THREE.MeshStandardMaterial({color:0x7A9A8A,roughness:0.4,metalness:0.5});
    const neck = new THREE.Mesh(neckGeo, metalMat); neck.position.y = 1.958; this.bodyPivot.add(neck);

    const ringGeo = new THREE.TorusGeometry(0.11, 0.025, 8, 16);
    const ring = new THREE.Mesh(ringGeo, metalMat.clone()); ring.rotation.x = Math.PI/2; ring.position.y = 1.608; this.bodyPivot.add(ring);

    this.eyeUnit = new THREE.Group(); this.eyeUnit.position.y = 2.508;
    this._buildEyes(); this.bodyPivot.add(this.eyeUnit);

    this._buildArm(1); this._buildArm(-1);

    this.cheekLeds = [];
    for (const sx of [-1,1]) {
      const cheekLed = new THREE.Mesh(new THREE.SphereGeometry(0.10,16,16), new THREE.MeshBasicMaterial({color:0xFFB0C0,transparent:true,opacity:0.50}));
      cheekLed.position.set(sx*0.55, -0.28, 0.20); this.eyeUnit.add(cheekLed); this.cheekLeds.push(cheekLed);
    }

    this._buildTrack(1); this._buildTrack(-1);
    this.robotGroup.rotation.y = Math.PI; this.scene.add(this.robotGroup);
  }

  _buildArm(sideSign) {
    const armGroup = new THREE.Group();
    const ax = sideSign*0.50;
    const metalMat = new THREE.MeshStandardMaterial({color:0x6A8878,roughness:0.45,metalness:0.45});
    const jointMat = new THREE.MeshStandardMaterial({color:0x556A60,roughness:0.35,metalness:0.55});
    const handMat = new THREE.MeshStandardMaterial({color:0xB8CCC0,roughness:0.40,metalness:0.20});

    const bracket = new THREE.Mesh(new THREE.BoxGeometry(0.22,0.14,0.18), metalMat);
    bracket.position.set(ax, 1.40, 0); armGroup.add(bracket);

    const upperLen=0.60, foreLen=0.525;
    const shoulderTiltX=-0.7, shoulderTiltZ=sideSign*0.25, elbowBend=-0.8;

    const shoulderPivot = new THREE.Group();
    shoulderPivot.position.set(ax+sideSign*0.04, 1.37, 0);
    shoulderPivot.rotation.x=shoulderTiltX; shoulderPivot.rotation.z=shoulderTiltZ;
    shoulderPivot.add(new THREE.Mesh(new THREE.SphereGeometry(0.12,16,16), jointMat));
    const upperCyl = new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.085,upperLen,12), metalMat);
    upperCyl.position.y=-upperLen/2; shoulderPivot.add(upperCyl);

    const elbowPivot = new THREE.Group();
    elbowPivot.position.y=-upperLen; elbowPivot.rotation.x=elbowBend;
    elbowPivot.add(new THREE.Mesh(new THREE.SphereGeometry(0.10,12,12), jointMat));
    const foreCyl = new THREE.Mesh(new THREE.CylinderGeometry(0.085,0.07,foreLen,12), metalMat);
    foreCyl.position.y=-foreLen/2; elbowPivot.add(foreCyl);

    const handGroup = new THREE.Group();
    handGroup.position.y=-foreLen; handGroup.rotation.x=-(shoulderTiltX+elbowBend);
    handGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.08,10,10), jointMat));
    const palm = new THREE.Mesh(new THREE.BoxGeometry(0.20,0.10,0.20), handMat); palm.position.y=-0.07; handGroup.add(palm);
    for (const fo of [-0.06,0,0.06]) {
      const finger = new THREE.Mesh(new THREE.BoxGeometry(0.055,0.08,0.045), handMat); finger.position.set(0,-0.15,fo); handGroup.add(finger);
      const tip = new THREE.Mesh(new THREE.SphereGeometry(0.030,8,8), handMat); tip.position.set(0,-0.20,fo); handGroup.add(tip);
    }
    const thumb = new THREE.Mesh(new THREE.BoxGeometry(0.045,0.08,0.05), handMat);
    thumb.position.set(sideSign*0.09,-0.05,0); thumb.rotation.z=sideSign*0.5; handGroup.add(thumb);

    elbowPivot.add(handGroup); shoulderPivot.add(elbowPivot); armGroup.add(shoulderPivot); this.bodyPivot.add(armGroup);
    if (sideSign===1) { this.shoulderPivotR=shoulderPivot; this.elbowPivotR=elbowPivot; this.handGroupR=handGroup; }
    else { this.shoulderPivotL=shoulderPivot; this.elbowPivotL=elbowPivot; this.handGroupL=handGroup; }
  }

  _updateArmPose(sideSign, raise) {
    const pivot=sideSign===1?this.shoulderPivotR:this.shoulderPivotL;
    const elbow=sideSign===1?this.elbowPivotR:this.elbowPivotL;
    const hand=sideSign===1?this.handGroupR:this.handGroupL;
    if (!pivot) return;
    const sx=-0.7+(-2.8-(-0.7))*raise, sz=sideSign*(0.25+(0.35-0.25)*raise), ex=-0.8+(0.3-(-0.8))*raise;
    pivot.rotation.x=sx; pivot.rotation.z=sz; elbow.rotation.x=ex; hand.rotation.x=-(sx+ex);
  }

  _buildTrack(sideSign) {
    const trackGroup = new THREE.Group();
    const tx=sideSign*0.77, trackW=0.32;
    const botHalf=0.72, topHalf=0.30, hH=0.375, cr=0.09, beltY=0.375;
    const shape = new THREE.Shape();
    shape.moveTo(-botHalf+cr,-hH); shape.lineTo(botHalf-cr,-hH);
    shape.quadraticCurveTo(botHalf,-hH,botHalf-0.04,-hH+cr);
    shape.lineTo(topHalf+0.04,hH-cr); shape.quadraticCurveTo(topHalf,hH,topHalf-cr,hH);
    shape.lineTo(-topHalf+cr,hH); shape.quadraticCurveTo(-topHalf,hH,-topHalf-0.04,hH-cr);
    shape.lineTo(-botHalf+0.04,-hH+cr); shape.quadraticCurveTo(-botHalf,-hH,-botHalf+cr,-hH);

    const beltGeo = new THREE.ExtrudeGeometry(shape, {depth:trackW,bevelEnabled:false});
    const beltMat = new THREE.MeshStandardMaterial({color:0x3A4A42,roughness:0.85,metalness:0.25,emissive:0x0A1A12,emissiveIntensity:0.08});
    const belt = new THREE.Mesh(beltGeo, beltMat); belt.rotation.y=Math.PI/2; belt.position.set(tx-trackW/2,beltY,0); belt.castShadow=true; trackGroup.add(belt);
    const beltEdges = new THREE.EdgesGeometry(beltGeo);
    const beltLine = new THREE.LineSegments(beltEdges, new THREE.LineBasicMaterial({color:0x6AAA90,transparent:true,opacity:0.25}));
    beltLine.rotation.y=Math.PI/2; beltLine.position.set(tx-trackW/2,beltY,0); trackGroup.add(beltLine);

    const wheelMat=new THREE.MeshStandardMaterial({color:0x4A5A52,roughness:0.50,metalness:0.45});
    const hubMat=new THREE.MeshStandardMaterial({color:0x8EBBA8,roughness:0.35,metalness:0.5});
    const darkMat=new THREE.MeshStandardMaterial({color:0x4A5A50,roughness:0.5,metalness:0.4});

    // Sprocket
    const spR=0.17, spY=beltY+hH-spR*0.6, spZ=-(topHalf*0.75);
    const sprocket=new THREE.Mesh(new THREE.CylinderGeometry(spR,spR,trackW+0.04,20),wheelMat); sprocket.rotation.z=Math.PI/2; sprocket.position.set(tx,spY,spZ); trackGroup.add(sprocket);
    const spHub=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,trackW+0.08,8),hubMat); spHub.rotation.z=Math.PI/2; spHub.position.set(tx,spY,spZ); trackGroup.add(spHub);
    const spTeeth=new THREE.Mesh(new THREE.TorusGeometry(spR+0.01,0.015,6,20),darkMat); spTeeth.position.set(tx,spY,spZ); trackGroup.add(spTeeth);
    for(let a=0;a<3;a++){const spoke=new THREE.Mesh(new THREE.BoxGeometry(trackW*0.6,0.025,spR*1.6),hubMat);spoke.position.set(tx,spY,spZ);spoke.rotation.x=(a/3)*Math.PI;trackGroup.add(spoke);}

    // Idler
    const idR=0.13, idY=beltY+hH-idR*0.55, idZ=topHalf*0.75;
    const idler=new THREE.Mesh(new THREE.CylinderGeometry(idR,idR,trackW+0.02,16),wheelMat); idler.rotation.z=Math.PI/2; idler.position.set(tx,idY,idZ); trackGroup.add(idler);
    const idHub=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,trackW+0.06,8),hubMat); idHub.rotation.z=Math.PI/2; idHub.position.set(tx,idY,idZ); trackGroup.add(idHub);

    // Road wheels
    const rwR=0.11, rwCount=4, rwSpan=botHalf*1.4;
    for(let i=0;i<rwCount;i++){const frac=(i+0.5)/rwCount;const rwZ=-rwSpan/2+frac*rwSpan;const rwY=beltY-hH+rwR+0.015;
      const rw=new THREE.Mesh(new THREE.CylinderGeometry(rwR,rwR,trackW+0.02,14),wheelMat); rw.rotation.z=Math.PI/2; rw.position.set(tx,rwY,rwZ); trackGroup.add(rw);
      const rwH=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,trackW+0.06,6),hubMat); rwH.rotation.z=Math.PI/2; rwH.position.set(tx,rwY,rwZ); trackGroup.add(rwH);
    }

    // Return rollers
    for(const rrZ of [-0.06,0.06]){const rr=new THREE.Mesh(new THREE.CylinderGeometry(0.045,0.045,trackW-0.04,8),darkMat);rr.rotation.z=Math.PI/2;rr.position.set(tx,beltY+hH+0.045*0.3,rrZ);trackGroup.add(rr);}

    // Track links
    const linkMat=new THREE.MeshStandardMaterial({color:0x3A4A42,roughness:0.9,metalness:0.3});
    for(let i=0;i<14;i++){const frac=(i+0.5)/14;const lz=-botHalf*0.92+frac*botHalf*1.84;
      const link=new THREE.Mesh(new THREE.BoxGeometry(trackW+0.06,0.032,0.055),linkMat); link.position.set(tx,beltY-hH-0.016,lz); trackGroup.add(link);}

    // Suspension arms
    const armMat2=new THREE.MeshStandardMaterial({color:0x5A7A6A,roughness:0.5,metalness:0.45});
    for(let i=0;i<rwCount;i++){const frac=(i+0.5)/rwCount;const aZ=-rwSpan/2+frac*rwSpan;const aY1=beltY-hH+rwR+0.015;const aY2=beltY+0.10;const armLen=aY2-aY1;
      const sArm=new THREE.Mesh(new THREE.BoxGeometry(0.022,armLen,0.022),armMat2); sArm.position.set(tx,(aY1+aY2)/2,aZ); trackGroup.add(sArm);}

    this.bodyPivot.add(trackGroup);
  }

  _rndBlink() {
    const rates={idle:[3000,5000],happy:[1800,3500],excited:[1200,2500],thinking:[5000,9000],sad:[4000,8000],surprised:[7000,12000],angry:[1500,3000]};
    const [min,range]=rates[this.emotion]||[3000,5000]; return min+Math.random()*range;
  }

  _animate(ts) {
    const dt=Math.min(0.05,(ts-this.lastTS)/1000); this.lastTS=ts;
    this._update(dt); this._updateEyes(); this._updateColors(); this._updateCamera();
    this.renderer.render(this.scene,this.camera); requestAnimationFrame(this._animate);
  }

  _update(dt) {
    const isSleep=this.emotion==='sleep'; const lerp=1-Math.exp(-8*dt);
    this.bobPhase+=dt*(isSleep?0.5:this.talking?4.0:1.2);
    this.bodyPivot.position.y=Math.max(0,Math.sin(this.bobPhase)*(isSleep?0.02:0.04));
    if(this.emotion==='excited'){this.excitedPhase+=dt*7.5;this.excitedY=Math.abs(Math.sin(this.excitedPhase))*0.12;}
    else{this.excitedPhase=0;this.excitedY+=(0-this.excitedY)*Math.min(1,dt*10);}
    this.bodyPivot.position.y+=this.excitedY;

    if(!isSleep){this.blinkTimer+=dt*1000;if(!this.blinking&&this.blinkTimer>this.blinkNext){this.blinking=true;this.blinkAmt=0;this.blinkTimer=0;this.blinkNext=this._rndBlink();}
      if(this.blinking){this.blinkAmt+=dt*12;if(this.blinkAmt>=1){this.blinkAmt=1;this.blinking=false;}}else{this.blinkAmt=Math.max(0,this.blinkAmt-dt*12);}}else{this.blinkAmt=0;}

    if(this.action!=='none'){this.actionTimer+=dt;
      if(this.action==='nod'){this.headTiltXTgt=Math.sin(this.actionTimer*Math.PI/0.3)*0.15;if(this.actionTimer>0.7){this.action='none';this.headTiltXTgt=0;}}
      else if(this.action==='shake'){this.headTiltYTgt=Math.sin(this.actionTimer*Math.PI*3)*0.12;if(this.actionTimer>0.9){this.action='none';this.headTiltYTgt=0;}}
      else if(this.action==='forward'){const ry=this.robotGroup.rotation.y;this.robotGroup.position.x+=Math.sin(ry)*2.5*dt;this.robotGroup.position.z+=Math.cos(ry)*2.5*dt;if(this.actionTimer>1.8)this.action='none';}
      else if(this.action==='backward'){const ry=this.robotGroup.rotation.y;this.robotGroup.position.x-=Math.sin(ry)*2.0*dt;this.robotGroup.position.z-=Math.cos(ry)*2.0*dt;if(this.actionTimer>1.5)this.action='none';}
      else if(this.action==='turn_right'){this.targetRotY-=dt*3.0;if(this.actionTimer>0.6)this.action='none';}
      else if(this.action==='turn_left'){this.targetRotY+=dt*3.0;if(this.actionTimer>0.6)this.action='none';}
      else if(this.action==='turn_around'){this.targetRotY+=dt*3.5;if(this.actionTimer>1.0)this.action='none';}
      else if(this.action==='spin'){this.targetRotY+=dt*8.0;this.bodyPivot.position.y=Math.abs(Math.sin(this.actionTimer*6))*0.10;if(this.actionTimer>2.5)this.action='none';}
      else if(this.action==='dance'){this.dancePhase=(this.dancePhase||0)+dt;const dp=this.dancePhase;this.bodyPivot.position.y=Math.abs(Math.sin(dp*5))*0.15;this.bodyPivot.position.x=Math.sin(dp*3)*0.12;this.headTiltXTgt=Math.sin(dp*4)*0.12;this.headTiltYTgt=Math.cos(dp*3)*0.10;this.targetRotY+=Math.sin(dp*2)*dt*1.5;if(this.actionTimer>4.0){this.action='none';this.headTiltXTgt=0;this.headTiltYTgt=0;this.bodyPivot.position.x=0;}}
      else if(this.action==='look_up'){this.headTiltXTgt=-0.30;if(this.actionTimer>2.5){this.action='none';this.headTiltXTgt=0;}}
      else if(this.action==='look_down'){this.headTiltXTgt=0.30;if(this.actionTimer>2.5){this.action='none';this.headTiltXTgt=0;}}
      else if(this.action==='look_right'){this.headTiltYTgt=0.40;if(this.actionTimer>2.5){this.action='none';this.headTiltYTgt=0;}}
      else if(this.action==='look_left'){this.headTiltYTgt=-0.40;if(this.actionTimer>2.5){this.action='none';this.headTiltYTgt=0;}}
      else if(this.action==='raise_right'){this.armRaiseTgtL=1;if(this.actionTimer>3.0){this.action='none';this.armRaiseTgtL=0;}}
      else if(this.action==='raise_left'){this.armRaiseTgtR=1;if(this.actionTimer>3.0){this.action='none';this.armRaiseTgtR=0;}}
      else if(this.action==='raise_both'){this.armRaiseTgtR=1;this.armRaiseTgtL=1;if(this.actionTimer>3.0){this.action='none';this.armRaiseTgtR=0;this.armRaiseTgtL=0;}}
      else if(this.action==='jump'){const jt=this.actionTimer;if(jt<0.4)this.bodyPivot.position.y=Math.sin(jt/0.4*Math.PI)*0.5;else if(jt<0.8)this.bodyPivot.position.y=Math.sin((jt-0.4)/0.4*Math.PI)*0.35;else if(jt<1.1)this.bodyPivot.position.y=Math.sin((jt-0.8)/0.3*Math.PI)*0.15;if(this.actionTimer>1.2)this.action='none';}
    }
    this.headTiltX+=(this.headTiltXTgt-this.headTiltX)*lerp; this.headTiltY+=(this.headTiltYTgt-this.headTiltY)*lerp;
    this.eyeUnit.rotation.x=this.headTiltX; this.eyeUnit.rotation.y=this.headTiltY;
    this.armRaiseR+=(this.armRaiseTgtR-this.armRaiseR)*lerp; this.armRaiseL+=(this.armRaiseTgtL-this.armRaiseL)*lerp;
    this._updateArmPose(1,this.armRaiseR); this._updateArmPose(-1,this.armRaiseL);

    if(!isSleep&&this.action==='none'&&!this.talking){this.idleTimer+=dt*1000;if(this.idleTimer>this.nextIdleWander){this.idleTimer=0;this.nextIdleWander=2000+Math.random()*5000;this.idleWanderTgtX=(Math.random()-0.5)*0.08;this.idleWanderTgtY=(Math.random()-0.5)*0.06;}
      this.idleWanderX+=(this.idleWanderTgtX-this.idleWanderX)*lerp*0.3;this.idleWanderY+=(this.idleWanderTgtY-this.idleWanderY)*lerp*0.3;}
    else{this.idleWanderX*=0.95;this.idleWanderY*=0.95;}
    this.eyeUnit.rotation.z=0;
    if(this.talking)this.talkPhase+=dt*10; if(this.listening)this.listenPhase+=dt*8;

    const ca=this.camAngle;const fwd=[-Math.sin(ca),-Math.cos(ca)];const rgt=[Math.cos(ca),-Math.sin(ca)];
    const wx=this.moveInput.x*rgt[0]+this.moveInput.z*fwd[0];const wz=this.moveInput.x*rgt[1]+this.moveInput.z*fwd[1];
    if(Math.abs(this.moveInput.x)>0.01||Math.abs(this.moveInput.z)>0.01){this.velocity.x+=(wx*4-this.velocity.x)*Math.min(1,12*dt);this.velocity.z+=(wz*4-this.velocity.z)*Math.min(1,12*dt);this.targetRotY=Math.atan2(wx,wz)+Math.PI;}
    else{this.velocity.x+=(0-this.velocity.x)*Math.min(1,8*dt);this.velocity.z+=(0-this.velocity.z)*Math.min(1,8*dt);}
    this.robotGroup.position.x+=this.velocity.x*dt; this.robotGroup.position.z+=this.velocity.z*dt;
    let angleDiff=this.targetRotY-this.robotGroup.rotation.y;while(angleDiff>Math.PI)angleDiff-=2*Math.PI;while(angleDiff<-Math.PI)angleDiff+=2*Math.PI;
    this.robotGroup.rotation.y+=angleDiff*(1-Math.exp(-10*dt));
  }

  _updateEyes() {
    const em=this.emotion; let lidClose=this.blinkAmt*0.95;
    if(em==='sleep')lidClose=0.95;else if(em==='sad')lidClose=Math.max(lidClose,0.35);else if(em==='happy')lidClose=Math.max(lidClose,0.25);else if(em==='angry')lidClose=Math.max(lidClose,0.5);
    for(const [side,eye] of Object.entries(this.eyes)){const isRight=side==='right';
      const openY=0.42,closedY=0.08;eye.eyelid.position.y=openY-lidClose*(openY-closedY);
      const lowerOpenY=-0.42,lowerClosedY=-0.08;eye.lowerLid.position.y=lowerOpenY+lidClose*(lowerClosedY-lowerOpenY)*0.25;
      if(em==='angry')eye.eyelid.rotation.z=isRight?0.25:-0.25;else if(em==='sad')eye.eyelid.rotation.z=isRight?-0.2:0.2;else eye.eyelid.rotation.z=0;
      eye.pupil.position.x=this.idleWanderX*0.8;eye.pupil.position.y=this.idleWanderY*0.6;
      eye.lens.visible=true;eye.lensBack.visible=true;eye.pupil.visible=lidClose<0.85;
      if(em==='thinking'&&!isRight)eye.eyelid.position.y=openY-0.5*(openY-closedY);
      if(em==='excited')eye.eyelid.position.y=Math.min(eye.eyelid.position.y+0.05,openY+0.06);
      if(em==='surprised'){eye.eyelid.position.y=openY+0.06;eye.lowerLid.position.y=lowerOpenY-0.03;}
    }
    if(em==='sad')this.eyeUnit.rotation.x+=(-0.1-this.eyeUnit.rotation.x)*0.05;
    else if(em==='happy')this.eyeUnit.rotation.x+=(0.06-this.eyeUnit.rotation.x)*0.05;
  }

  _updateColors() {
    const col=EMOTION_COLORS[this.emotion]||EMOTION_COLORS.idle;
    const primary=new THREE.Color(col.primary),lensCol=new THREE.Color(col.lens),bodyCol=new THREE.Color(col.body),cheekCol=new THREE.Color(col.cheek);
    this.headLight.color.copy(primary);this.headLight.position.set(this.robotGroup.position.x,this.robotGroup.position.y+3.5,this.robotGroup.position.z);
    let intensity=this.emotion==='sleep'?0.4:1.5;if(this.listening)intensity+=Math.sin(this.listenPhase)*0.5;this.headLight.intensity=intensity;
    this.bodyMat.color.copy(bodyCol);this.bodyLine.material.color.copy(primary);
    for(const eye of Object.values(this.eyes))eye.lens.material.color.copy(lensCol);
    const isSleep=this.emotion==='sleep',isHappy=this.emotion==='happy'||this.emotion==='excited';
    this.cheekLeds.forEach(led=>{led.material.color.copy(cheekCol);led.material.opacity=(isSleep?0.10:isHappy?0.60:0.40)+Math.sin(this.bobPhase*2)*0.12;});
  }

  _updateCamera() {
    const rx=this.robotGroup.position.x,ry=this.robotGroup.position.y,rz=this.robotGroup.position.z;
    const cx=rx+this.camDist*Math.sin(this.camAngle)*Math.cos(this.camPitch);
    const cy=ry+this.camDist*Math.sin(this.camPitch)+1.2;
    const cz=rz+this.camDist*Math.cos(this.camAngle)*Math.cos(this.camPitch);
    this.camera.position.lerp(new THREE.Vector3(cx,cy,cz),0.06);
    this.camera.lookAt(new THREE.Vector3(rx,ry+1.6,rz));
  }
}

// ════════════════════════════════════════════════════
// APP CONTROLLER
// ════════════════════════════════════════════════════
const container3d = document.getElementById('robot-3d');
const micLabel    = document.getElementById('mic-label');
const statusDt    = document.getElementById('status-dot');
const statusTx    = document.getElementById('status-text');
const textInput   = document.getElementById('text-input');
const textSend    = document.getElementById('text-send');

const robot = new RobotRenderer3D(container3d);
window.addEventListener('resize', () => robot.resize());

let isBusy = false;

function setStatus(state, label) {
  statusDt.className = state;
  statusTx.textContent = label;
}

// ── TTS ─────────────────────────────────────────
let currentAudio = null;

function speakFallback(text, onEnd) {
  if (!window.speechSynthesis) { onEnd?.(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP'; utt.rate = 1.1; utt.pitch = 1.15;
  utt.onstart = () => robot.setTalking(true);
  utt.onend   = () => { robot.setTalking(false); onEnd?.(); };
  utt.onerror = () => { robot.setTalking(false); onEnd?.(); };
  setTimeout(() => { if (!window.speechSynthesis.speaking) { robot.setTalking(false); onEnd?.(); } }, 8000);
  window.speechSynthesis.speak(utt);
}

function speak(text, onEnd) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  fetch('/api/tts', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text, voice:'ja-JP-NanamiNeural', pitch:'+40Hz', rate:'+15%'}) })
  .then(r => { if (!r.ok) throw new Error('TTS failed'); return r.blob(); })
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onplay  = () => robot.setTalking(true);
    audio.onended = () => { robot.setTalking(false); URL.revokeObjectURL(url); currentAudio=null; onEnd?.(); };
    audio.onerror = () => { robot.setTalking(false); URL.revokeObjectURL(url); currentAudio=null; onEnd?.(); };
    audio.play().catch(() => { robot.setTalking(false); URL.revokeObjectURL(url); currentAudio=null; speakFallback(text,onEnd); });
  })
  .catch(() => { robot.setTalking(false); speakFallback(text, onEnd); });
}

// ── Action detection ────────────────────────────
function detectActionFromText(text) {
  const t = text.toLowerCase();
  if (/踊っ|踊り|ダンス|dance/.test(t)) return 'dance';
  if (/ジャンプ|じゃんぷ|跳ん|飛んで|jump/.test(t)) return 'jump';
  if (/くるくる|ぐるぐる|spin/.test(t)) return 'spin';
  if (/後ろ.*向|振り返|反対.*向|turn.?around/.test(t)) return 'turn_around';
  if (/上.*向|上.*見|天井.*見|見上げ|look.?up/.test(t)) return 'look_up';
  if (/下.*向|下.*見|足元.*見|見下ろ|look.?down/.test(t)) return 'look_down';
  if (/右.*向|右.*見|look.?right/.test(t)) return 'look_right';
  if (/左.*向|左.*見|look.?left/.test(t)) return 'look_left';
  if (/右.*回|turn.?right/.test(t)) return 'turn_right';
  if (/左.*回|turn.?left/.test(t)) return 'turn_left';
  if (/回って|回転/.test(t)) return 'spin';
  if (/両手.*(?:挙|上|あげ)|両腕.*(?:挙|上|あげ)|万歳|ばんざい|raise.?both/.test(t)) return 'raise_both';
  if (/右手.*(?:挙|上|あげ)|右腕.*(?:挙|上|あげ)|raise.?right/.test(t)) return 'raise_right';
  if (/左手.*(?:挙|上|あげ)|左腕.*(?:挙|上|あげ)|raise.?left/.test(t)) return 'raise_left';
  if (/手.*(?:挙げ|上げ|あげ)/.test(t)) return 'raise_both';
  if (/前.*進|前進|進んで|まっすぐ|forward/.test(t)) return 'forward';
  if (/後ろ.*下|バック|後退|backward/.test(t)) return 'backward';
  return null;
}

// ── Send message ────────────────────────────────
let busyTimer = null;
async function sendMessage(text) {
  if (isBusy || !text.trim()) return;
  isBusy = true;
  textInput.value = '';

  // Safety: reset isBusy after 20s max
  clearTimeout(busyTimer);
  busyTimer = setTimeout(() => {
    if (isBusy) {
      isBusy = false;
      robot.setTalking(false);
      setStatus('ready', 'まってるよ！');
      if (continuousMode) setTimeout(() => startListening(), 600);
    }
  }, 20000);

  // Client-side action detection (immediate)
  const clientAction = detectActionFromText(text);
  if (clientAction) robot.setAction(clientAction);

  setStatus('thinking', 'かんがえてる…');
  robot.setEmotion('thinking');

  try {
    const res = await fetch('/api/kids/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();

    robot.setEmotion(data.emotion || 'idle');
    if (data.action && data.action !== 'none') robot.setAction(data.action);

    // Sleep mode: stop listening after goodnight
    const goSleep = (data.emotion === 'sleep');

    setStatus('speaking', 'はなしてるよ！');
    speak(data.message || 'うーん、ちょっとまってね', () => {
      clearTimeout(busyTimer);
      isBusy = false;
      if (goSleep) {
        continuousMode = false;
        setStatus('sleeping', 'おやすみ…');
        return;
      }
      if (continuousMode) {
        setStatus('listening', 'きいてるよ！');
        setTimeout(() => startListening(), 600);
      } else {
        setStatus('ready', 'まってるよ！');
      }
    });
  } catch (e) {
    clearTimeout(busyTimer);
    robot.setEmotion('sad');
    setStatus('ready', 'まってるよ！');
    isBusy = false;
    if (continuousMode) setTimeout(() => startListening(), 600);
  }
}

textSend.addEventListener('click', () => sendMessage(textInput.value));
textInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(textInput.value); });

// ── Wake up from sleep by tapping robot ─────────
document.getElementById('robot-3d').addEventListener('click', () => {
  if (robot.emotion === 'sleep' && !isBusy) {
    robot.setEmotion('happy');
    robot.setAction('nod');
    continuousMode = true;
    setStatus('ready', 'まってるよ！');
    speak('おはよう！またあそぼう！', () => {
      setStatus('listening', 'きいてるよ！');
      setTimeout(() => startListening(), 600);
    });
  }
});

// ── Voice recognition ───────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let continuousMode  = false;
let listeningActive = false;
let kidsRec = null;

function startListening() {
  if (!kidsRec || listeningActive || isBusy) return;
  try { kidsRec.start(); } catch(e) { console.warn(e); }
}

let kidsPending = '';
let kidsSendTimer = null;
const KIDS_SEND_DELAY = 1500;

function kidsFlush() {
  clearTimeout(kidsSendTimer); kidsSendTimer = null;
  const text = kidsPending.trim();
  kidsPending = '';
  if (!text) return;
  try { kidsRec.abort(); } catch(e) {}
  listeningActive = false;
  micLabel.classList.remove('visible');
  textInput.value = text;
  sendMessage(text);
}

if (SR) {
  kidsRec = new SR();
  kidsRec.lang = 'ja-JP'; kidsRec.continuous = true; kidsRec.interimResults = true;

  kidsRec.onstart = () => {
    listeningActive = true;
    setStatus('listening', 'きいてるよ！');
    micLabel.textContent = '🎤 おはなしきいてるよ…';
    micLabel.classList.add('visible');
    robot.setEmotion('happy');
  };
  kidsRec.onresult = e => {
    let finalText = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
    }
    if (finalText) kidsPending = finalText;
    if (finalText) {
      robot.setEmotion('happy');
      clearTimeout(kidsSendTimer);
      kidsSendTimer = setTimeout(kidsFlush, KIDS_SEND_DELAY);
    }
  };
  kidsRec.onend = () => {
    listeningActive = false;
    micLabel.classList.remove('visible');
    if (kidsPending && kidsSendTimer) { clearTimeout(kidsSendTimer); kidsFlush(); return; }
    if (continuousMode && !isBusy) setTimeout(() => startListening(), 400);
    else if (!continuousMode && !isBusy) setStatus('ready', 'まってるよ！');
  };
  kidsRec.onerror = e => {
    listeningActive = false;
    micLabel.classList.remove('visible');
    if (e.error === 'no-speech' || e.error === 'aborted') {
      if (continuousMode && !isBusy) setTimeout(() => startListening(), 400);
      return;
    }
    if (e.error === 'not-allowed' || e.error === 'service-not-available') {
      continuousMode = false;
      setStatus('ready', 'まってるよ！');
      return;
    }
    // network or other recoverable errors: retry
    if (continuousMode && !isBusy) setTimeout(() => startListening(), 1000);
  };
}

// ── Voices on iOS ───────────────────────────────
if (window.speechSynthesis) speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

// ── Initial greeting & audio unlock ─────────────
function unlockAudio() {
  try { const ctx = new (window.AudioContext||window.webkitAudioContext)(); const buf=ctx.createBuffer(1,1,22050); const src=ctx.createBufferSource(); src.buffer=buf; src.connect(ctx.destination); src.start(0); ctx.resume(); } catch(e){}
  try { const a=new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA='); a.volume=0.01; a.play().then(()=>a.pause()).catch(()=>{}); } catch(e){}
}

async function initGreeting() {
  try {
    const res = await fetch('/api/kids/greet');
    const data = await res.json();
    robot.setEmotion(data.emotion || 'excited');
    robot.setAction(data.action || 'nod');
    speak(data.message, () => {
      // Start listening AFTER greeting finishes
      setStatus('ready', 'まってるよ！');
      continuousMode = true;
      setTimeout(() => startListening(), 600);
    });
  } catch {
    robot.setEmotion('excited');
    robot.setAction('nod');
    setStatus('ready', 'まってるよ！');
    continuousMode = true;
    setTimeout(() => startListening(), 600);
  }
}

window.addEventListener('load', () => {
  const overlay = document.getElementById('start-overlay');
  overlay.addEventListener('click', () => {
    unlockAudio();
    overlay.classList.add('hidden');
    setTimeout(() => overlay.remove(), 500);
    initGreeting();
  }, { once: true });
});
</script>
