<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>じぶんのロボッ��！</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
/* ══════════════════════════
   RESET & BASE
══════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #06091a;
  --bg2:      #0d1433;
  --card:     #111830;
  --text:     #e8f0ff;
  --muted:    #6080c0;
  --radius:   20px;
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP',
               'メイリオ', 'Meiryo', sans-serif;
  overflow-x: hidden;
  display: flex;
  justify-content: center;
}

/* ══════════════════════════
   STAR BACKGROUND
══════════════════════════ */
#stars-canvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}

/* ══════════════════════════
   APP WRAPPER
══════════════════════════ */
#app {
  position: relative; z-index: 1;
  width: 100%; max-width: 500px;
  min-height: 100vh;
  padding: 16px 18px 28px;
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
}

/* ══════════════════════════
   TITLE
══════════════════════════ */
#title {
  font-size: 26px; font-weight: 900;
  letter-spacing: 1px; text-align: center;
  background: linear-gradient(90deg,
    #ff6060, #ffaa00, #ffe000,
    #44ff88, #00ccff, #aa66ff, #ff66cc, #ff6060);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: rainbow 4s linear infinite;
}
@keyframes rainbow { to { background-position: 200% center; } }

#subtitle {
  font-size: 12px; color: var(--muted);
  text-align: center; margin-top: -6px;
}

/* ══════════════════════════
   ROBOT NAME BADGE
══════════════════════════ */
#name-badge {
  display: flex; align-items: center; gap: 8px;
  background: var(--card);
  border: 2px solid rgba(255,255,255,.12);
  border-radius: 999px;
  padding: 8px 20px;
  font-size: 18px; font-weight: 800;
  cursor: pointer;
  transition: border-color .2s, transform .15s;
  user-select: none;
}
#name-badge:hover { border-color: #aaccff; transform: scale(1.03); }
#name-badge:active { transform: scale(.97); }
#robot-emoji { font-size: 22px; }
#robot-name-display { color: #aaddff; }

/* ══════════════════════════
   NAME EDIT PANEL
══════════════════════════ */
#name-panel {
  width: 100%;
  background: var(--card);
  border: 2px solid rgba(100,180,255,.25);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: none; flex-direction: column; gap: 10px;
}
#name-panel.open { display: flex; }
#name-panel label {
  font-size: 13px; font-weight: 700; color: #88bbff;
}
#name-input-row { display: flex; gap: 8px; }
#name-input {
  flex: 1;
  background: var(--bg2);
  border: 2px solid rgba(100,180,255,.3);
  border-radius: 12px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 18px; font-weight: 700;
  outline: none;
}
#name-input:focus { border-color: #66aaff; }
#name-set-btn {
  padding: 10px 18px;
  background: linear-gradient(135deg, #4488ff, #2255cc);
  border: none; border-radius: 12px;
  color: white; font-size: 15px; font-weight: 800;
  cursor: pointer;
  transition: filter .15s, transform .1s;
}
#name-set-btn:hover { filter: brightness(1.15); }
#name-set-btn:active { transform: scale(.93); }

/* ══════════════════════════
   SPEECH BUBBLE
══════════════════════════ */
#bubble-wrap {
  width: 100%;
  min-height: 52px;
  display: flex; justify-content: center; align-items: flex-end;
}
#speech-bubble {
  background: var(--card);
  border: 2px solid rgba(100,200,255,.3);
  border-radius: 20px 20px 20px 6px;
  padding: 13px 20px;
  font-size: 18px; font-weight: 600; line-height: 1.55;
  max-width: 92%; position: relative;
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s, transform .3s;
  pointer-events: none;
  box-shadow: 0 0 20px rgba(100,200,255,.12);
}
#speech-bubble.show {
  opacity: 1; transform: translateY(0);
  pointer-events: auto;
}
#speech-bubble::after {
  content: '';
  position: absolute; bottom: -9px; left: 26px;
  width: 0; height: 0;
  border-left: 9px solid transparent;
  border-right: 9px solid transparent;
  border-top: 9px solid rgba(100,200,255,.3);
}

/* ══════════════════════════
   3D ROBOT CONTAINER
══════════════════════════ */
#robot-container {
  width: 100%;
  max-width: 320px;
  height: 280px;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  filter: drop-shadow(0 0 28px rgba(120,180,255,.3));
  transition: filter .3s;
}
#robot-container:hover {
  filter: drop-shadow(0 0 36px rgba(160,210,255,.5));
}
#robot-container canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
}

/* ══════════════════════════
   STATUS
══════════════════════════ */
#status-bar {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--muted);
  min-height: 22px;
}
#status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--muted); transition: background .3s;
}
#status-dot.listening { background: #ff4488; animation: blink .7s infinite; }
#status-dot.thinking  { background: #ffaa00; animation: blink 1.1s infinite; }
#status-dot.speaking  { background: #44ffaa; animation: blink .5s infinite; }
#status-dot.ready     { background: #44aaff; }
@keyframes blink { 0%,100%{ opacity:.3; } 50%{ opacity:1; } }

/* ══════════════════════════
   SECTION LABEL
══════════════════════════ */
.section-label {
  width: 100%;
  font-size: 12px; font-weight: 800;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 0 2px;
}

/* ══════════════════════════
   EYE COLOR PICKER
══════════════════════════ */
#color-picker {
  width: 100%;
  display: flex; flex-wrap: wrap;
  gap: 10px; justify-content: center;
}
.color-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  position: relative;
  transition: transform .15s, border-color .2s, box-shadow .2s;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding-bottom: 0;
}
.color-btn:hover { transform: scale(1.12); }
.color-btn:active { transform: scale(.94); }
.color-btn.selected {
  border-color: white;
  box-shadow: 0 0 0 3px rgba(255,255,255,.4), 0 0 20px currentColor;
  transform: scale(1.15);
}
.color-name {
  position: absolute;
  bottom: -20px;
  font-size: 10px; font-weight: 700;
  color: var(--muted);
  white-space: nowrap;
  pointer-events: none;
}

/* ══════════════════════════
   EMOTION BUTTONS
══════════════════════════ */
#emotion-btns {
  width: 100%;
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
}
.emo-btn {
  background: var(--card);
  border: 2px solid rgba(255,255,255,.1);
  border-radius: 16px;
  padding: 10px 14px;
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  transition: transform .15s, border-color .2s, background .2s;
  min-width: 64px;
}
.emo-btn:hover { transform: scale(1.08); border-color: rgba(255,255,255,.3); }
.emo-btn:active { transform: scale(.94); }
.emo-icon { font-size: 28px; }
.emo-label { font-size: 11px; font-weight: 700; color: var(--muted); }

/* ══════════════════════════
   INPUT AREA
══════════════════════════ */
#input-area { width: 100%; display: flex; flex-direction: column; gap: 10px; }

#mic-row { display: flex; justify-content: center; }
#mic-btn {
  width: 76px; height: 76px; border-radius: 50%;
  border: 3px solid rgba(255,80,150,.4);
  background: rgba(255,80,150,.1);
  font-size: 32px;
  cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; justify-content: center;
}
#mic-btn:hover { border-color: #ff4488; background: rgba(255,80,150,.2); transform: scale(1.06); }
#mic-btn:active { transform: scale(.94); }
#mic-btn.listening {
  border-color: #ff4488;
  background: rgba(255,80,150,.25);
  box-shadow: 0 0 0 6px rgba(255,80,150,.2), 0 0 30px rgba(255,80,150,.5);
  animation: mic-pulse .6s ease infinite;
}
#mic-btn.continuous {
  border-color: #ff4488;
  background: rgba(255,80,150,.18);
  animation: continuous-ring 1.4s ease infinite;
}
#mic-btn.continuous.listening {
  animation: mic-pulse .6s ease infinite, continuous-ring 1.4s ease infinite;
}
@keyframes continuous-ring {
  0%   { box-shadow: 0 0 0 0 rgba(255,80,150,.6); }
  70%  { box-shadow: 0 0 0 14px rgba(255,80,150,0); }
  100% { box-shadow: 0 0 0 0 rgba(255,80,150,0); }
}
@keyframes mic-pulse {
  0%,100%{ box-shadow: 0 0 0 6px rgba(255,80,150,.2), 0 0 30px rgba(255,80,150,.5); }
  50%{ box-shadow: 0 0 0 12px rgba(255,80,150,.1), 0 0 50px rgba(255,80,150,.7); }
}
#mic-hint { text-align: center; font-size: 12px; color: var(--muted); }

#text-row { display: flex; gap: 8px; }
#text-input {
  flex: 1;
  background: var(--card);
  border: 2px solid rgba(100,150,255,.25);
  border-radius: 14px;
  padding: 13px 16px;
  color: var(--text);
  font-size: 16px;
  outline: none;
  transition: border-color .2s;
}
#text-input:focus { border-color: #6699ff; }
#text-input::placeholder { color: var(--muted); }
#send-btn {
  padding: 13px 18px;
  background: linear-gradient(135deg, #44aaff, #2266cc);
  border: none; border-radius: 14px;
  color: white; font-size: 16px; font-weight: 800;
  cursor: pointer;
  transition: filter .15s, transform .1s;
}
#send-btn:hover { filter: brightness(1.1); }
#send-btn:active { transform: scale(.94); }
#send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* ══════════════════════════
   CONFETTI PARTICLES
══════════════════════════ */
.confetti-piece {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  font-size: 20px;
  animation: confetti-fly 1.2s ease-out forwards;
}
@keyframes confetti-fly {
  0%   { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(.3); }
}

/* ══════════════════════════
   SCROLL HINT
══════════════════════════ */
.spacer { height: 8px; flex-shrink: 0; }

#start-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px; cursor: pointer;
  transition: opacity .4s;
}
#start-overlay.hidden { opacity: 0; pointer-events: none; }
#start-overlay .circle {
  width: 120px; height: 120px; border-radius: 50%;
  border: 2px solid rgba(255,80,150,.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
  animation: pulse-start 2s ease-in-out infinite;
}
@keyframes pulse-start {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,80,150,.3); }
  50% { box-shadow: 0 0 0 16px rgba(255,80,150,0); }
}
#start-overlay .label {
  font-size: 15px; color: rgba(232,240,255,.6);
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div id="start-overlay">
  <div class="circle">🤖</div>
  <div class="label">タップしてはじめよう！</div>
</div>

<!-- 星空背景 -->
<canvas id="stars-canvas"></canvas>

<div id="app">

  <!-- タイトル -->
  <div id="title">じぶんのロボット！</div>
  <div id="subtitle">AIとプログラミングで動いてるよ ✨</div>

  <!-- ロボット名バッジ（タップで名前変更） -->
  <div id="name-badge" onclick="toggleNamePanel()">
    <span id="robot-emoji">🤖</span>
    <span id="robot-name-display">秋山さん</span>
    <span style="font-size:13px; color:var(--muted);">✏️ なまえをかえる</span>
  </div>

  <!-- 名前変更パネル -->
  <div id="name-panel">
    <label>ロボットのなまえをきめよう！</label>
    <div id="name-input-row">
      <input id="name-input" type="text" placeholder="なまえをいれてね" maxlength="10" />
      <button id="name-set-btn" onclick="setName()">きめた！</button>
    </div>
  </div>

  <!-- 吹き出し -->
  <div id="bubble-wrap">
    <div id="speech-bubble"><span id="bubble-text"></span></div>
  </div>

  <!-- 3Dロボット -->
  <div id="robot-container"></div>

  <!-- ステータス -->
  <div id="status-bar">
    <div id="status-dot" class="ready"></div>
    <span id="status-text">まってるよ！</span>
  </div>

  <!-- 目の色ピッカー -->
  <div class="section-label">👁 めのいろをえらぼう！</div>
  <div id="color-picker"></div>
  <div class="spacer"></div>

  <!-- 気持ちボタン -->
  <div class="section-label">😊 きもちをえらぼう！</div>
  <div id="emotion-btns">
    <button class="emo-btn" onclick="triggerEmotion('happy','やったー！うれしいな〜！')">
      <span class="emo-icon">😊</span><span class="emo-label">うれしい</span>
    </button>
    <button class="emo-btn" onclick="triggerEmotion('excited','わあ！すごい！！')">
      <span class="emo-icon">🤩</span><span class="emo-label">わくわく</span>
    </button>
    <button class="emo-btn" onclick="triggerEmotion('thinking','うーん…かんがえてるよ')">
      <span class="emo-icon">🤔</span><span class="emo-label">かんがえてる</span>
    </button>
    <button class="emo-btn" onclick="triggerEmotion('surprised','えっ！びっくりした！！')">
      <span class="emo-icon">😲</span><span class="emo-label">びっくり</span>
    </button>
    <button class="emo-btn" onclick="triggerEmotion('sad','うう…かなしいな…')">
      <span class="emo-icon">😢</span><span class="emo-label">かなしい</span>
    </button>
  </div>

  <!-- 入力エリア -->
  <div class="section-label">💬 はなしかける！</div>
  <div id="input-area">
    <div id="mic-row">
      <button id="mic-btn" title="こえでおはなし">🎤</button>
    </div>
    <div id="mic-hint">おおきなボタンをおして、こえでおはなしできるよ！</div>
    <div id="text-row">
      <input id="text-input" type="text" placeholder="もじでかいてもいいよ…" autocomplete="off" />
      <button id="send-btn">おくる</button>
    </div>
  </div>

</div><!-- #app -->

<script>
// ════════════════════════════════════════════════
// STAR BACKGROUND
// ════════════════════════════════════════════════
(function(){
  const sc = document.getElementById('stars-canvas');
  const sx = sc.getContext('2d');
  sc.width  = window.innerWidth;
  sc.height = window.innerHeight;

  const stars = Array.from({length: 120}, () => ({
    x:    Math.random() * sc.width,
    y:    Math.random() * sc.height,
    r:    Math.random() * 1.5 + 0.3,
    a:    Math.random(),
    da:   (Math.random() * .004 + .001) * (Math.random() < .5 ? 1 : -1),
    col:  `hsl(${Math.random()*60+180},80%,85%)`,
  }));

  function drawStars() {
    sx.clearRect(0, 0, sc.width, sc.height);
    stars.forEach(s => {
      s.a += s.da;
      if (s.a > 1 || s.a < 0) s.da *= -1;
      sx.beginPath();
      sx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      sx.fillStyle = s.col.replace(')', `,${s.a})`).replace('hsl', 'hsla');
      sx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();
  window.addEventListener('resize', () => {
    sc.width  = window.innerWidth;
    sc.height = window.innerHeight;
  });
})();


// ════════════════════════════════════════════════
// 3D ROBOT RENDERER (Three.js — same as main page)
// ════════════════════════════════════════════════
const EMOTION_COLORS = {
  idle:      { primary: 0x8EBBA8, lens: 0x3399DD, body: 0x8EBBA8, cheek: 0xFFB0C0 },
  happy:     { primary: 0x9ECCA0, lens: 0x44BBEE, body: 0x96C4A8, cheek: 0xFF8FA0 },
  sleep:     { primary: 0x7AA090, lens: 0x6688AA, body: 0x80A898, cheek: 0xCC9AAA },
  excited:   { primary: 0x80D8B8, lens: 0x55CCFF, body: 0x90CCA8, cheek: 0xFF7788 },
  thinking:  { primary: 0x88AAC0, lens: 0x7799EE, body: 0x88B0A8, cheek: 0xBBAACC },
  sad:       { primary: 0x7A9A90, lens: 0x6688AA, body: 0x80A09A, cheek: 0xAA99AA },
  surprised: { primary: 0x80CCB8, lens: 0xEE88CC, body: 0x90C0A8, cheek: 0xFF88AA },
  angry:     { primary: 0xCC8878, lens: 0xFF4444, body: 0xA09888, cheek: 0xFF5555 },
};

class RobotRenderer3D {
  constructor(container) {
    this.container = container;
    this.emotion = 'idle';
    this.talking = false;
    this.action = 'none';
    this.actionTimer = 0;
    this.blinkAmt = 0;
    this.blinking = false;
    this.blinkTimer = 0;
    this.blinkNext = 3000 + Math.random() * 5000;
    this.bobPhase = 0;
    this.talkPhase = 0;
    this.excitedPhase = 0;
    this.excitedY = 0;
    this.headTiltX = 0;
    this.headTiltXTgt = 0;
    this.headTiltY = 0;
    this.headTiltYTgt = 0;
    this.listening = false;
    this.listenPhase = 0;

    this.idleTimer = 0;
    this.idleWanderX = 0;
    this.idleWanderY = 0;
    this.idleWanderTgtX = 0;
    this.idleWanderTgtY = 0;
    this.nextIdleWander = 2000 + Math.random() * 4000;
    this.idleTiltZ = 0;
    this.idleTiltZTgt = 0;

    this.camAngle = Math.PI;
    this.camPitch = 0.35;
    this.camDist = 9;
    this._lastDrag = null;

    this.armRaiseR = 0; this.armRaiseTgtR = 0;
    this.armRaiseL = 0; this.armRaiseTgtL = 0;

    this.moveInput = { x: 0, z: 0 };
    this.velocity = { x: 0, z: 0 };
    this.targetRotY = Math.PI;

    this._initScene();
    this._buildRobot();
    this.lastTS = performance.now();
    this._animate = this._animate.bind(this);
    requestAnimationFrame(this._animate);
  }

  setEmotion(e) { this.emotion = e; }
  setTalking(v) { this.talking = v; }
  setAction(a) {
    if (a === 'none') return;
    this.action = a;
    this.actionTimer = 0;
    this.dancePhase = 0;
  }
  blink() { if (!this.blinking) { this.blinking = true; this.blinkAmt = 0; } }
  setListening(v) { this.listening = v; }
  setMoveDirection(x, z) { this.moveInput.x = x; this.moveInput.z = z; }
  // Kids-specific stubs (no-op for 3D)
  setEyeColor(hex) { /* no-op in 3D version */ }
  gazeAt(nx, ny) { /* no-op in 3D version */ }

  resize() {
    const w = this.container.clientWidth;
    const h = this.container.clientHeight;
    this.camera.aspect = w / h;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(w, h);
  }

  _initScene() {
    const w = this.container.clientWidth;
    const h = this.container.clientHeight;

    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x87CEEB);
    this.scene.fog = new THREE.FogExp2(0x87CEEB, 0.018);

    this.camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 120);

    this.renderer = new THREE.WebGLRenderer({ antialias: true });
    this.renderer.setSize(w, h);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.container.appendChild(this.renderer.domElement);

    this.ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    this.scene.add(this.ambientLight);

    this.headLight = new THREE.PointLight(0xffeecc, 1.0, 18);
    this.headLight.castShadow = true;
    this.scene.add(this.headLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 15, 8);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 40;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    this.scene.add(dirLight);

    const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x999999, 0.5);
    this.scene.add(hemiLight);

    const grid = new THREE.GridHelper(60, 60, 0x8899AA, 0xA0AAB4);
    grid.material.transparent = true;
    grid.material.opacity = 0.45;
    this.scene.add(grid);

    const groundGeo = new THREE.PlaneGeometry(80, 80);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x95988E, roughness: 0.90, metalness: 0.02
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.01;
    ground.receiveShadow = true;
    this.scene.add(ground);
  }

  _buildRobot() {
    this.robotGroup = new THREE.Group();
    this.bodyPivot = new THREE.Group();
    this.robotGroup.add(this.bodyPivot);

    const bwB = 0.574, bwT = 0.406, bh = 0.364, bDepth = 0.91;
    const bodyShape = new THREE.Shape();
    const bcr = 0.06;
    bodyShape.moveTo(-bwB + bcr, -bh);
    bodyShape.lineTo(bwB - bcr, -bh);
    bodyShape.quadraticCurveTo(bwB, -bh, bwB - 0.02, -bh + bcr);
    bodyShape.lineTo(bwT + 0.02, bh - bcr);
    bodyShape.quadraticCurveTo(bwT, bh, bwT - bcr, bh);
    bodyShape.lineTo(-bwT + bcr, bh);
    bodyShape.quadraticCurveTo(-bwT, bh, -bwT - 0.02, bh - bcr);
    bodyShape.lineTo(-bwB + 0.02, -bh + bcr);
    bodyShape.quadraticCurveTo(-bwB, -bh, -bwB + bcr, -bh);
    const bodyGeo = new THREE.ExtrudeGeometry(bodyShape, {
      depth: bDepth, bevelEnabled: true,
      bevelThickness: 0.04, bevelSize: 0.04, bevelSegments: 2
    });
    bodyGeo.center();
    this.bodyMat = new THREE.MeshStandardMaterial({
      color: 0x8EBBA8, roughness: 0.60, metalness: 0.10,
      emissive: 0x3A5A48, emissiveIntensity: 0.06,
    });
    this.bodyMesh = new THREE.Mesh(bodyGeo, this.bodyMat);
    this.bodyMesh.position.y = 1.114;
    this.bodyMesh.castShadow = true;
    this.bodyPivot.add(this.bodyMesh);

    const bodyEdges = new THREE.EdgesGeometry(bodyGeo, 20);
    this.bodyLine = new THREE.LineSegments(bodyEdges,
      new THREE.LineBasicMaterial({ color: 0xA0D0B8, transparent: true, opacity: 0.25 }));
    this.bodyLine.position.copy(this.bodyMesh.position);
    this.bodyPivot.add(this.bodyLine);

    const hatchW = bwT * 1.3, hatchH = bh * 1.3;
    const hatchGeo = new THREE.BoxGeometry(hatchW, hatchH, 0.05);
    const hatchMat = new THREE.MeshStandardMaterial({
      color: 0xC8DDD0, roughness: 0.55, metalness: 0.08
    });
    const hatch = new THREE.Mesh(hatchGeo, hatchMat);
    hatch.position.set(0, 1.114, bDepth / 2 + 0.05);
    this.bodyPivot.add(hatch);

    for (const hy of [-0.15, 0.15]) {
      const seamGeo = new THREE.BoxGeometry(hatchW * 0.92, 0.008, 0.008);
      const seam = new THREE.Mesh(seamGeo, new THREE.MeshStandardMaterial({
        color: 0x6A9A80, roughness: 0.6, metalness: 0.3
      }));
      seam.position.set(0, 1.114 + hy, bDepth / 2 + 0.076);
      this.bodyPivot.add(seam);
    }

    const rivetMat = new THREE.MeshStandardMaterial({ color: 0xB0B4BB, roughness: 0.3, metalness: 0.8 });
    const rivetGeo = new THREE.SphereGeometry(0.018, 6, 6);
    const rZ = bDepth / 2 + 0.058;
    const rivets = [
      [-hatchW/2+0.04, bh*0.5], [hatchW/2-0.04, bh*0.5],
      [-hatchW/2+0.04, -bh*0.5], [hatchW/2-0.04, -bh*0.5],
      [-hatchW/2+0.04, 0], [hatchW/2-0.04, 0],
      [0, bh*0.5], [0, -bh*0.5],
    ];
    for (const [rx, ry] of rivets) {
      const r = new THREE.Mesh(rivetGeo, rivetMat);
      r.position.set(rx, 1.114 + ry, rZ);
      this.bodyPivot.add(r);
    }

    const hingeMat = new THREE.MeshStandardMaterial({ color: 0x9A9EA5, roughness: 0.3, metalness: 0.7 });
    for (const hx of [-hatchW/2 + 0.05, hatchW/2 - 0.05]) {
      const hinge = new THREE.Mesh(
        new THREE.CylinderGeometry(0.022, 0.022, 0.06, 8), hingeMat);
      hinge.rotation.x = Math.PI / 2;
      hinge.position.set(hx, 1.114 + hatchH/2 - 0.04, bDepth / 2 + 0.08);
      this.bodyPivot.add(hinge);
    }

    for (const sx of [-1, 1]) {
      for (let vi = 0; vi < 3; vi++) {
        const vent = new THREE.Mesh(
          new THREE.BoxGeometry(0.10, 0.014, 0.014),
          new THREE.MeshStandardMaterial({ color: 0x3A4A42, roughness: 0.9, metalness: 0.1 })
        );
        vent.position.set(sx * (hatchW/2 + 0.12), 1.114 + (vi - 1) * 0.07, bDepth / 2 + 0.05);
        this.bodyPivot.add(vent);
      }
    }

    const topPlate = new THREE.Mesh(
      new THREE.BoxGeometry(bwT * 1.75, 0.04, bDepth * 0.82),
      new THREE.MeshStandardMaterial({ color: 0x7AAA98, roughness: 0.55, metalness: 0.15 })
    );
    topPlate.position.set(0, 1.114 + bh + 0.02, 0);
    this.bodyPivot.add(topPlate);

    const handleMat = new THREE.MeshStandardMaterial({ color: 0x7A9A8A, roughness: 0.4, metalness: 0.5 });
    const handle = new THREE.Mesh(
      new THREE.TorusGeometry(0.06, 0.015, 6, 12, Math.PI), handleMat);
    handle.rotation.y = Math.PI / 2;
    handle.position.set(0, 1.114 + bh + 0.10, -0.10);
    this.bodyPivot.add(handle);

    const bumper = new THREE.Mesh(
      new THREE.BoxGeometry(bwB * 2.05, 0.06, bDepth * 0.90),
      new THREE.MeshStandardMaterial({ color: 0x5A7A6A, roughness: 0.7, metalness: 0.20 })
    );
    bumper.position.set(0, 1.114 - bh - 0.01, 0);
    this.bodyPivot.add(bumper);

    const neckGeo = new THREE.CylinderGeometry(0.08, 0.10, 0.7, 8);
    const metalMat = new THREE.MeshStandardMaterial({
      color: 0x7A9A8A, roughness: 0.4, metalness: 0.5
    });
    const neck = new THREE.Mesh(neckGeo, metalMat);
    neck.position.y = 1.958;
    this.bodyPivot.add(neck);

    const ringGeo = new THREE.TorusGeometry(0.11, 0.025, 8, 16);
    const ring = new THREE.Mesh(ringGeo, metalMat.clone());
    ring.rotation.x = Math.PI / 2;
    ring.position.y = 1.608;
    this.bodyPivot.add(ring);

    this.eyeUnit = new THREE.Group();
    this.eyeUnit.position.y = 2.508;
    this._buildEyes();
    this.bodyPivot.add(this.eyeUnit);

    this._buildArm(1);
    this._buildArm(-1);

    this.cheekLeds = [];
    for (const sx of [-1, 1]) {
      const cheekLed = new THREE.Mesh(
        new THREE.SphereGeometry(0.10, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xFFB0C0, transparent: true, opacity: 0.50 })
      );
      cheekLed.position.set(sx * 0.55, -0.28, 0.20);
      this.eyeUnit.add(cheekLed);
      this.cheekLeds.push(cheekLed);
    }

    this._buildTrack(1);
    this._buildTrack(-1);

    this.robotGroup.rotation.y = Math.PI;
    this.scene.add(this.robotGroup);
  }

  _buildEyes() {
    this.eyes = {};
    const metalMat = new THREE.MeshStandardMaterial({
      color: 0x8EBBA8, roughness: 0.30, metalness: 0.35
    });

    const headCaseGeo = new THREE.BoxGeometry(1.50, 0.80, 0.38);
    const headCaseMat = new THREE.MeshStandardMaterial({
      color: 0x7EAB98, roughness: 0.55, metalness: 0.12
    });
    const headCase = new THREE.Mesh(headCaseGeo, headCaseMat);
    headCase.position.set(0, -0.02, -0.06);
    headCase.castShadow = true;
    this.eyeUnit.add(headCase);

    const backPlate = new THREE.Mesh(
      new THREE.BoxGeometry(1.44, 0.74, 0.04),
      new THREE.MeshStandardMaterial({ color: 0x5A7A6A, roughness: 0.60, metalness: 0.15 })
    );
    backPlate.position.set(0, -0.02, -0.27);
    this.eyeUnit.add(backPlate);

    const topRidge = new THREE.Mesh(
      new THREE.BoxGeometry(1.30, 0.04, 0.30),
      new THREE.MeshStandardMaterial({ color: 0x6A9A88, roughness: 0.50, metalness: 0.20 })
    );
    topRidge.position.set(0, 0.38, -0.08);
    this.eyeUnit.add(topRidge);

    const bridgeGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.35, 8);
    const bridge = new THREE.Mesh(bridgeGeo, metalMat);
    bridge.rotation.z = Math.PI / 2;
    bridge.position.set(0, 0, 0.05);
    this.eyeUnit.add(bridge);

    for (const side of ['left', 'right']) {
      const sign = side === 'left' ? -1 : 1;
      const g = new THREE.Group();
      g.position.set(sign * 0.34, 0, 0);

      const tubeGeo = new THREE.CylinderGeometry(0.30, 0.33, 0.45, 64, 1, true);
      const tubeMat = new THREE.MeshStandardMaterial({
        color: 0x6A8A7A, roughness: 0.5, metalness: 0.20
      });
      const tube = new THREE.Mesh(tubeGeo, tubeMat);
      tube.rotation.x = Math.PI / 2;
      tube.castShadow = true;
      g.add(tube);

      const backCap = new THREE.Mesh(
        new THREE.CircleGeometry(0.33, 64),
        new THREE.MeshBasicMaterial({ color: 0x2A3A32 })
      );
      backCap.position.z = -0.225;
      g.add(backCap);

      const eyeOutline = new THREE.Mesh(
        new THREE.CircleGeometry(0.30, 64),
        new THREE.MeshBasicMaterial({ color: 0x3A4A44 })
      );
      eyeOutline.position.z = 0.220;
      g.add(eyeOutline);

      const lensBack = new THREE.Mesh(
        new THREE.CircleGeometry(0.27, 64),
        new THREE.MeshBasicMaterial({ color: 0xE8EDF0 })
      );
      lensBack.position.z = 0.222;
      g.add(lensBack);

      const irisOuter = new THREE.Mesh(
        new THREE.CircleGeometry(0.21, 64),
        new THREE.MeshBasicMaterial({ color: 0x2277AA })
      );
      irisOuter.position.z = 0.225;
      g.add(irisOuter);

      const lens = new THREE.Mesh(
        new THREE.CircleGeometry(0.17, 64),
        new THREE.MeshBasicMaterial({ color: 0x3399DD })
      );
      lens.position.z = 0.228;
      g.add(lens);

      const pupilGroup = new THREE.Group();
      pupilGroup.position.z = 0.232;
      const pupil = new THREE.Mesh(
        new THREE.CircleGeometry(0.10, 32),
        new THREE.MeshBasicMaterial({ color: 0x080818 })
      );
      pupilGroup.add(pupil);

      const highlight = new THREE.Mesh(
        new THREE.CircleGeometry(0.05, 16),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.95 })
      );
      highlight.position.set(0.06, 0.06, 0.001);
      pupilGroup.add(highlight);

      const highlight2 = new THREE.Mesh(
        new THREE.CircleGeometry(0.025, 10),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 })
      );
      highlight2.position.set(-0.04, -0.04, 0.001);
      pupilGroup.add(highlight2);

      g.add(pupilGroup);

      const lidGeo = new THREE.BoxGeometry(0.66, 0.32, 0.05);
      const lidMat = new THREE.MeshStandardMaterial({
        color: 0x7AA898, roughness: 0.40, metalness: 0.25
      });
      const eyelid = new THREE.Mesh(lidGeo, lidMat);
      eyelid.position.set(0, 0.42, 0.16);
      g.add(eyelid);

      const lowerLid = new THREE.Mesh(lidGeo.clone(), lidMat.clone());
      lowerLid.position.set(0, -0.42, 0.16);
      g.add(lowerLid);

      this.eyeUnit.add(g);
      this.eyes[side] = { group: g, tube, lens, lensBack, pupil: pupilGroup, highlight, eyelid, lowerLid };
    }
  }

  _buildArm(sideSign) {
    const armGroup = new THREE.Group();
    const ax = sideSign * 0.50;

    const metalMat = new THREE.MeshStandardMaterial({
      color: 0x6A8878, roughness: 0.45, metalness: 0.45
    });
    const jointMat = new THREE.MeshStandardMaterial({
      color: 0x556A60, roughness: 0.35, metalness: 0.55
    });
    const handMat = new THREE.MeshStandardMaterial({
      color: 0xB8CCC0, roughness: 0.40, metalness: 0.20
    });

    const bracket = new THREE.Mesh(
      new THREE.BoxGeometry(0.22, 0.14, 0.18), metalMat);
    bracket.position.set(ax, 1.40, 0);
    armGroup.add(bracket);

    const upperLen = 0.60;
    const foreLen  = 0.525;
    const shoulderTiltX = -0.7;
    const shoulderTiltZ = sideSign * 0.25;
    const elbowBend = -0.8;

    const shoulderPivot = new THREE.Group();
    shoulderPivot.position.set(ax + sideSign * 0.04, 1.37, 0);
    shoulderPivot.rotation.x = shoulderTiltX;
    shoulderPivot.rotation.z = shoulderTiltZ;

    shoulderPivot.add(new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 16, 16), jointMat));

    const upperCyl = new THREE.Mesh(
      new THREE.CylinderGeometry(0.09, 0.085, upperLen, 12), metalMat);
    upperCyl.position.y = -upperLen / 2;
    shoulderPivot.add(upperCyl);

    const elbowPivot = new THREE.Group();
    elbowPivot.position.y = -upperLen;
    elbowPivot.rotation.x = elbowBend;

    elbowPivot.add(new THREE.Mesh(
      new THREE.SphereGeometry(0.10, 12, 12), jointMat));

    const foreCyl = new THREE.Mesh(
      new THREE.CylinderGeometry(0.085, 0.07, foreLen, 12), metalMat);
    foreCyl.position.y = -foreLen / 2;
    elbowPivot.add(foreCyl);

    const handGroup = new THREE.Group();
    handGroup.position.y = -foreLen;
    handGroup.rotation.x = -(shoulderTiltX + elbowBend);

    handGroup.add(new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 10, 10), jointMat));

    const palm = new THREE.Mesh(
      new THREE.BoxGeometry(0.20, 0.10, 0.20), handMat);
    palm.position.y = -0.07;
    handGroup.add(palm);

    for (const fo of [-0.06, 0, 0.06]) {
      const finger = new THREE.Mesh(
        new THREE.BoxGeometry(0.055, 0.08, 0.045), handMat);
      finger.position.set(0, -0.15, fo);
      handGroup.add(finger);
      const tip = new THREE.Mesh(
        new THREE.SphereGeometry(0.030, 8, 8), handMat);
      tip.position.set(0, -0.20, fo);
      handGroup.add(tip);
    }

    const thumb = new THREE.Mesh(
      new THREE.BoxGeometry(0.045, 0.08, 0.05), handMat);
    thumb.position.set(sideSign * 0.09, -0.05, 0);
    thumb.rotation.z = sideSign * 0.5;
    handGroup.add(thumb);

    elbowPivot.add(handGroup);
    shoulderPivot.add(elbowPivot);
    armGroup.add(shoulderPivot);
    this.bodyPivot.add(armGroup);

    if (sideSign === 1) {
      this.shoulderPivotR = shoulderPivot;
      this.elbowPivotR = elbowPivot;
      this.handGroupR = handGroup;
    } else {
      this.shoulderPivotL = shoulderPivot;
      this.elbowPivotL = elbowPivot;
      this.handGroupL = handGroup;
    }
  }

  _updateArmPose(sideSign, raise) {
    const pivot = sideSign === 1 ? this.shoulderPivotR : this.shoulderPivotL;
    const elbow = sideSign === 1 ? this.elbowPivotR : this.elbowPivotL;
    const hand  = sideSign === 1 ? this.handGroupR : this.handGroupL;
    if (!pivot) return;

    const defSX = -0.7, raiseSX = -2.8;
    const defSZ = 0.25, raiseSZ = 0.35;
    const defEX = -0.8, raiseEX = 0.3;

    const sx = defSX + (raiseSX - defSX) * raise;
    const sz = sideSign * (defSZ + (raiseSZ - defSZ) * raise);
    const ex = defEX + (raiseEX - defEX) * raise;

    pivot.rotation.x = sx;
    pivot.rotation.z = sz;
    elbow.rotation.x = ex;
    hand.rotation.x = -(sx + ex);
  }

  _buildTrack(sideSign) {
    const trackGroup = new THREE.Group();
    const tx = sideSign * 0.77;
    const trackW = 0.32;

    const botHalf = 0.72;
    const topHalf = 0.30;
    const hH = 0.375;
    const cr = 0.09;
    const beltY = 0.375;

    const shape = new THREE.Shape();
    shape.moveTo(-botHalf + cr, -hH);
    shape.lineTo(botHalf - cr, -hH);
    shape.quadraticCurveTo(botHalf, -hH, botHalf - 0.04, -hH + cr);
    shape.lineTo(topHalf + 0.04, hH - cr);
    shape.quadraticCurveTo(topHalf, hH, topHalf - cr, hH);
    shape.lineTo(-topHalf + cr, hH);
    shape.quadraticCurveTo(-topHalf, hH, -topHalf - 0.04, hH - cr);
    shape.lineTo(-botHalf + 0.04, -hH + cr);
    shape.quadraticCurveTo(-botHalf, -hH, -botHalf + cr, -hH);

    const beltGeo = new THREE.ExtrudeGeometry(shape, { depth: trackW, bevelEnabled: false });
    const beltMat = new THREE.MeshStandardMaterial({
      color: 0x3A4A42, roughness: 0.85, metalness: 0.25,
      emissive: 0x0A1A12, emissiveIntensity: 0.08,
    });
    const belt = new THREE.Mesh(beltGeo, beltMat);
    belt.rotation.y = Math.PI / 2;
    belt.position.set(tx - trackW / 2, beltY, 0);
    belt.castShadow = true;
    trackGroup.add(belt);

    const beltEdges = new THREE.EdgesGeometry(beltGeo);
    const beltLine = new THREE.LineSegments(beltEdges,
      new THREE.LineBasicMaterial({ color: 0x6AAA90, transparent: true, opacity: 0.25 }));
    beltLine.rotation.y = Math.PI / 2;
    beltLine.position.set(tx - trackW / 2, beltY, 0);
    trackGroup.add(beltLine);

    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x4A5A52, roughness: 0.50, metalness: 0.45 });
    const hubMat = new THREE.MeshStandardMaterial({ color: 0x8EBBA8, roughness: 0.35, metalness: 0.5 });
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x4A5A50, roughness: 0.5, metalness: 0.4 });

    const spR = 0.17;
    const spY = beltY + hH - spR * 0.6;
    const spZ = -(topHalf * 0.75);
    const sprocket = new THREE.Mesh(
      new THREE.CylinderGeometry(spR, spR, trackW + 0.04, 20), wheelMat);
    sprocket.rotation.z = Math.PI / 2;
    sprocket.position.set(tx, spY, spZ);
    trackGroup.add(sprocket);
    const spHub = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, trackW + 0.08, 8), hubMat);
    spHub.rotation.z = Math.PI / 2;
    spHub.position.set(tx, spY, spZ);
    trackGroup.add(spHub);
    const spTeeth = new THREE.Mesh(
      new THREE.TorusGeometry(spR + 0.01, 0.015, 6, 20), darkMat);
    spTeeth.position.set(tx, spY, spZ);
    trackGroup.add(spTeeth);
    for (let a = 0; a < 3; a++) {
      const angle = (a / 3) * Math.PI;
      const spokeGeo = new THREE.BoxGeometry(trackW * 0.6, 0.025, spR * 1.6);
      const spoke = new THREE.Mesh(spokeGeo, hubMat);
      spoke.position.set(tx, spY, spZ);
      spoke.rotation.x = angle;
      trackGroup.add(spoke);
    }

    const idR = 0.13;
    const idY = beltY + hH - idR * 0.55;
    const idZ = topHalf * 0.75;
    const idler = new THREE.Mesh(
      new THREE.CylinderGeometry(idR, idR, trackW + 0.02, 16), wheelMat);
    idler.rotation.z = Math.PI / 2;
    idler.position.set(tx, idY, idZ);
    trackGroup.add(idler);
    const idHub = new THREE.Mesh(
      new THREE.CylinderGeometry(0.04, 0.04, trackW + 0.06, 8), hubMat);
    idHub.rotation.z = Math.PI / 2;
    idHub.position.set(tx, idY, idZ);
    trackGroup.add(idHub);

    const rwR = 0.11;
    const rwCount = 4;
    const rwSpan = botHalf * 1.4;
    for (let i = 0; i < rwCount; i++) {
      const frac = (i + 0.5) / rwCount;
      const rwZ = -rwSpan / 2 + frac * rwSpan;
      const rwY = beltY - hH + rwR + 0.015;
      const rw = new THREE.Mesh(
        new THREE.CylinderGeometry(rwR, rwR, trackW + 0.02, 14), wheelMat);
      rw.rotation.z = Math.PI / 2;
      rw.position.set(tx, rwY, rwZ);
      trackGroup.add(rw);
      const rwHub = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.03, trackW + 0.06, 6), hubMat);
      rwHub.rotation.z = Math.PI / 2;
      rwHub.position.set(tx, rwY, rwZ);
      trackGroup.add(rwHub);
    }

    const rrR = 0.045;
    for (const rrZ of [-0.06, 0.06]) {
      const rr = new THREE.Mesh(
        new THREE.CylinderGeometry(rrR, rrR, trackW - 0.04, 8), darkMat);
      rr.rotation.z = Math.PI / 2;
      rr.position.set(tx, beltY + hH + rrR * 0.3, rrZ);
      trackGroup.add(rr);
    }

    const linkMat = new THREE.MeshStandardMaterial({ color: 0x3A4A42, roughness: 0.9, metalness: 0.3 });
    const linkCount = 14;
    for (let i = 0; i < linkCount; i++) {
      const frac = (i + 0.5) / linkCount;
      const lz = -botHalf * 0.92 + frac * botHalf * 1.84;
      const link = new THREE.Mesh(
        new THREE.BoxGeometry(trackW + 0.06, 0.032, 0.055), linkMat);
      link.position.set(tx, beltY - hH - 0.016, lz);
      trackGroup.add(link);
    }

    const armMat = new THREE.MeshStandardMaterial({ color: 0x5A7A6A, roughness: 0.5, metalness: 0.45 });
    for (let i = 0; i < rwCount; i++) {
      const frac = (i + 0.5) / rwCount;
      const aZ = -rwSpan / 2 + frac * rwSpan;
      const aY1 = beltY - hH + rwR + 0.015;
      const aY2 = beltY + 0.10;
      const armLen = aY2 - aY1;
      const arm = new THREE.Mesh(
        new THREE.BoxGeometry(0.022, armLen, 0.022), armMat);
      arm.position.set(tx, (aY1 + aY2) / 2, aZ);
      trackGroup.add(arm);
    }

    const outerX = tx + sideSign * (trackW / 2 + 0.005);
    for (let i = 0; i < 16; i++) {
      const frac = i / 16;
      const tz = -botHalf * 0.88 + frac * botHalf * 1.76;
      const pts = [
        new THREE.Vector3(outerX, beltY - hH + 0.03, tz),
        new THREE.Vector3(outerX, beltY + hH - 0.03, tz)
      ];
      const lg = new THREE.BufferGeometry().setFromPoints(pts);
      trackGroup.add(new THREE.Line(lg,
        new THREE.LineBasicMaterial({ color: 0x5A7A6A, transparent: true, opacity: 0.2 })));
    }

    this.bodyPivot.add(trackGroup);
  }

  _rndBlink() {
    const rates = {
      idle: [3000, 5000], happy: [1800, 3500], excited: [1200, 2500],
      thinking: [5000, 9000], sad: [4000, 8000], surprised: [7000, 12000], angry: [1500, 3000],
    };
    const [min, range] = rates[this.emotion] || [3000, 5000];
    return min + Math.random() * range;
  }

  _animate(ts) {
    const dt = Math.min(0.05, (ts - this.lastTS) / 1000);
    this.lastTS = ts;
    this._update(dt);
    this._updateEyes();
    this._updateColors();
    this._updateCamera();
    this.renderer.render(this.scene, this.camera);
    requestAnimationFrame(this._animate);
  }

  _update(dt) {
    const isSleep = this.emotion === 'sleep';
    const lerp = 1 - Math.exp(-8 * dt);

    const bobSpeed = isSleep ? 0.5 : this.talking ? 4.0 : 1.2;
    const bobAmp = isSleep ? 0.02 : 0.04;
    this.bobPhase += dt * bobSpeed;
    this.bodyPivot.position.y = Math.max(0, Math.sin(this.bobPhase) * bobAmp);

    if (this.emotion === 'excited') {
      this.excitedPhase += dt * 7.5;
      this.excitedY = Math.abs(Math.sin(this.excitedPhase)) * 0.12;
    } else {
      this.excitedPhase = 0;
      this.excitedY += (0 - this.excitedY) * Math.min(1, dt * 10);
    }
    this.bodyPivot.position.y += this.excitedY;

    if (!isSleep) {
      this.blinkTimer += dt * 1000;
      if (!this.blinking && this.blinkTimer > this.blinkNext) {
        this.blinking = true; this.blinkAmt = 0;
        this.blinkTimer = 0; this.blinkNext = this._rndBlink();
      }
      if (this.blinking) {
        this.blinkAmt += dt * 12;
        if (this.blinkAmt >= 1) { this.blinkAmt = 1; this.blinking = false; }
      } else {
        this.blinkAmt = Math.max(0, this.blinkAmt - dt * 12);
      }
    } else {
      this.blinkAmt = 0;
    }

    if (this.action !== 'none') {
      this.actionTimer += dt;
      if (this.action === 'nod') {
        this.headTiltXTgt = Math.sin(this.actionTimer * Math.PI / 0.3) * 0.15;
        if (this.actionTimer > 0.7) { this.action = 'none'; this.headTiltXTgt = 0; }
      } else if (this.action === 'shake') {
        this.headTiltYTgt = Math.sin(this.actionTimer * Math.PI * 3) * 0.12;
        if (this.actionTimer > 0.9) { this.action = 'none'; this.headTiltYTgt = 0; }
      } else if (this.action === 'forward') {
        const ry = this.robotGroup.rotation.y;
        this.robotGroup.position.x += Math.sin(ry) * 2.5 * dt;
        this.robotGroup.position.z += Math.cos(ry) * 2.5 * dt;
        if (this.actionTimer > 1.8) { this.action = 'none'; }
      } else if (this.action === 'backward') {
        const ry = this.robotGroup.rotation.y;
        this.robotGroup.position.x -= Math.sin(ry) * 2.0 * dt;
        this.robotGroup.position.z -= Math.cos(ry) * 2.0 * dt;
        if (this.actionTimer > 1.5) { this.action = 'none'; }
      } else if (this.action === 'turn_right') {
        this.targetRotY -= dt * 3.0;
        if (this.actionTimer > 0.6) { this.action = 'none'; }
      } else if (this.action === 'turn_left') {
        this.targetRotY += dt * 3.0;
        if (this.actionTimer > 0.6) { this.action = 'none'; }
      } else if (this.action === 'turn_around') {
        this.targetRotY += dt * 3.5;
        if (this.actionTimer > 1.0) { this.action = 'none'; }
      } else if (this.action === 'spin') {
        this.targetRotY += dt * 8.0;
        this.bodyPivot.position.y = Math.abs(Math.sin(this.actionTimer * 6)) * 0.10;
        if (this.actionTimer > 2.5) { this.action = 'none'; }
      } else if (this.action === 'dance') {
        this.dancePhase = (this.dancePhase || 0) + dt;
        const dp = this.dancePhase;
        this.bodyPivot.position.y = Math.abs(Math.sin(dp * 5)) * 0.15;
        this.bodyPivot.position.x = Math.sin(dp * 3) * 0.12;
        this.headTiltXTgt = Math.sin(dp * 4) * 0.12;
        this.headTiltYTgt = Math.cos(dp * 3) * 0.10;
        this.targetRotY += Math.sin(dp * 2) * dt * 1.5;
        if (this.actionTimer > 4.0) {
          this.action = 'none';
          this.headTiltXTgt = 0; this.headTiltYTgt = 0;
          this.bodyPivot.position.x = 0;
        }
      } else if (this.action === 'look_up') {
        this.headTiltXTgt = -0.30;
        if (this.actionTimer > 2.5) { this.action = 'none'; this.headTiltXTgt = 0; }
      } else if (this.action === 'look_down') {
        this.headTiltXTgt = 0.30;
        if (this.actionTimer > 2.5) { this.action = 'none'; this.headTiltXTgt = 0; }
      } else if (this.action === 'look_right') {
        this.headTiltYTgt = 0.40;
        if (this.actionTimer > 2.5) { this.action = 'none'; this.headTiltYTgt = 0; }
      } else if (this.action === 'look_left') {
        this.headTiltYTgt = -0.40;
        if (this.actionTimer > 2.5) { this.action = 'none'; this.headTiltYTgt = 0; }
      } else if (this.action === 'raise_right') {
        this.armRaiseTgtL = 1;
        if (this.actionTimer > 3.0) { this.action = 'none'; this.armRaiseTgtL = 0; }
      } else if (this.action === 'raise_left') {
        this.armRaiseTgtR = 1;
        if (this.actionTimer > 3.0) { this.action = 'none'; this.armRaiseTgtR = 0; }
      } else if (this.action === 'raise_both') {
        this.armRaiseTgtR = 1; this.armRaiseTgtL = 1;
        if (this.actionTimer > 3.0) { this.action = 'none'; this.armRaiseTgtR = 0; this.armRaiseTgtL = 0; }
      } else if (this.action === 'jump') {
        const jt = this.actionTimer;
        if (jt < 0.4) {
          this.bodyPivot.position.y = Math.sin(jt / 0.4 * Math.PI) * 0.5;
        } else if (jt < 0.8) {
          this.bodyPivot.position.y = Math.sin((jt - 0.4) / 0.4 * Math.PI) * 0.35;
        } else if (jt < 1.1) {
          this.bodyPivot.position.y = Math.sin((jt - 0.8) / 0.3 * Math.PI) * 0.15;
        }
        if (this.actionTimer > 1.2) { this.action = 'none'; }
      }
    }
    this.headTiltX += (this.headTiltXTgt - this.headTiltX) * lerp;
    this.headTiltY += (this.headTiltYTgt - this.headTiltY) * lerp;
    this.eyeUnit.rotation.x = this.headTiltX;
    this.eyeUnit.rotation.y = this.headTiltY;

    this.armRaiseR += (this.armRaiseTgtR - this.armRaiseR) * lerp;
    this.armRaiseL += (this.armRaiseTgtL - this.armRaiseL) * lerp;
    this._updateArmPose(1, this.armRaiseR);
    this._updateArmPose(-1, this.armRaiseL);

    if (!isSleep && this.action === 'none' && !this.talking) {
      this.idleTimer += dt * 1000;
      if (this.idleTimer > this.nextIdleWander) {
        this.idleTimer = 0;
        this.nextIdleWander = 2000 + Math.random() * 5000;
        this.idleWanderTgtX = (Math.random() - 0.5) * 0.08;
        this.idleWanderTgtY = (Math.random() - 0.5) * 0.06;
      }
      this.idleWanderX += (this.idleWanderTgtX - this.idleWanderX) * lerp * 0.3;
      this.idleWanderY += (this.idleWanderTgtY - this.idleWanderY) * lerp * 0.3;
    } else {
      this.idleWanderX *= 0.95; this.idleWanderY *= 0.95;
    }
    this.eyeUnit.rotation.z = 0;

    if (this.talking) this.talkPhase += dt * 10;
    if (this.listening) this.listenPhase += dt * 8;

    const ca = this.camAngle;
    const fwd = [-Math.sin(ca), -Math.cos(ca)];
    const rgt = [Math.cos(ca), -Math.sin(ca)];
    const wx = this.moveInput.x * rgt[0] + this.moveInput.z * fwd[0];
    const wz = this.moveInput.x * rgt[1] + this.moveInput.z * fwd[1];

    const speed = 4.0;
    const accel = 12.0;
    const friction = 8.0;

    if (Math.abs(this.moveInput.x) > 0.01 || Math.abs(this.moveInput.z) > 0.01) {
      this.velocity.x += (wx * speed - this.velocity.x) * Math.min(1, accel * dt);
      this.velocity.z += (wz * speed - this.velocity.z) * Math.min(1, accel * dt);
      this.targetRotY = Math.atan2(wx, wz) + Math.PI;
    } else {
      this.velocity.x += (0 - this.velocity.x) * Math.min(1, friction * dt);
      this.velocity.z += (0 - this.velocity.z) * Math.min(1, friction * dt);
    }

    this.robotGroup.position.x += this.velocity.x * dt;
    this.robotGroup.position.z += this.velocity.z * dt;

    let angleDiff = this.targetRotY - this.robotGroup.rotation.y;
    while (angleDiff > Math.PI) angleDiff -= 2 * Math.PI;
    while (angleDiff < -Math.PI) angleDiff += 2 * Math.PI;
    this.robotGroup.rotation.y += angleDiff * (1 - Math.exp(-10 * dt));
  }

  _updateEyes() {
    const em = this.emotion;
    let lidClose = this.blinkAmt * 0.95;

    if (em === 'sleep') lidClose = 0.95;
    else if (em === 'sad') lidClose = Math.max(lidClose, 0.35);
    else if (em === 'happy') lidClose = Math.max(lidClose, 0.25);
    else if (em === 'angry') lidClose = Math.max(lidClose, 0.5);

    for (const [side, eye] of Object.entries(this.eyes)) {
      const isRight = side === 'right';

      const openY = 0.42;
      const closedY = 0.08;
      const upperY = openY - lidClose * (openY - closedY);
      eye.eyelid.position.y = upperY;

      const lowerOpenY = -0.42;
      const lowerClosedY = -0.08;
      const lowerY = lowerOpenY + lidClose * (lowerClosedY - lowerOpenY) * 0.25;
      eye.lowerLid.position.y = lowerY;

      if (em === 'angry') {
        eye.eyelid.rotation.z = isRight ? 0.25 : -0.25;
      } else if (em === 'sad') {
        eye.eyelid.rotation.z = isRight ? -0.2 : 0.2;
      } else {
        eye.eyelid.rotation.z = 0;
      }

      const gazeX = this.idleWanderX * 0.8;
      const gazeY = this.idleWanderY * 0.6;
      eye.pupil.position.x = gazeX;
      eye.pupil.position.y = gazeY;

      eye.lens.visible = true;
      eye.lensBack.visible = true;
      eye.pupil.visible = lidClose < 0.85;

      if (em === 'thinking' && !isRight) {
        eye.eyelid.position.y = openY - 0.5 * (openY - closedY);
      }
      if (em === 'excited') {
        eye.eyelid.position.y = Math.min(eye.eyelid.position.y + 0.05, openY + 0.06);
      }
      if (em === 'surprised') {
        eye.eyelid.position.y = openY + 0.06;
        eye.lowerLid.position.y = lowerOpenY - 0.03;
      }
    }

    if (em === 'sad') {
      this.eyeUnit.rotation.x += (-0.1 - this.eyeUnit.rotation.x) * 0.05;
    } else if (em === 'happy') {
      this.eyeUnit.rotation.x += (0.06 - this.eyeUnit.rotation.x) * 0.05;
    }
  }

  _updateColors() {
    const col = EMOTION_COLORS[this.emotion] || EMOTION_COLORS.idle;
    const primary = new THREE.Color(col.primary);
    const lensCol = new THREE.Color(col.lens);
    const bodyCol = new THREE.Color(col.body);
    const cheekCol = new THREE.Color(col.cheek);

    this.headLight.color.copy(primary);
    this.headLight.position.set(
      this.robotGroup.position.x,
      this.robotGroup.position.y + 3.5,
      this.robotGroup.position.z
    );

    let intensity = this.emotion === 'sleep' ? 0.4 : 1.5;
    if (this.listening) {
      intensity += Math.sin(this.listenPhase) * 0.5;
    }
    this.headLight.intensity = intensity;

    this.bodyMat.color.copy(bodyCol);
    this.bodyLine.material.color.copy(primary);

    for (const eye of Object.values(this.eyes)) {
      eye.lens.material.color.copy(lensCol);
    }

    const isSleep = this.emotion === 'sleep';
    const isHappy = this.emotion === 'happy' || this.emotion === 'excited';
    this.cheekLeds.forEach(led => {
      led.material.color.copy(cheekCol);
      const baseOp = isSleep ? 0.10 : isHappy ? 0.60 : 0.40;
      led.material.opacity = baseOp + Math.sin(this.bobPhase * 2) * 0.12;
    });
  }

  _updateCamera() {
    const rx = this.robotGroup.position.x;
    const ry = this.robotGroup.position.y;
    const rz = this.robotGroup.position.z;

    const cx = rx + this.camDist * Math.sin(this.camAngle) * Math.cos(this.camPitch);
    const cy = ry + this.camDist * Math.sin(this.camPitch) + 1.2;
    const cz = rz + this.camDist * Math.cos(this.camAngle) * Math.cos(this.camPitch);

    this.camera.position.lerp(new THREE.Vector3(cx, cy, cz), 0.06);
    const lookAt = new THREE.Vector3(rx, ry + 1.6, rz);
    this.camera.lookAt(lookAt);
  }
}


// ════════════════════════════════════════════════
// APP STATE & CONTROLLERS
// ════════════════════════════════════════════════
const robotContainer = document.getElementById('robot-container');
const bubble      = document.getElementById('speech-bubble');
const bubText     = document.getElementById('bubble-text');
const textInput   = document.getElementById('text-input');
const sendBtn     = document.getElementById('send-btn');
const micBtn      = document.getElementById('mic-btn');
const statusDt    = document.getElementById('status-dot');
const statusTx    = document.getElementById('status-text');
const nameDisplay = document.getElementById('robot-name-display');
const namePanel   = document.getElementById('name-panel');
const nameInput   = document.getElementById('name-input');

const robot = new RobotRenderer3D(robotContainer);

let isBusy     = false;
let robotName  = '秋山さん';

// ── Eye color palette ────────────────────────
const COLORS = [
  { name: 'あお',     hex: '#44aaff', dark: '#112244' },
  { name: 'みどり',   hex: '#22ee88', dark: '#115533' },
  { name: 'あか',     hex: '#ff5544', dark: '#661122' },
  { name: 'オレンジ', hex: '#ff9922', dark: '#663300' },
  { name: 'きいろ',   hex: '#ffee00', dark: '#664400' },
  { name: 'むらさき', hex: '#cc66ff', dark: '#441166' },
  { name: 'ピンク',   hex: '#ff66cc', dark: '#661144' },
  { name: 'しろ',     hex: '#ddeeff', dark: '#556688' },
];

let selectedColorIdx = 0;

const picker = document.getElementById('color-picker');
COLORS.forEach((c, i) => {
  const btn = document.createElement('div');
  btn.className = 'color-btn' + (i === 0 ? ' selected' : '');
  btn.style.background = c.hex;
  btn.style.boxShadow  = `0 0 12px ${c.hex}88`;
  btn.innerHTML = `<span class="color-name">${c.name}</span>`;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedColorIdx = i;
    robot.setEyeColor(c.hex);
    spawnConfetti(btn.getBoundingClientRect(), 12);
  });
  picker.appendChild(btn);
});
// Set default eye color
robot.setEyeColor(COLORS[0].hex);

window.addEventListener('resize', () => robot.resize());

// ── Status ───────────────────────────────────
function setStatus(state, label) {
  statusDt.className = state;
  statusTx.textContent = label;
}
function showBubble(text) {
  bubText.textContent = text;
  bubble.classList.add('show');
}
function hideBubble() { bubble.classList.remove('show'); }

// ── Confetti burst ───────────────────────────
const PIECES = ['⭐', '✨', '💫', '🌟', '🎉', '💜', '💛', '💚', '💙', '❤️'];
function spawnConfetti(rect, count = 24) {
  const cx = rect.left + rect.width/2;
  const cy = rect.top  + rect.height/2;
  for (let i=0; i<count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.textContent = PIECES[Math.floor(Math.random() * PIECES.length)];
    const angle = Math.random() * Math.PI * 2;
    const dist  = 60 + Math.random() * 140;
    el.style.cssText = `
      left: ${cx}px; top: ${cy}px;
      --dx: ${Math.cos(angle)*dist}px;
      --dy: ${Math.sin(angle)*dist - 40}px;
      --rot: ${(Math.random()-.5)*720}deg;
      font-size: ${14 + Math.random()*14}px;
      animation-delay: ${Math.random()*.2}s;
      animation-duration: ${.9 + Math.random()*.5}s;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ── TTS（Edge TTS / ja-JP-NanamiNeural） ─────
let currentAudio = null;

function speakFallback(text, onEnd) {
  if (!window.speechSynthesis) { onEnd?.(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP'; utt.rate = 1.1; utt.pitch = 1.15;
  utt.onstart = () => robot.setTalking(true);
  utt.onend   = () => { robot.setTalking(false); onEnd?.(); };
  utt.onerror = () => { robot.setTalking(false); onEnd?.(); };
  setTimeout(() => {
    if (!window.speechSynthesis.speaking) { robot.setTalking(false); onEnd?.(); }
  }, 8000);
  window.speechSynthesis.speak(utt);
}

function speak(text, onEnd) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  fetch('/api/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  })
  .then(r => { if (!r.ok) throw new Error('TTS failed'); return r.blob(); })
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onplay  = () => robot.setTalking(true);
    audio.onended = () => {
      robot.setTalking(false);
      URL.revokeObjectURL(url); currentAudio = null;
      onEnd?.();
    };
    audio.onerror = () => {
      robot.setTalking(false);
      URL.revokeObjectURL(url); currentAudio = null;
      onEnd?.();
    };
    audio.play().catch(() => {
      robot.setTalking(false);
      URL.revokeObjectURL(url); currentAudio = null;
      speakFallback(text, onEnd);
    });
  })
  .catch(() => { robot.setTalking(false); speakFallback(text, onEnd); });
}

// ── Send message ─────────────────────────────
async function sendMessage(text) {
  if (isBusy || !text.trim()) return;
  isBusy = true;
  sendBtn.disabled = true;
  textInput.value = '';

  setStatus('thinking', 'かんがえてる…');
  robot.setEmotion('thinking');
  hideBubble();

  try {
    const res  = await fetch('/api/kids/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: text }),
    });
    const data = await res.json();

    robot.setEmotion(data.emotion || 'idle');
    if (data.action && data.action !== 'none') robot.setAction(data.action);
    showBubble(data.message || '…');

    // Confetti for excited/happy
    if (['excited', 'happy'].includes(data.emotion)) {
      const r = robotContainer.getBoundingClientRect();
      spawnConfetti(r, 18);
    }

    setStatus('speaking', 'はなしてるよ！');
    speak(data.message || '', () => {
      isBusy = false; sendBtn.disabled = false;
      if (continuousMode) {
        setStatus('listening', 'きいてるよ！');
        setTimeout(() => startListening(), 600);
      } else {
        setStatus('ready', 'まってるよ！');
      }
    });

  } catch (e) {
    robot.setEmotion('sad');
    showBubble('あれ？うまくいかなかったよ…もういちど！');
    setStatus('ready', 'まってるよ！');
    isBusy = false; sendBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', () => sendMessage(textInput.value));
textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage(textInput.value);
});

// ── Name panel ───────────────────────────────
function toggleNamePanel() {
  namePanel.classList.toggle('open');
  if (namePanel.classList.contains('open')) nameInput.focus();
}

async function setName() {
  const n = nameInput.value.trim();
  if (!n) return;
  try {
    const res  = await fetch('/api/kids/name', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ name: n }),
    });
    const data = await res.json();
    robotName = data.name;
    nameDisplay.textContent = robotName;
    nameInput.value = '';
    namePanel.classList.remove('open');
    robot.setEmotion('excited'); robot.setAction('nod');
    const msg = `かしこまりました。${robotName}としてお仕えいたします。`;
    showBubble(msg); speak(msg);
    // Big confetti!
    const r = robotContainer.getBoundingClientRect();
    spawnConfetti(r, 32);
  } catch { /* ignore */ }
}
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') setName(); });

// ── Emotion trigger ──────────────────────────
function triggerEmotion(em, msg) {
  robot.setEmotion(em);
  showBubble(msg);
  speak(msg);
  if (['excited', 'happy', 'surprised'].includes(em)) {
    const r = robotContainer.getBoundingClientRect();
    spawnConfetti(r, 14);
  }
}

// ── Voice recognition ────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let continuousMode  = false;
let listeningActive = false;
let kidsRec = null;

function updateMicBtn() {
  if (continuousMode) {
    micBtn.textContent = '🔴';
    micBtn.title = 'おして、とめる';
    micBtn.classList.add('continuous');
  } else {
    micBtn.textContent = '🎤';
    micBtn.title = 'こえでおはなし';
    micBtn.classList.remove('continuous');
    micBtn.classList.remove('listening');
  }
}

function startListening() {
  if (!kidsRec || listeningActive || isBusy) return;
  try { kidsRec.start(); } catch(e) { console.warn(e); }
}

// 発話デバウンス（話し終わるまで待つ）
let kidsPending = '';
let kidsSendTimer = null;
const KIDS_SEND_DELAY = 1500;

function kidsFlush() {
  clearTimeout(kidsSendTimer); kidsSendTimer = null;
  const text = kidsPending.trim();
  kidsPending = '';
  if (!text) return;
  try { kidsRec.abort(); } catch(e) {}
  listeningActive = false;
  micBtn.classList.remove('listening');
  textInput.value = text;
  sendMessage(text);
}

if (SR) {
  kidsRec = new SR();
  kidsRec.lang = 'ja-JP'; kidsRec.continuous = true; kidsRec.interimResults = true;

  kidsRec.onstart = () => {
    listeningActive = true;
    setStatus('listening', 'きいてるよ！');
    micBtn.classList.add('listening');
    robot.setEmotion('happy');
    hideBubble();
  };
  kidsRec.onresult = e => {
    let finalText = '';
    let interim = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if (finalText) kidsPending = finalText;
    if (finalText || interim) {
      robot.setEmotion('happy');
      clearTimeout(kidsSendTimer);
      kidsSendTimer = setTimeout(kidsFlush, KIDS_SEND_DELAY);
    }
  };
  kidsRec.onend = () => {
    listeningActive = false;
    micBtn.classList.remove('listening');
    if (kidsPending && kidsSendTimer) {
      clearTimeout(kidsSendTimer);
      kidsFlush();
      return;
    }
    if (continuousMode && !isBusy) {
      setTimeout(() => startListening(), 400);
    } else if (!continuousMode && !isBusy) {
      setStatus('ready', 'まってるよ！');
    }
  };
  kidsRec.onerror = e => {
    listeningActive = false;
    micBtn.classList.remove('listening');
    if (e.error === 'no-speech') {
      if (continuousMode && !isBusy) setTimeout(() => startListening(), 400);
      return;
    }
    continuousMode = false;
    updateMicBtn();
    setStatus('ready', 'まってるよ！');
    showBubble('マイクがつかえなかったよ。もじでかいてね！');
  };

  // 短タップ → 1回 / 長押し(500ms) → 連続モード
  let pressTimer = null;
  micBtn.addEventListener('pointerdown', () => {
    pressTimer = setTimeout(() => {
      pressTimer = null;
      if (!continuousMode) {
        continuousMode = true;
        updateMicBtn();
        window.speechSynthesis?.cancel();
        if (!isBusy) startListening();
        showBubble('れんぞくモードON！ずっとはなせるよ🎤');
      }
    }, 500);
  });
  micBtn.addEventListener('pointerup', () => {
    if (pressTimer) {
      clearTimeout(pressTimer);
      pressTimer = null;
      if (continuousMode) {
        continuousMode = false;
        updateMicBtn();
        clearTimeout(kidsSendTimer); kidsPending = '';
        try { kidsRec.abort(); } catch(e) {}
        setStatus('ready', 'まってるよ！');
      } else {
        if (isBusy) return;
        window.speechSynthesis?.cancel();
        if (!listeningActive) startListening();
      }
    }
  });
  micBtn.addEventListener('pointercancel', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  });

  updateMicBtn();
} else {
  micBtn.style.opacity = '.3';
  micBtn.title = 'このブラウザは音声非対応';
}

// ── Canvas interactions ───────────────────────
robotContainer.addEventListener('click', () => {
  robot.blink?.();
  const msgs = [
    'なあに？よんだ？',
    'わーい！さわってくれた！',
    'いっしょにあそぼう！',
    'なにかしたいことある？',
  ];
  const m = msgs[Math.floor(Math.random() * msgs.length)];
  robot.setEmotion('happy');
  showBubble(m); speak(m);
  const r = robotContainer.getBoundingClientRect();
  spawnConfetti(r, 8);
});

robotContainer.addEventListener('dblclick', () => {
  robot.setEmotion('surprised');
  const m = 'わあ！ふたかいもさわった！びっくりしたよ！';
  showBubble(m); speak(m);
  const r = robotContainer.getBoundingClientRect();
  spawnConfetti(r, 22);
});

// ── Voices on iOS ────────────────────────────
if (window.speechSynthesis) speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

// ── Initial greeting ─────────────────────────
function unlockAudio() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination); src.start(0);
    ctx.resume();
  } catch(e) {}
  try {
    const a = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA=');
    a.volume = 0.01;
    a.play().then(() => a.pause()).catch(() => {});
  } catch(e) {}
}

async function initGreeting() {
  try {
    const res  = await fetch('/api/kids/greet');
    const data = await res.json();
    robot.setEmotion(data.emotion || 'excited');
    robot.setAction(data.action  || 'nod');
    showBubble(data.message);
    setTimeout(() => {
      speak(data.message);
      const r = robotContainer.getBoundingClientRect();
      spawnConfetti(r, 20);
    }, 600);
  } catch {
    robot.setEmotion('excited'); robot.setAction('nod');
    showBubble('やあ！秋山さんだよ！きょうもいっしょにあそぼう！');
  }
  setStatus('ready', 'まってるよ！');
}

window.addEventListener('load', () => {
  const overlay = document.getElementById('start-overlay');
  overlay.addEventListener('click', () => {
    unlockAudio();
    overlay.classList.add('hidden');
    setTimeout(() => overlay.remove(), 500);
    initGreeting();
  }, { once: true });
});
</script>
